    game.appendChild(el("span","tpf-fim",'🏁'));
    const th=el("div","tpf-team"); th.appendChild(tpFlag(m.home.crest)); th.appendChild(el("span","nm",esc(ptName(m.home.name))));
    const sc=el("div","tpf-sc"); sc.innerHTML=(s.home==null?"–":s.home)+'<i>×</i>'+(s.away==null?"–":s.away);
    const ta=el("div","tpf-team r"); ta.appendChild(el("span","nm",esc(ptName(m.away.name)))); ta.appendChild(tpFlag(m.away.crest));
    game.appendChild(th); game.appendChild(sc); game.appendChild(ta);
    fh.appendChild(game);
    const right=el("div","tpf-right");
    if(myR){
      const tier=myR.pts>=3?"p3":myR.pts>=1?"p1":"p0";
      const mp=dobX?myR.pts*2:myR.pts;
      right.appendChild(el("span","tpf-res "+tier,'você '+(mp>0?"+":"")+mp+(dobX&&mp>0?" 🃏":"")));
    } else {
      right.appendChild(el("span","tpf-res pn","você vacilou"));
    }
    right.appendChild(el("span","tpf-chev","›"));
    fh.appendChild(right);
    fh.onclick=()=>{ S.todosOpen=S.todosOpen||{}; S.todosOpen[m.id]=!open; card.classList.toggle("open"); };
    card.appendChild(fh);
  } else {
    // cabeçalho grande (agendado/ao vivo): bandeiras + placar parcial ou VS
    const head=el("div","tp-head");
    const th=el("div","tp-team"); th.appendChild(tpFlag(m.home.crest)); th.appendChild(el("span","nm",esc(ptName(m.home.name))));
    const mid=el("div");
    if(live){ const s=m.score||{}; mid.className="tp-score"; mid.innerHTML=(s.home==null?"–":s.home)+'<i>×</i>'+(s.away==null?"–":s.away); }
    else { mid.className="tp-vs"; mid.textContent="VS"; }
    const ta=el("div","tp-team r"); ta.appendChild(tpFlag(m.away.crest)); ta.appendChild(el("span","nm",esc(ptName(m.away.name))));
    head.appendChild(th); head.appendChild(mid); head.appendChild(ta);
    card.appendChild(head);
  }

  const bodyEl=el("div","tp-body");
  // meta: status do jogo + grupo/fase
  const stageTxt = m.group ? ("Grupo "+groupLabel(m.group)) : (STAGE_PT[m.stage]||"");
  const meta=el("div","tp-meta");
  meta.appendChild(el("span",null,esc(stageTxt)));
  if(live) meta.appendChild(el("span",null,'<span class="live-dot"></span><span style="color:var(--gold);font-weight:800">AO VIVO</span>'));
  else if(fin) meta.appendChild(el("span",null,'ENCERRADO · '+timeLabel(m.kickoffMs)));
  else if(isTodayMs(m.kickoffMs)) meta.appendChild(expiraChip(m.kickoffMs));
  else meta.appendChild(el("span",null,timeLabel(m.kickoffMs)));
  bodyEl.appendChild(meta);

  // selo "Cartas" no canto do card → joga uma carta nesse jogo (só antes do apito; gated IS_LOCAL)
  if(before){ const seal=bolaoCardCTA(m); if(seal) card.appendChild(seal); }
  // badges das cartas já jogadas neste jogo (mostra pra todos; data-driven)
  const tpb=playBadges(m.id); if(tpb) bodyEl.appendChild(tpb);

  // participantes
  const entries=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    entries.push({uid,name:p.name,slug:p.slug,pal:(S.palpites[uid]||{})[m.id]});
  }
  const palp=entries.filter(e=>isComplete(e.pal));
  const confirmedE=entries.filter(e=>isConfirmed(e.pal));
  // reveal antecipado quando TODO MUNDO CONFIRMOU — ou, individualmente, pra quem JÁ
  // confirmou a própria aposta deste jogo (trancou, sem volta: não tem o que copiar/mudar)
  const allIn = entries.length>0 && confirmedE.length===entries.length;
  const iConfirmed = isConfirmed((S.palpites[S.uid]||{})[m.id]);
  const canReveal = allIn || iConfirmed;

  if(before && !canReveal){
    // surdina: mostra só QUEM já CONFIRMOU (trancou), sem o placar
    const rev=el("div","tp-reveal");
    const avrow=el("div","tp-avrow");
    if(confirmedE.length){
      confirmedE.slice(0,8).forEach(e=>avrow.appendChild(faceAvatar(e.slug,e.name,"tp-face")));
      if(confirmedE.length>8) avrow.appendChild(el("span","tp-more","+"+(confirmedE.length-8)));
    }
    const info=el("div","tp-revinfo");
    const pct = entries.length ? Math.round(confirmedE.length/entries.length*100) : 0;
    info.innerHTML='<div class="tp-revn"><b>'+confirmedE.length+'</b><span>/'+entries.length+'</span></div>'
      +'<div class="tp-revl">'+(confirmedE.length?'já confirmaram 🔒':'ninguém confirmou ainda')+'</div>';
    const bar=el("div","tp-prog"); const fill=el("div"); fill.style.width=pct+"%"; bar.appendChild(fill);
    const right=el("div","tp-revright"); right.appendChild(info); right.appendChild(bar);
    if(confirmedE.length) rev.appendChild(avrow);
    rev.appendChild(right);
    bodyEl.appendChild(rev);
    bodyEl.appendChild(el("div","tp-lockhint","🔒 confirme sua aposta pra ver os palpites (ou todos confirmam / a bola rola)"));
    card.appendChild(bodyEl);
    return card;
  }

  // ── REVELAÇÃO ──
  const showRes=(live||fin) && m.score && m.score.home!=null && m.score.away!=null;
  // 1) Bolão × Casas — duas tiras finas (distribuição das apostas + odds), discreto
  bodyEl.appendChild(vsCasasBars(m, entries));

  // 2) palpites por "inclinação" — cada placar pende pro lado apostado (largura cheia)
  bodyEl.appendChild(el("div","pg-secttl","PALPITES"));
  bodyEl.appendChild(buildPalpiteClusters(m, entries, {showRes, fin}));
  // 3) resenha (chat por jogo) — colapsável, só monta o thread quando aberto (leve)
  bodyEl.appendChild(chatSection(m));
  card.appendChild(bodyEl);
  return card;
}
/* resenha por jogo: toggle leve (mostra contagem) + thread só quando aberto. O input do thread
   já é preservado pelo scheduler (isEditingInput cobre [data-chat]); clique = ação do usuário → render direto. */
function chatSection(m){
  const wrap=el("div","tp-chat");
  const n=Object.keys((S.chat||{})[m.id]||{}).length;
  const openS=!!(S.chatOpen && S.chatOpen[m.id]);
  const tg=el("button","tp-chat-tg"+(openS?" open":""),
    '💬 resenha'+(n?' <b>'+n+'</b>':' <span class="dim">— solta a primeira</span>')
    +'<span class="tp-chat-chev">'+(openS?'▴':'▾')+'</span>');
  tg.onclick=(ev)=>{ ev.stopPropagation(); S.chatOpen=S.chatOpen||{}; S.chatOpen[m.id]=!openS; renderScreen(); };
  wrap.appendChild(tg);
  if(openS) wrap.appendChild(chatThread(m.id));
  return wrap;
}

/* Tiras finas "Bolão × Casas" — distribuição das apostas (por lado, cores das seleções) +
   odds das casas. Reusada pelo reveal (todosCard) E pelo live board (rolando agora). */
function vsCasasBars(m, entries){
  const homeCol=teamColor(m.home.name), awayCol=teamColor(m.away.name);
  const palp=entries.filter(e=>isComplete(e.pal));
  let H=0,D=0,A=0,somaGols=0,nGols=0;
  palp.forEach(e=>{ const r=e.pal.h>e.pal.a?"H":e.pal.h<e.pal.a?"A":"D"; if(r==="H")H++;else if(r==="A")A++;else D++; somaGols+=e.pal.h+e.pal.a; nGols++; });
  const tot=H+D+A||1;
  const pH=Math.round(H/tot*100), pA=Math.round(A/tot*100), pD=Math.max(0,100-pH-pA);
  const live=m.status==="IN_PLAY"||m.status==="PAUSED", fin=m.status==="FINISHED";
  const showRes=(live||fin) && m.score && m.score.home!=null && m.score.away!=null;
  // odds das casas → probabilidade implícita (se houver odds salvas pelo CPUzão)
  const od = S.odds && S.odds[m.id];
  let oH=null,oD=null,oA=null,favKey=null;
  if(od && od.home && od.draw && od.away){
    const iH=1/od.home, iD=1/od.draw, iA=1/od.away, sum=iH+iD+iA;
    oH=Math.round(iH/sum*100); oA=Math.round(iA/sum*100); oD=Math.max(0,100-oH-oA);
    const mn=Math.min(od.home,od.draw,od.away);
    favKey = mn===od.draw?'d':mn===od.home?'h':'a';
  }
  const thinBar=(ph,pd,pa)=>{
    const bar=el("div","cmp2-bar");
    const seg=(c,n)=>{ if(!n) return; const d=el("div"); d.style.flex=n; d.style.background=c; bar.appendChild(d); };
    seg(homeCol,ph); seg("#7a7458",pd); seg(awayCol,pa);
    return bar;
  };
  const cmp=el("div","cmp2");
  const rB=el("div","cmp2-row");
  rB.appendChild(el("span","cmp2-k","Bolão"));
  rB.appendChild(thinBar(pH,pD,pA));
  cmp.appendChild(rB);
  if(od && oH!=null){
    const rC=el("div","cmp2-row");
    rC.appendChild(el("span","cmp2-k","Casas"));
    rC.appendChild(thinBar(oH,oD,oA));
    cmp.appendChild(rC);
  }
  return cmp;
}

/* Grade de palpites CLUSTERIZADA por placar — reusada pelo reveal (todosCard) E pelo
   live board (rolando agora). Junta placares idênticos numa linha (placar grande + rostos sticker).
   opts: { showRes (tem placar p/ pontuar), fin (encerrado → veredito), byProximity (live: lista
   plana ordenada pela proximidade ao placar atual; senão: agrupado por lado casa/empate/fora) }. */
function buildPalpiteClusters(m, entries, opts){
  opts=opts||{}; const showRes=!!opts.showRes, fin=!!opts.fin, byProx=!!opts.byProximity;
  const homeCol=teamColor(m.home.name), awayCol=teamColor(m.away.name);
  const sideOf=p=> p.h>p.a?'h':p.h<p.a?'a':'d';
  const colOf=s=> s==='h'?homeCol : s==='a'?awayCol : '#6f6852';
  const labelOf=s=> s==='h'?ptName(m.home.name) : s==='a'?ptName(m.away.name) : 'Empate';
  // clusters (cross-lado), cada um sabe seu lado/cor; vacilões à parte
  const noPal=[], present={h:false,d:false,a:false}, cmap=new Map();
  entries.forEach(e=>{ if(!isComplete(e.pal)){ noPal.push(e); return; }
    const s=sideOf(e.pal); present[s]=true;
    const key=e.pal.h+"×"+e.pal.a; let c=cmap.get(key);
    if(!c){ c={h:e.pal.h,a:e.pal.a,key,side:s,col:colOf(s),entries:[]}; cmap.set(key,c); }
    c.entries.push(e); });
  const allClusters=[...cmap.values()];
  allClusters.forEach(c=>{ const r=scoreOne({h:c.h,a:c.a},m); c.pts=r?r.pts:-1; });
  // RISCO: quem está na mira (destaca a aposta dessa pessoa)
  const riscoSet=new Set();
  if(IS_LOCAL){ const pm=S.plays[m.id]; if(pm&&pm.risco) for(const by in pm.risco) riscoSet.add(pm.risco[by].target); }
  const tapReact = matchMedia("(hover: none)").matches;
  const usePlays = matchHasPlays(m.id);   // cartas em jogo → pontos podem divergir por pessoa
  let cravCount=0; if(showRes) entries.forEach(e=>{ const r=scoreOne(e.pal,m); if(r&&r.pts>=3) cravCount++; });
  const avUnit=(e,o)=>{
    o=o||{};
    const onRisco=riscoSet.has(e.uid);
    const u=el("div","pg-cav"+(e.uid===S.uid?" me":"")+(onRisco?" risco":"")+(o.ousado?" ousado":""));
    const av=faceAvatar(e.slug,e.name); av.title=e.name; av.style.cursor="pointer";
    av.onclick=ev=>{ ev.stopPropagation(); openProfile(e.uid); };
    u.appendChild(av);
    if(o.ousado) u.appendChild(el("span","pg-cav-emb ous","🦅"));
    if(IS_LOCAL){ const fx=playFx(e.uid,m.id); if(fx&&fx.scoreChanged){ const ic=fx.kind==='troca'?'🔀':fx.kind==='fant'?'👻':'🃏'; u.appendChild(el("span","pg-cav-fx",ic)); } }
    u.appendChild(el("div","pg-cav-nm",esc((e.name||"").split(" ")[0])));
    if(o.chip){ const ch=pgPointsChip(e.uid,m.id,m,fin); if(ch){ ch.classList.add("pg-cav-chip"); u.appendChild(ch); } }
    if(onRisco) u.appendChild(el("span","pg-cav-risco",e.uid===S.uid?"🎯 você":"🎯"));
    const rc=reactionCell(m.id,e.uid); u.appendChild(rc);
    if(tapReact){ u.classList.add("tap-react"); u.onclick=()=>{ const add=rc.querySelector(".react-add"); if(add) openReactPicker(m.id,e.uid,add); }; }
    return u;
  };
  // monta UMA linha de cluster (reusada pelos dois modos)
  const clusterRow=(c)=>{
    let faceChips=false;
    if(showRes && usePlays){ const res=matchResolve(m.id); faceChips = c.entries.some(e=> ((res.pts&&res.pts[e.uid])||0) !== c.pts); }
    const verdict = fin && !usePlays;   // veredito (dim/pop) SÓ no apito final, não no parcial ao vivo
    const row=el("div","pg-cluster"+(byProx?" prox":"")+(verdict&&c.pts>=3?" crav":"")+(verdict&&c.pts===0?" miss":""));
    if(byProx) row.style.setProperty("--cc",c.col);   // lista plana: cada linha carrega a cor do lado
    const cleft=el("div","pg-cleft");
    cleft.appendChild(el("div","pg-cscore",c.h+"×"+c.a));
    if(showRes && !faceChips){ const cls=c.pts>=3?"pts-3":c.pts>=1?"pts-1":"pts-0";
      cleft.appendChild(el("span","chip pg-chip "+cls,(c.pts>0?"+":"")+c.pts)); }  // só o número
    row.appendChild(cleft);
    const avs=el("div","pg-cavs");
    c.entries.sort((a,b)=> (b.uid===S.uid)-(a.uid===S.uid) || a.name.localeCompare(b.name)); // você primeiro
    const ousado = verdict && c.entries.length===1 && c.pts>=3 && cravCount<=2 && entries.length>=4;
    c.entries.forEach(e=>avs.appendChild(avUnit(e,{chip:faceChips, ousado})));
    row.appendChild(avs);
    return row;
  };
  // linha "inclinada": placar orientado (vencedor na cor do lado) + escudo colado; pende pro lado
  const leanRow=(c)=>{
    let faceChips=false;
    if(showRes && usePlays){ const res=matchResolve(m.id); faceChips = c.entries.some(e=> ((res.pts&&res.pts[e.uid])||0) !== c.pts); }
    const verdict = fin && !usePlays;
    const row=el("div","pg-lrow s-"+c.side+(verdict&&c.pts>=3?" crav":"")+(verdict&&c.pts===0?" miss":""));
    row.style.setProperty("--cc",c.col);
    const sblk=el("div","pg-lscoreblk");
    if(c.side!=='d'){ const cr=tpFlag(c.side==='h'?m.home.crest:m.away.crest); cr.className="pg-lcrest"; sblk.appendChild(cr); }
    const sc=el("div","pg-lscore");
    sc.innerHTML = c.side==='h' ? '<b>'+c.h+'</b><i>×</i>'+c.a
                 : c.side==='a' ? c.h+'<i>×</i><b>'+c.a+'</b>'
                 : c.h+'<i>×</i>'+c.a;
    sblk.appendChild(sc);
    if(showRes && !faceChips){ const cls=c.pts>=3?"pts-3":c.pts>=1?"pts-1":"pts-0";
      sblk.appendChild(el("span","chip pg-chip "+cls,(c.pts>0?"+":"")+c.pts)); }
    row.appendChild(sblk);
    const avs=el("div","pg-cavs");
    c.entries.sort((a,b)=> (b.uid===S.uid)-(a.uid===S.uid) || a.name.localeCompare(b.name)); // você primeiro
    const ousado = verdict && c.entries.length===1 && c.pts>=3 && cravCount<=2 && entries.length>=4;
    c.entries.forEach(e=>avs.appendChild(avUnit(e,{chip:faceChips, ousado})));
    row.appendChild(avs);
    return row;
  };
  const wrap=el("div");
  const ggrid=el("div","pg-groups2");
  if(byProx){
    // LIVE: lista plana ordenada por PROXIMIDADE ao placar atual (mais perto de cravar = topo),
    // cada linha no MESMO visual "inclinação" do reveal (placar na cor do time + escudo + rostos grandes).
    // distância = gols que faltam pro palpite virar exato (Manhattan); empate → +pts provisório, +gente.
    const sh=m.score?m.score.home:null, sa=m.score?m.score.away:null;
    const dist=c=> (sh==null||sa==null)?99 : Math.abs(c.h-sh)+Math.abs(c.a-sa);
    allClusters.sort((x,y)=> dist(x)-dist(y) || y.pts-x.pts || y.entries.length-x.entries.length || x.key.localeCompare(y.key));
    allClusters.forEach(c=> ggrid.appendChild(leanRow(c)));
  } else {
    // REVEAL "INCLINAÇÃO": cada placar PENDE pro lado apostado (casa←·empate·→fora).
    // Posição = pra quem a pessoa torceu; vencedor sai na cor do time, escudo colado no placar.
    const axis=el("div","pg-axis");
    axis.innerHTML='<span style="color:'+homeCol+'">◂ '+esc(ptName(m.home.name))+'</span>'
      +'<span style="color:var(--text-2)">empate</span>'
      +'<span style="color:'+awayCol+'">'+esc(ptName(m.away.name))+' ▸</span>';
    ggrid.appendChild(axis);
    const lanes=el("div","pg-lanes");
    const order={h:0,d:1,a:2};
    allClusters.sort((x,y)=> order[x.side]-order[y.side] || y.pts-x.pts || y.entries.length-x.entries.length || x.key.localeCompare(y.key));
    allClusters.forEach(c=> lanes.appendChild(leanRow(c)));
    if(!present.h && !present.d && !present.a){
      const e=el("div","pg-lrow s-d empty"); e.textContent="ninguém palpitou ainda 🦗"; lanes.appendChild(e);
    } else {
      // lados sem ninguém viram marcador no eixo (mantém a leitura esquerda/centro/direita)
      ['h','d','a'].filter(s=>!present[s]).forEach(s=>{
        const e=el("div","pg-lrow s-"+s+" empty"); e.style.setProperty("--cc",colOf(s));
        e.textContent=labelOf(s)+" — ninguém teve coragem 🐷"; lanes.appendChild(e);
      });
    }
    ggrid.appendChild(lanes);
  }
  if(byProx){
    // lados sem ninguém viram linha "inclinada" vazia (mesma cara do reveal), no fim da lista
    if(!present.h && !present.d && !present.a){
      const e=el("div","pg-lrow s-d empty"); e.textContent="ninguém palpitou ainda 🦗"; ggrid.appendChild(e);
    } else {
      ['h','d','a'].filter(s=>!present[s]).forEach(s=>{
        const e=el("div","pg-lrow s-"+s+" empty"); e.style.setProperty("--cc",colOf(s));
        e.textContent=labelOf(s)+" — ninguém teve coragem 🐷"; ggrid.appendChild(e);
      });
    }
  }
  wrap.appendChild(ggrid);
  if(noPal.length) wrap.appendChild(el("div","pg-vacrow","🦥 vacilaram: "+noPal.map(e=>esc(e.name)).join(", ")));
  return wrap;
}

/* ════════ REAÇÕES (dica 2) + TRASH-TALK (dica 3) ════════ */
const REACT_EMOJIS=["🔥","😂","🤡","🎯","💩","🧊"];
function reactionSummary(mid,targetUid){
  const r=((S.reactions||{})[mid]||{})[targetUid]||{};
  const counts={}; for(const from in r){ const e=r[from]; counts[e]=(counts[e]||0)+1; }
  return counts;
}
const myReaction=(mid,targetUid)=> (((S.reactions||{})[mid]||{})[targetUid]||{})[S.uid]||null;
function setReaction(mid,targetUid,emoji){
  const path="reactions/"+mid+"/"+targetUid+"/"+S.uid;
  if(myReaction(mid,targetUid)===emoji){ db.ref(path).remove().catch(()=>toast("não reagiu","err")); return; }
  // DESACOPLADO: grava a reação DIRETO (regra /reactions permite) e o evento do feed best-effort
  // (regra /activity ainda negada → .catch engole; reação NÃO depende dele pra persistir).
  db.ref(path).set(emoji).catch(()=>toast("não reagiu","err"));
  logActivity({}, {t:"react", mid:mid, target:targetUid, emoji:emoji}).catch(()=>{});
}
function reactionCell(mid,targetUid){
  const wrap=el("span","react-cell");
  const counts=reactionSummary(mid,targetUid), mine=myReaction(mid,targetUid);
  Object.keys(counts).forEach(e=>{ const c=el("span","react-chip"+(mine===e?" mine":""),e+counts[e]);
    c.onclick=ev=>{ ev.stopPropagation(); setReaction(mid,targetUid,e); }; wrap.appendChild(c); });
  const add=el("button","react-add","＋"); add.title="reagir";
  add.onclick=ev=>{ ev.stopPropagation(); openReactPicker(mid,targetUid,add); };
  wrap.appendChild(add);
  return wrap;
}
function openReactPicker(mid,targetUid,anchor){
  document.querySelectorAll('.react-pop').forEach(p=>p.remove());
  const pop=el("div","react-pop");
  REACT_EMOJIS.forEach(e=>{ const b=el("button",null,e);
    b.onclick=ev=>{ ev.stopPropagation(); setReaction(mid,targetUid,e); pop.remove(); }; pop.appendChild(b); });
  document.body.appendChild(pop);
  const r=anchor.getBoundingClientRect();
  pop.style.left=Math.max(8,Math.min(r.left-60, window.innerWidth-190))+"px";
  pop.style.top=(r.bottom+6)+"px";
  setTimeout(()=>document.addEventListener("click",function h(){ pop.remove(); document.removeEventListener("click",h); }),0);
}
function chatThread(mid){
  const msgs=Object.entries((S.chat||{})[mid]||{}).map(([id,m])=>Object.assign({id},m)).sort((a,b)=>a.ts-b.ts);
  const wrap=el("div","chat-thread open");

  // corpo: histórico COMPLETO num scroll (mais recente embaixo; rola pra cima pra ver o resto)
  const body=el("div","chat-body");
  const list=el("div","chat-list");
  if(!msgs.length) list.appendChild(el("div","chat-empty","sem resenha ainda — solta a primeira 👀"));
  else{
    // agrupa mensagens consecutivas do mesmo autor num cluster só
    const clusters=[];
    msgs.forEach(m=>{
      const lastC=clusters[clusters.length-1];
      if(lastC && lastC.uid===m.uid) lastC.msgs.push(m);
      else clusters.push({uid:m.uid, name:m.name, msgs:[m]});
    });
    clusters.forEach(c=>{
      const mine=c.uid===S.uid;
      const cl=el("div","chat-cluster"+(mine?" me":""));
      if(!mine){ const p=S.participants[c.uid]; cl.appendChild(avatar(p?p.slug:null,c.name||"?","chat-av")); }
      const bubbles=el("div","chat-bubbles");
      c.msgs.forEach((m,i)=>{
        bubbles.appendChild(el("div","chat-bub",(!mine&&i===0?'<span class="chat-who">'+esc(m.name||"?")+'</span>':'')+'<span class="chat-text">'+esc(m.text)+'</span>'));
      });
      cl.appendChild(bubbles);
      list.appendChild(cl);
    });
  }
  body.appendChild(list);
  // depois de anexar ao DOM, rola pro fim (mensagem mais recente visível)
  requestAnimationFrame(()=>{ list.scrollTop=list.scrollHeight; });

  const sendMsg=text=>{
    const cid=db.ref("chat/"+mid).push().key;
    // DESACOPLADO: grava a resenha DIRETO (regra /chat permite); evento de feed best-effort (/activity)
    db.ref("chat/"+mid+"/"+cid).set({uid:S.uid,name:S.me?S.me.name:"?",text:text.slice(0,280),ts:Date.now()})
      .catch(()=>toast("não enviou — tenta de novo","err"));
    logActivity({}, {t:"chat", mid:mid, text:text.slice(0,120)}).catch(()=>{});
  };
  const form=el("div","chat-form");
  const inp=el("input"); inp.type="text"; inp.placeholder="manda a resenha…"; inp.maxLength=280;
  inp.dataset.chat=mid; // renderScreen preserva foco/texto deste input nos re-renders ao vivo
  const send=el("button","chat-send","enviar");
  const doSend=()=>{ const t=inp.value.trim(); if(!t) return;
    inp.value=""; // limpa otimista (evita re-render restaurar o texto já enviado)
    sendMsg(t); };
  send.onclick=doSend; inp.addEventListener("keydown",e=>{ if(e.key==="Enter")doSend(); });
  form.appendChild(inp); form.appendChild(send);
  body.appendChild(form);
  wrap.appendChild(body);
  return wrap;
}

/* painel AO VIVO: placar grande + quem tá pontuando em tempo real */
function liveBoard(m){
  const s=m.score||{};
  const live=isLiveStatus(m);
  const awaiting=!live; // começou (kickoff passou) mas o feed ainda não confirmou IN_PLAY
  const paused = m.status==="PAUSED";
  const board=el("div","live-board"+(awaiting?" awaiting":"")); board.dataset.mid=m.id;
  const flag = src => src ? '<img src="'+esc(src)+'" class="lb-flag" onerror="this.style.visibility=\'hidden\'"/>' : '';
  const liveLabel = awaiting ? 'COMEÇOU' : (paused?'INTERVALO':'AO VIVO');
  const scoreHtml = (s.home==null?0:s.home)+'<i>×</i>'+(s.away==null?0:s.away);
  // topo: placar grande
  const top=el("div","lb-top");
  top.innerHTML =
    '<div class="lb-team">'+flag(m.home.crest)+'<span class="lb-nm">'+esc(ptName(m.home.name))+'</span></div>'+
    '<div class="lb-center"><div class="lb-live"><span class="live-dot"></span>'+liveLabel+'</div>'+
      '<div class="lb-score">'+scoreHtml+'</div></div>'+
    '<div class="lb-team r">'+flag(m.away.crest)+'<span class="lb-nm">'+esc(ptName(m.away.name))+'</span></div>';
  board.appendChild(top);
  if(awaiting) board.appendChild(el("div","lb-await","⏳ bola rolando — aguardando o placar ao vivo do provedor"));

  // monta lista de participantes com pontuação provisória deste jogo
  const entries=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const pal=(S.palpites[uid]||{})[m.id];
    const r=scoreOne(pal,m);
    entries.push({uid,name:p.name,slug:p.slug,pal,pts:r?r.pts:(isComplete(pal)?0:-1)});
  }
  entries.sort((a,b)=> b.pts-a.pts || a.name.localeCompare(b.name));

  // (no AO VIVO não mostramos o resumo "cravando/no resultado" nem as barras Bolão × Casas —
  //  o foco é o radar de cravada abaixo)

  // ── RADAR DO PRÓXIMO GOL: só o PRÓXIMO gol de cada lado (1 gol por card). Sinaliza apenas
  //    se tem cravada (placar exato) ou não. casa+1 (esq) · placar atual (pivô) · visitante+1 (dir) ──
  if(!awaiting && s.home!=null && s.away!=null){
    const withPal=entries.filter(e=>isComplete(e.pal));
    const cravAt=(sh,sa)=> withPal.filter(e=>scoreAt(e.pal,sh,sa)===3) // quem crava o placar EXATO
      .map(e=>({name:e.name,slug:e.slug,uid:e.uid,mine:e.uid===S.uid}));
    const homeCr=cravAt(s.home+1,s.away), awayCr=cravAt(s.home,s.away+1);
    if(homeCr.length || awayCr.length){
      const radar=el("div","lb-radar");
      radar.appendChild(el("div","radar-ttl","RADAR DO PRÓXIMO GOL"));

      const scTxt=(h,a)=>h+'<i>×</i>'+a;
      // tile do próximo gol: rostos na BORDA externa · placar+badge pro CENTRO (casa→dir, visitante→esq)
      const sideTile=(cls,team,arrow,scoreHtml,crav)=>{ // crav = quem crava esse placar (pode ser vazio)
        const dead=!crav.length;
        const t=el("div","gl-tile "+cls+(dead?" dead":""));
        t.style.setProperty("--tc", teamColor(team.name));
        const nm=esc(team.tla||ptName(team.name));
        const block=el("div","gt-block");
        block.appendChild(el("div","gt-tag",cls==="home"
          ? '<span class="gt-arr">'+arrow+'</span>'+nm : nm+'<span class="gt-arr">'+arrow+'</span>'));
        const sr=el("div","gt-srow");
        sr.appendChild(el("div","gt-score",scoreHtml));
        if(!dead) sr.appendChild(el("span","gt-badge b3","+3"));
        block.appendChild(sr);
        let outer;
        if(dead){ outer=el("div","gt-none","ninguém crava"); }
        else{ outer=el("div","gt-people");
          crav.slice(0,3).forEach(d=> outer.appendChild(faceAvatar(d.slug,d.name,d.mine?"me":"")));
          if(crav.length>3) outer.appendChild(el("span","gt-more","+"+(crav.length-3)));
        }
        t.appendChild(outer); t.appendChild(block); // outer=borda externa · block=centro
        return t;
      };

      const track=el("div","gl-track");
      track.appendChild(sideTile("home", m.home, "◂", scTxt(s.home+1,s.away), homeCr));
      // pivô central: a bola no placar ATUAL
      const pivot=el("div","gl-pivot");
      pivot.innerHTML='<span class="gp-ball">⚽</span>'
        +'<span class="gp-score">'+scTxt(s.home,s.away)+'</span>'
        +'<span class="gp-tag"><span class="live-dot"></span>AGORA</span>';
      track.appendChild(pivot);
      track.appendChild(sideTile("away", m.away, "▸", scTxt(s.home,s.away+1), awayCr));
      radar.appendChild(track);
      board.appendChild(radar);
    }
  }

  // lista de palpites — MESMA grade "inclinação" do reveal (placar na cor do time + escudo +
  // rostos grandes sem nome), mas ordenada por PROXIMIDADE ao placar atual (mais perto de cravar
  // no topo). Placar parcial pontua provisório (chips +N), sem veredito dim/pop (fin=false).
  board.appendChild(el("div","pg-secttl lb-secttl","PALPITES"));
  const list=el("div","lb-list");
  list.appendChild(buildPalpiteClusters(m, entries, {showRes: !awaiting && s.home!=null && s.away!=null, fin:false, byProximity:true}));
  board.appendChild(list);
  // TABELA DO GRUPO AO VIVO (proposta fase de grupos): posição provisória + linha de corte
  const lgt=liveGroupTable(m); if(lgt) board.appendChild(lgt);
  return board;
}
// reordenação suave estilo FLIP — compara offsetTop entre renders e desliza as linhas
const _flipPos = {};
function flipList(listEl, key){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches){ _flipPos[key]=null; return; }
  const prev=_flipPos[key];
  requestAnimationFrame(()=>{
    const rows=[...listEl.querySelectorAll("[data-uid]")];
    const now={};
    rows.forEach(r=>{ now[r.dataset.uid]=r.offsetTop; });
    if(prev){
      rows.forEach(r=>{
        const old=prev[r.dataset.uid], cur=now[r.dataset.uid];
        if(old!=null && Math.abs(old-cur)>1){
          r.style.transition="none"; r.style.transform="translateY("+(old-cur)+"px)";
          requestAnimationFrame(()=>{ r.style.transition="transform .4s cubic-bezier(.34,1.2,.5,1)"; r.style.transform=""; });
        }
      });
    }
    _flipPos[key]=now;
  });
}

/* Link discreto "assistir o jogo" — abre a live ESPECÍFICA do jogo na CazéTV numa aba nova.
   `caze.js` (na Netlify) acha o vídeo certo do jogo por título; se não achar, cai pra live
   do canal. Sem embed/restream: é só um link pro YouTube. */
const CAZE_FN = "https://cupfellas-bolao.netlify.app/.netlify/functions/caze";
const CAZE_LIVE = "https://www.youtube.com/@CazeTV/live";
const _liveUrlCache = {};
function resolveLiveUrl(m){
  if(_liveUrlCache[m.id]) return _liveUrlCache[m.id];
  const u=CAZE_FN+"?home="+encodeURIComponent(ptName(m.home.name))+"&away="+encodeURIComponent(ptName(m.away.name));
  const p=fetch(u).then(r=>r.json())
    .then(j=> j.videoId ? "https://www.youtube.com/watch?v="+j.videoId : CAZE_LIVE)
    .catch(()=>CAZE_LIVE);
  _liveUrlCache[m.id]=p;
  return p;
}
function watchLiveLink(m){
  const a=el("a","watch-live","📺 assistir o jogo");
  a.href=CAZE_LIVE; a.target="_blank"; a.rel="noopener";
  a.onclick=(e)=>{
    e.preventDefault();
    // abre a aba já (gesto do usuário, evita bloqueio de popup) e navega quando resolver o vídeo
    const w=window.open("", "_blank"); if(w) w.opener=null;
    resolveLiveUrl(m).then(url=>{ if(w) w.location.href=url; else location.href=url; });
  };
  return a;
}

/* ════════ ALAVANCA DE AVISOS NO ZAP (/triggers) ════════
   Qualquer participante liga/desliga e ajusta. A config fica no Firebase /triggers;
   um robô (rats/worldfellas-triggers.js) lê e dispara as mensagens no grupo. */
const TRIG_OPTS = [
  {k:"onGoal",       label:"⚽ Gol",            desc:"avisa no grupo quando sai gol"},
  {k:"onMatchStart", label:"🟢 Início de jogo", desc:"avisa quando a bola rola"},
  {k:"onMatchEnd",   label:"🏁 Fim de jogo",    desc:"resumo no apito final: quem cravou, quem acertou, quem vacilou"},
  {k:"lockReminder", label:"⏰ Cobrança 1h antes", desc:"chama no grupo quem ainda não cravou o palpite do próximo jogo"},
  {k:"dailyMorning", label:"☀️ Bom dia",        desc:"de manhã: ranking + jogos do dia"},
  {k:"weeklyWed",    label:"📊 Panorama (quarta)", desc:"resumão da classificação"},
];
const trigOn = k => { const v=(S.triggers||{})[k]; return v===undefined ? true : !!v; };
const masterOn = () => !!(S.triggers||{}).master;
function setTrigger(key, val){
  const upd={}; upd[key]=val;
  // registra quem mexeu, o que mexeu e pra qual estado — alimenta a linha "última mexida"
  upd.lastBy=S.me?S.me.name:"?"; upd.lastAt=Date.now();
  upd.lastKey=key; upd.lastVal=!!val;
  db.ref("triggers").update(upd).catch(()=>toast("não deu pra salvar a alavanca","err"));
}
// rótulo legível do que foi mexido (pra tooltip/histórico)
function trigLabel(k){ if(k==="master")return "os avisos do grupo"; const o=TRIG_OPTS.find(x=>x.k===k); return o?o.label:k; }
function fmtHM(ts){ try{ return new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
// frase de "quem mexeu por último" (espetáculo da alavanca — 1.3)
function lastToggleLine(){
  const t=S.triggers||{}; if(!t.lastBy||!t.lastAt) return "";
  const verbo = t.lastVal ? "ligou" : "desligou";
  return esc(t.lastBy)+" "+verbo+" "+esc(trigLabel(t.lastKey||"master"))+" às "+fmtHM(t.lastAt);
}

/* ════════ BADGES DA RODADA (dica 1) ════════
   Selos de zoeira da rodada mais recente que terminou. Tudo computado no cliente. */
// chave do "dia da rodada": jogos que começam até ~3h da manhã contam pro dia ANTERIOR
// (jogo nos EUA/Canadá que rola até de madrugada no Brasil é tecnicamente "amanhã", mas é a
//  mesma leva). Desloca 3h pra trás e usa a data local — alinhado ao fuso do navegador.
function roundDayKey(ms){ return dayKey(ms); } // mesmo corte de leva do app inteiro
function roundBadges(){
  const finished = matchList().filter(m=>m.status==="FINISHED");
  if(!finished.length) return null;
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const days=[...new Set(finished.map(m=>roundDayKey(m.kickoffMs)))].sort((a,b)=>parse(a)-parse(b));
  const dayK = days[days.length-1]; // dia mais recente com jogo encerrado
  const games = finished.filter(m=>roundDayKey(m.kickoffMs)===dayK);
  const rows=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const pal=S.palpites[uid]||{};
    let pts=0, exatos=0, zeros=0, jogou=0;
    games.forEach(m=>{ const r=scoreOne(pal[m.id],m); if(r){ jogou++; pts+=r.pts; if(r.exact)exatos++; if(r.pts===0)zeros++; } });
    rows.push({uid,name:p.name,slug:p.slug,pts,exatos,zeros,jogou});
  }
  const played=rows.filter(r=>r.jogou>0);
  if(played.length<2) return null;
  const badges=[];
  const maxPts=Math.max(...played.map(r=>r.pts));
  const minPts=Math.min(...played.map(r=>r.pts));
  const maxEx =Math.max(...played.map(r=>r.exatos));
  const maxZ  =Math.max(...played.map(r=>r.zeros));
  const ptsLbl=n=>n+(n===1?" pt":" pts");
  if(maxPts>0) badges.push({emoji:"👑",title:"Rei da Rodada",who:played.filter(r=>r.pts===maxPts),detail:ptsLbl(maxPts)});
  if(maxEx>0)  badges.push({emoji:"🔮",title:"Mãe Diná",who:played.filter(r=>r.exatos===maxEx),detail:maxEx+" cravado"+(maxEx>1?"s":"")});
  if(minPts<maxPts) badges.push({emoji:"🥬",title:"Mão de Alface",who:played.filter(r=>r.pts===minPts),detail:ptsLbl(minPts)});
  if(maxZ>=2 && maxZ>maxEx) badges.push({emoji:"🤡",title:"Palhaço da Rodada",who:played.filter(r=>r.zeros===maxZ),detail:maxZ+" no zero"});
  return {dayK, badges};
}

/* ════════ TELA: PODERES (cartas/moeda) — protótipo local ════════
   Reaproveita o flip/sheen da vitrine (lab/cards.html), namespaced em .pw-*.
   Visível só com IS_LOCAL. Persistência (/plays, /votes) e resolução na
   pontuação vêm depois (ver lab/CONTINUAR-CARTAS.md, passos 3-5). */
const PW_COST = PLAY_COST; // mesma fonte do motor (resolução)
const PW_CARDS = [
  {slug:"dobradinha", title:"Dobradinha", cost:PW_COST,
   rule:'Aquele jogo vale o <b>DOBRO</b> — pra <b>todo mundo</b>. (cap 1 por jogo)'},
  {slug:"risco", title:"Risco", cost:PW_COST,
   rule:'Mira num rival: se ele <span class="bad">vacilar</span> no resultado, <span class="bad">anula o próximo jogo dele</span> e <span class="good">você ganha +1</span>. '
       +'Se ele <span class="good">cravar</span>, ele <span class="good">ganha +1</span> nesse jogo e <span class="bad">seu próximo palpite é anulado</span>.'},
  {slug:"gol-fantasma", title:"Gol Fantasma", cost:PW_COST,
   rule:'<b>+1</b> ou <b>−1 gol</b> no palpite de um rival, na surdina. 👻'},
  {slug:"troca", title:"Troca", cost:PW_COST,
   rule:'<b>Troca o palpite</b> de dois outros. O seu <b>não</b> entra. Plante a discórdia.'},
];
// saldo = pontos de bolão ganhos − moedas gastas em cartas (1 ponto = 1 moeda).
// galera começa com o saldo de pontos que já tem hoje (decisão do Pedro, 14/06).
function spentBy(uid){
  let n=0; const P=S.plays||{};
  for(const mid in P){ const pm=P[mid]; if(!pm) continue;
    if(pm.dobradinha && pm.dobradinha.by===uid) n++;
    if(pm.risco && pm.risco[uid]) n++;
    if(pm.fantasma && pm.fantasma[uid]) n++;
    if(pm.troca && pm.troca[uid]) n++;
  }
  return n*PLAY_COST;
}
function coinsOf(uid){ return totalFor(uid, true).pts - spentBy(uid); }
function updateCoinChip(){
  const chip=$("#coinChip"); if(!chip) return;
  chip.querySelector(".coin-n").textContent = coinsOf(S.uid);
}
// tilt 3D parallax seguindo o ponteiro (mesma lógica da vitrine lab/cards.html):
// seta --rx/--ry no card, que a camada .pw-tilt lê. Some no flip por composição de camadas.
function pwBindTilt(card){
  const MAX=9;
  card.addEventListener("pointermove",e=>{
    const r=card.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
    card.style.setProperty("--ry",((px-.5)*MAX*2).toFixed(2)+"deg");
    card.style.setProperty("--rx",((.5-py)*MAX*2).toFixed(2)+"deg");
  });
  card.addEventListener("pointerleave",()=>{
    card.style.setProperty("--ry","0deg"); card.style.setProperty("--rx","0deg");
  });
}

/* ── cartas atualmente em jogo (lê S.plays) → lista achatada, mais recentes primeiro ── */
function pwActivePlays(){
  const out=[]; const P=S.plays||{};
  for(const mid in P){ const pm=P[mid]||{}; const lbl=S.matches[mid]?pwMatchLabel(S.matches[mid]):mid;
    if(pm.dobradinha) out.push({mid,lbl,ts:pm.dobradinha.ts,by:pm.dobradinha.by,icon:'🃏',txt:'dobrou o jogo'});
    if(pm.risco) for(const by in pm.risco){ const r=pm.risco[by]; out.push({mid,lbl,ts:r.ts,by,icon:'🎯',txt:'mirou em '+pwName(r.target)}); }
    if(pm.fantasma) for(const by in pm.fantasma){ const f=pm.fantasma[by]; out.push({mid,lbl,ts:f.ts,by,icon:'👻',txt:(f.delta<0?'tirou':'botou')+' 1 gol no palpite de '+pwName(f.target)}); }
    if(pm.troca) for(const by in pm.troca){ const t=pm.troca[by]; out.push({mid,lbl,ts:t.ts,by,icon:'🔀',txt:'trocou '+pwName(t.a)+' ⇄ '+pwName(t.b)}); }
  }
  return out.sort((a,b)=>(b.ts||0)-(a.ts||0));
}
/* ── jogar uma carta (protótipo LOCAL: grava em S.plays só na memória, NÃO no banco) ── */
function pwOthers(){ return Object.keys(S.participants||{}).filter(u=> u!==S.uid && !(S.participants[u]&&S.participants[u].isBot)); }
function pwName(u){ return (S.participants[u]&&S.participants[u].name)||u; }
function pwPalpitou(u,mid){ const p=(S.palpites[u]||{})[mid]; return p && p.h!=null && p.a!=null; }
// jogos onde ainda dá pra jogar carta: bola não rolou (carta trava no apito), nem adiado/cancelado.
// Ordenados pelos mais próximos primeiro (é onde a decisão urge).
function pwPlayableMatches(){
  return matchList().filter(m=> m.kickoffMs>Date.now() && m.status!=="POSTPONED" && m.status!=="CANCELLED")
    .sort((a,b)=> a.kickoffMs-b.kickoffMs);
}
function pwMatchLabel(m){
  const sc=(m.score&&m.score.home!=null)?(' '+m.score.home+'–'+m.score.away+' '):' x ';
  return ptName(m.home.name)+sc+ptName(m.away.name);
}
// label com data/hora local — usado no picker de jogos futuros (sem placar pra mostrar)
function pwMatchLabelTimed(m){
  const d=new Date(m.kickoffMs);
  const when=d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})+" "+timeLabel(m.kickoffMs);
  return ptName(m.home.name)+" x "+ptName(m.away.name)+" · "+when;
}
function pwOpt(txt,val,disabled){ const o=el('option',null,esc(txt)); o.value=val; if(disabled)o.disabled=true; return o; }
function pwField(label, control){
  const w=el('div','pw-field'); w.appendChild(el('label','pw-flabel',esc(label))); w.appendChild(control); return w;
}
function applyPlay(slug, mid, opts){
  const by=S.uid, ts=Date.now();
  S.plays=S.plays||{}; S.plays[mid]=S.plays[mid]||{}; const pm=S.plays[mid];
  if(slug==='dobradinha'){ if(pm.dobradinha){ toast('esse jogo já tem Dobradinha 🃏','err'); return false; } pm.dobradinha={by,ts}; }
  else if(slug==='risco'){ pm.risco=pm.risco||{}; pm.risco[by]={target:opts.target,ts}; }
  else if(slug==='gol-fantasma'){ pm.fantasma=pm.fantasma||{}; pm.fantasma[by]={target:opts.target,side:opts.side,delta:opts.delta,ts}; }
  else if(slug==='troca'){ pm.troca=pm.troca||{}; pm.troca[by]={a:opts.a,b:opts.b,ts}; }
  bumpResolve(); renderScreen(); renderSidebar();
  return true;
}
// mensagem de toast descrevendo a CONSEQUÊNCIA da carta jogada
function playToastMsg(slug, mid, opts){
  if(slug==='dobradinha') return '🃏 Dobradinha! esse jogo vale ×2 pra geral';
  if(slug==='risco') return '🎯 Risco em '+pwName(opts.target)+' — se ele acertar quem vence/empata/perde, ele +1 nesse jogo e SEU próximo palpite é anulado; se errar, o PRÓXIMO jogo dele é anulado e você +1';
  if(slug==='gol-fantasma'){ const e=(S.palpites[opts.target]||{})[mid];
    let novo=''; if(e&&e.h!=null){ const s=opts.side==='a'?'a':'h'; const eh=e.h, ea=e.a;
      const nh=s==='h'?Math.max(0,Math.min(20,eh+(opts.delta<0?-1:1))):eh;
      const na=s==='a'?Math.max(0,Math.min(20,ea+(opts.delta<0?-1:1))):ea;
      novo=' → vira '+nh+'×'+na; }
    return '👻 '+(opts.delta<0?'−1':'+1')+' gol no palpite de '+pwName(opts.target)+novo; }
  if(slug==='troca') return '🔀 palpites de '+pwName(opts.a)+' ⇄ '+pwName(opts.b)+' trocados';
  return 'carta na mesa 🃏';
}
// monta os campos de alvo/opção da carta dentro de `extra` (reusado pelos dois pickers)
function pwExtraFields(extra, slug, mid){
  extra.innerHTML=''; const mm=S.matches[mid];
  if(slug==='risco'||slug==='gol-fantasma'){
    const sel=el('select','pw-sel'); sel.id='pwT1';
    pwOthers().filter(u=>pwPalpitou(u,mid)).forEach(u=> sel.appendChild(pwOpt(pwName(u),u)));
    extra.appendChild(pwField(slug==='risco'?'Mirar em':'Sabotar o palpite de', sel));
    if(!sel.options.length) extra.appendChild(el('p','muted','ninguém palpitou esse jogo ainda'));
  }
  if(slug==='gol-fantasma' && mm){
    const sideSel=el('select','pw-sel'); sideSel.id='pwSide';
    sideSel.appendChild(pwOpt(ptName(mm.home.name),'h')); sideSel.appendChild(pwOpt(ptName(mm.away.name),'a'));
    extra.appendChild(pwField('No gol de', sideSel));
    const dSel=el('select','pw-sel'); dSel.id='pwDelta';
    dSel.appendChild(pwOpt('+1 gol','1')); dSel.appendChild(pwOpt('−1 gol','-1'));
    extra.appendChild(pwField('Mexer', dSel));
  }
  if(slug==='troca'){
    const others=pwOthers();
    const a=el('select','pw-sel'); a.id='pwA'; const b=el('select','pw-sel'); b.id='pwB';
    others.forEach(u=>{ a.appendChild(pwOpt(pwName(u),u)); b.appendChild(pwOpt(pwName(u),u)); });
    if(others.length>1) b.selectedIndex=1;
    extra.appendChild(pwField('Troca o palpite de', a));
    extra.appendChild(pwField('com o de', b));
  }
}
// lê e valida os campos da carta → retorna opts, ou null (com toast) se inválido
function pwReadOpts(slug){
  const opts={};
  if(slug==='risco'){ const t=$('#pwT1'); if(!t||!t.value){ toast('escolhe o alvo','err'); return null; } opts.target=t.value; }
  if(slug==='gol-fantasma'){ const t=$('#pwT1'); if(!t||!t.value){ toast('escolhe quem sabotar','err'); return null; } opts.target=t.value; opts.side=$('#pwSide').value; opts.delta=parseInt($('#pwDelta').value,10); }
  if(slug==='troca'){ const a=$('#pwA'), b=$('#pwB'); if(!a||!b){ toast('precisa de dois alvos','err'); return null; } if(a.value===b.value){ toast('escolhe duas pessoas diferentes','err'); return null; } opts.a=a.value; opts.b=b.value; }
  return opts;
}
// picker geral (tela Poderes): escolhe a CARTA → depois o JOGO → depois alvos
function openPlayPicker(card){
  if(coinsOf(S.uid) < card.cost){ toast('falta moeda 🪙','err'); return; }
  const matches=pwPlayableMatches();
  if(!matches.length){ toast('não tem jogo aberto pra jogar carta — todos já começaram','err'); return; }
  const bg=openModal('<h3>Jogar '+esc(card.title)+' · 🪙'+card.cost+'</h3>'
    +'<p class="muted">Protótipo local: grava só nesse aparelho. A carta trava no apito do jogo.</p>');
  const m=bg.querySelector('.modal');
  const mSel=el('select','pw-sel');
  matches.forEach(x=>{ const dob = card.slug==='dobradinha' && S.plays[x.id] && S.plays[x.id].dobradinha;
    mSel.appendChild(pwOpt(pwMatchLabelTimed(x)+(dob?' — já dobrado':''), x.id, dob)); });
  m.appendChild(pwField('Jogo', mSel));
  const extra=el('div'); m.appendChild(extra);
  const rebuild=()=>pwExtraFields(extra, card.slug, mSel.value);
  mSel.onchange=rebuild; rebuild();
  const row=el('div','dialog-actions');
  const cancel=el('button','btn ghost','deixa'); cancel.onclick=()=>bg.remove();
  const ok=el('button','btn','jogar · 🪙'+card.cost);
  ok.onclick=()=>{
    const mid=mSel.value; if(!mid){ toast('escolhe o jogo','err'); return; }
    const opts=pwReadOpts(card.slug); if(opts===null) return;
    if(applyPlay(card.slug, mid, opts)){ bg.remove(); toast(playToastMsg(card.slug,mid,opts)+' · −🪙'+card.cost,'ok'); }
  };
  row.appendChild(cancel); row.appendChild(ok); m.appendChild(row);
}
/* ── leque-CTA do card de jogo (aba Bolão): "Cartas 🪙N" → abre o picker já fixo no jogo ──
   Gated por IS_LOCAL (protótipo); jogo já passou = não aparece (carta trava no apito). */
function bolaoCardCTA(m){

  cta.onclick=(e)=>{ e.stopPropagation(); openCardForMatch(m.id); };

// picker por JOGO (entra pelo selo do card): NÃO é modal — escurece a tela e mostra as
// cartas 3D no centro (deal-in/float/tilt/holo, igual à vitrine). Clicar na carta = escolher.
function openCardForMatch(mid){
  const m=S.matches[mid]; if(!m) return;
  if(Date.now()>=m.kickoffMs){ toast('⏱️ a bola já rolou nesse jogo','err'); return; }
  // abre o picker MESMO sem moeda — as cartas ficam off e o clique avisa que falta saldo
  const bal=coinsOf(S.uid);
  const ov=el('div','cards-pick');
  const close=()=>{ ov.classList.remove('on'); document.removeEventListener('keydown',onEsc); setTimeout(()=>ov.remove(),200); };
  function onEsc(e){ if(e.key==='Escape') close(); }
  const x=el('button','cp-close','✕'); x.setAttribute('aria-label','fechar'); x.onclick=close; ov.appendChild(x);
  ov.onclick=e=>{ if(e.target===ov) close(); };
  const title=el('div','cp-title','<b>'+esc(ptName(m.home.name))+' × '+esc(ptName(m.away.name))+'</b> · clica na carta · trava no apito'); ov.appendChild(title);
  const deck=el('div','cp-deck'); ov.appendChild(deck);
  const step2=el('div','cp-step2'); step2.style.display='none'; ov.appendChild(step2);
  PW_CARDS.forEach(c=>{
    const already = c.slug==='dobradinha' && S.plays[mid] && S.plays[mid].dobradinha;
    const afford = bal>=c.cost && !already;
    const card=el('div','pw-card cp-card'+(afford?'':' off')); card.tabIndex= afford?0:-1;
    card.style.setProperty('--img',"url('assets/cards/"+c.slug+".png')");
    const flag = already?'<div class="cp-flag">já jogada</div>': afford?'':'<div class="cp-flag">falta 🪙</div>';
    card.innerHTML =
      '<div class="pw-inner"><div class="pw-tilt"><div class="pw-flipper">'+
        '<div class="pw-face pw-front">'+
          '<img src="assets/cards/'+c.slug+'.png" alt="'+esc(c.title)+'">'+
          '<div class="pw-fx pw-holo"></div><div class="pw-fx pw-glare"></div>'+
          '<div class="cp-cost">🪙'+c.cost+'</div>'+flag+
        '</div>'+
        '<div class="pw-face pw-back">'+
          '<div class="pw-bk-top"><div class="pw-bk-title">'+esc(c.title)+'</div><div class="pw-bk-cost">🪙'+c.cost+'</div></div>'+
          '<div class="pw-bk-desc">'+c.rule+'</div>'+
          '<div class="cp-choose">'+(afford?'clica pra escolher ✨':already?'já jogada':'falta 🪙')+'</div>'+
        '</div>'+
      '</div></div></div>';
    pwBindTilt(card);
    if(afford){ card.style.cursor='pointer';
      card.addEventListener('click',()=>chooseCard(c));
      card.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); chooseCard(c); } }); }
    else { card.style.cursor='not-allowed';
      const why = already ? 'esse jogo já tem Dobradinha 🃏'
        : 'falta moeda 🪙 — você tem '+bal+', a carta custa '+c.cost;
      card.addEventListener('click',()=>toast(why,'err')); }
    deck.appendChild(card);
  });
  function chooseCard(c){
    deck.style.display='none'; title.style.display='none';
    step2.style.display='block'; step2.innerHTML='';
    step2.appendChild(el('div','cp-chosen',
      '<img src="assets/cards/'+c.slug+'.png" alt=""><div class="cp-chosen-txt"><b>'+esc(c.title)+'</b><span>'+c.rule+'</span></div>'));
    const extra=el('div'); step2.appendChild(extra);
    pwExtraFields(extra, c.slug, mid);
    const row=el('div','cp-actions');
    const back=el('button','btn ghost','‹ trocar carta'); back.onclick=()=>{ step2.style.display='none'; deck.style.display=''; title.style.display=''; };
    const ok=el('button','btn','jogar · 🪙'+c.cost);
    ok.onclick=()=>{ const opts=pwReadOpts(c.slug); if(opts===null) return;
      if(applyPlay(c.slug, mid, opts)){ close(); toast(playToastMsg(c.slug,mid,opts)+' · −🪙'+c.cost,'ok'); } };
    row.appendChild(back); row.appendChild(ok); step2.appendChild(row);
  }
  document.body.appendChild(ov);
  document.addEventListener('keydown',onEsc);
  requestAnimationFrame(()=>ov.classList.add('on'));
}

function renderRanking(root){
  root.innerHTML="";
  const bp=badgesPanel(); if(bp) root.appendChild(bp);
  root.appendChild(el("div","panel-title rank-head",'Classificação <button id="rulesBtn2" class="btn ghost sm" style="margin-left:auto">?</button>'));

  if(!rows.length){ root.appendChild(el("div","empty","ninguém entrou ainda")); const rb0=$("#rulesBtn2"); if(rb0)rb0.onclick=showRules; return; }
  // álbum de figurinhas (5.1): caricatura é a regra, não a exceção
  const prev=prevPositions();
  const hl=rankTiers(rows);
  const animate=!_figAnimShown; _figAnimShown=true;
  const album=el("div","album");
  rows.forEach((r,i)=>album.appendChild(figCard(r,i,rows.length,prev,hl,animate)));

// posições "de ontem" (até o penúltimo dia com jogo encerrado) → variação ↑/↓ no card (5.2)
function prevPositions(){
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const days=new Set();
  for(const mid in S.matches){ const m=S.matches[mid]; if(m.status==="FINISHED") days.add(dayKey(m.kickoffMs)); }
  const sorted=[...days].sort((a,b)=>parse(a)-parse(b));
  if(sorted.length<2) return null;
  const lastDay=sorted[sorted.length-1];
  const rows=[];
  for(const uid in S.participants){ const p=S.participants[uid]; if(!p) continue;
    const pal=S.palpites[uid]||{}; let pts=0,exatos=0;
    for(const mid in S.matches){ const m=S.matches[mid];
      if(m.status!=="FINISHED" || dayKey(m.kickoffMs)===lastDay) continue;
      const r=scoreOne(pal[mid],m); if(r){ pts+=r.pts; if(r.exact)exatos++; } }
    pts+=bonusScore(S.bonus[uid]||{});
    rows.push({uid,pts,exatos,name:p.name}); }
  rows.sort((a,b)=> b.pts-a.pts || b.exatos-a.exatos || a.name.localeCompare(b.name));
  // dense rank (igual rankTiers): empatados em pontos compartilham a mesma posição "de ontem",
  // senão um empate de hoje aparece com ▲/▼ artificial só por causa do desempate por nome/exatos.
  const pts=rows.map(r=>r.pts);
  const map={}; rows.forEach(r=>{ map[r.uid]=pts.filter(p=>p>r.pts).length+1; }); return map;
}
let _figAnimShown=false;
function figCard(r,i,total,prev,hl,animate){
  hl=hl||rankTiers([r]);
  const pos=hl.rankOf[r.uid]||(i+1);
  const isLeader=hl.maxPts>0 && r.pts===hl.maxPts;
  // lanterna: TODOS os empatados no menor pontos (e não só a última linha) — empate geral no topo = sem lanterna
  const isLast=total>1 && hl.lastPts!=null && hl.lastPts<hl.maxPts && r.pts===hl.lastPts;
  let cls="fig"; if(isLeader)cls+=" top1"; if(isLast)cls+=" last"; if(isLast && hl.lastCount>1)cls+=" last-tied"; if(r.uid===S.uid)cls+=" me";
  if(!isLeader && !isLast){ if(pos===2)cls+=" p2"; else if(pos===3)cls+=" p3"; }
  // entrada na tela: se a posição mudou desde "ontem", anima o card subindo/caindo (5.2)
  if(animate && prev && prev[r.uid] && prev[r.uid]!==pos)
    cls += prev[r.uid]>pos ? " pos-up" : " pos-down";
  const c=el("div",cls);
  c.appendChild(el("div","fig-pos",isLeader?"👑":(!isLast&&pos===2)?"🥈":(!isLast&&pos===3)?"🥉":pos+"º"));
  if(prev && prev[r.uid]){ const d=prev[r.uid]-pos;
    c.appendChild(el("div","fig-delta "+(d>0?"up":d<0?"dn":"eq"), d>0?("▲"+d):d<0?("▼"+(-d)):"=")); }
  // líder vira "_rei"; lanterna (mesmo empatado) vira "_jegue"
  const av=faceAvatar(r.slug,r.name,"fig-av",isLeader?"rei":isLast?"jegue":null); av.style.cursor="pointer"; av.onclick=()=>openProfile(r.uid);
  c.appendChild(av);
  const nm=el("div","fig-nm",esc(r.name)); nm.style.cursor="pointer"; nm.onclick=()=>openProfile(r.uid);
  c.appendChild(nm);
  c.appendChild(el("div","fig-pts",String(r.pts)));
  c.appendChild(el("div","fig-lbl",(r.exatos>0?r.exatos+" exatos · ":"")+"pontos"));
  // marcas de cartas mirando neste jogador (🎯/👻/🔀) — discreto, só se houver
  const marks=playMarksFor(r.uid);
  if(marks.length){ const mw=el("div","fig-marks");
    marks.forEach(mk=>{ const s=el("span","fm"+(r.uid===S.uid?" me":""),mk[0]); s.title=mk[1]; mw.appendChild(s); });
    c.appendChild(mw); }
  if(isLast){ const fl=el("div","fig-last","🥬"); fl.style.cursor="pointer";
    fl.title="castiga o lanterna"; fl.onclick=(e)=>{ e.stopPropagation(); jegueOpen(r.uid); };
    c.appendChild(fl); }
  const sp=rankSparkline(r.uid); if(sp) c.appendChild(el("div","fig-spark",sp));
  return c;
}
// mini-sparkline: pontos ACUMULADOS por dia (dias com jogo encerrado). null se <2 dias.
function rankSparkline(uid){
  const pal=S.palpites[uid]||{};
  const byDay={};
  for(const mid in S.matches){
    const m=S.matches[mid];
    if(m.status!=="FINISHED") continue;
    const rr=scoreOne(pal[mid],m); if(!rr) continue;
    const k=dayKey(m.kickoffMs); byDay[k]=(byDay[k]||0)+rr.pts;
  }
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const days=Object.keys(byDay).sort((a,b)=>parse(a)-parse(b));
  if(days.length<2) return null;
  let acc=0; const pts=days.map(k=>(acc+=byDay[k]));
  const w=52,h=18,max=Math.max(...pts,1),step=w/(pts.length-1);
  const xy=v=>v, path=pts.map((v,idx)=>{ const x=idx*step, y=h-2-(v/max)*(h-4); return (idx?"L":"M")+x.toFixed(1)+" "+y.toFixed(1); }).join(" ");
  const lx=(pts.length-1)*step, ly=h-2-(pts[pts.length-1]/max)*(h-4);
  return '<svg class="rank-spark" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" preserveAspectRatio="none" aria-hidden="true">'
    +'<path d="'+path+'" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2" fill="currentColor"/></svg>';
}
function rankRow(r,i,total,compact,hl,prev,animate){
  hl=hl||rankTiers([r]);
  const pos=hl.rankOf[r.uid]||(i+1);
  const isLeader=hl.maxPts>0 && r.pts===hl.maxPts;
  // lanterna: TODOS os empatados no menor pontos (e não só a última linha) — empate geral no topo = sem lanterna
  const isLast=total>1 && hl.lastPts!=null && hl.lastPts<hl.maxPts && r.pts===hl.lastPts;
  let cls="rank-row";
  if(isLeader)cls+=" top1";
  if(isLast)cls+=" last";
  if(isLast && hl.lastCount>1)cls+=" last-tied";   // 2+ na lanterna → não estoura a linha (sem overlap)
  if(r.uid===S.uid)cls+=" me";
  // entrada na tela: se a posição mudou desde "ontem", anima a linha subindo/caindo (5.2)
  if(animate && prev && prev[r.uid] && prev[r.uid]!==pos)
    cls += prev[r.uid]>pos ? " pos-up" : " pos-down";
  const row=el("div",cls);
  // posição + variação ↑/↓ EMPILHADA na mesma coluna (não rouba largura → nome não trunca)
  const pe=el("div","rank-pos"); pe.appendChild(el("span","rp-n",String(pos)+"º"));
  if(prev && prev[r.uid]){ const d=prev[r.uid]-pos;
    if(d!==0) pe.appendChild(el("span","rp-d "+(d>0?"up":"dn"), d>0?("▲"+d):("▼"+(-d)))); }
  row.appendChild(pe);
  // líder vira "_rei"; lanterna (mesmo empatado) vira "_jegue"
  const av=faceAvatar(r.slug,r.name,"rank-av",isLeader?"rei":isLast?"jegue":null);
  av.onclick=()=>openProfile(r.uid);
  row.appendChild(av);
  const nameWrap=el("div","rank-name");
  nameWrap.appendChild(document.createTextNode(r.name));
  if(!compact && isLeader) nameWrap.insertAdjacentHTML("beforeend",' <span class="rank-tag lead">LÍDER</span>');
  if(!compact && isLast) nameWrap.insertAdjacentHTML("beforeend",' <span class="rank-tag lant">LANTERNA</span>');
  nameWrap.style.cursor="pointer"; nameWrap.onclick=()=>openProfile(r.uid);
  row.appendChild(nameWrap);
  // mini-sparkline de pontos por dia (só tela cheia, quando há histórico)
  if(!compact){
    const sp=rankSparkline(r.uid);
    if(sp){ const se=el("div","rank-spark-wrap",sp); row.appendChild(se); }
  }
  // mostra "exatos" só na tela cheia e quando houver (some o "0 exatos")
  const exTxt = (!compact && r.exatos>0) ? '<small>'+r.exatos+' exatos</small>' : '';
  const pts=el("div","rank-pts"); pts.innerHTML=r.pts+exTxt;
  row.appendChild(pts);
  // gatilho discreto p/ "castiga o lanterna": jeguinho no canto da linha do último
  if(isLast){
    const wh=el("button","rank-whip"); wh.type="button"; wh.textContent="🐴";
    wh.title="castiga o lanterna 🥬";
    wh.onclick=(e)=>{ e.stopPropagation(); jegueOpen(r.uid); };
    row.appendChild(wh);
  }
  return row;
}
let _sideRankAnimShown=false;
function renderSidebar(){
  const sr=$("#sideRank"); if(!sr) return;

/* ── PRESENÇA: quem tá por aqui agora. "Não mostra sala vazia": só revela com ≥2 online;
   senão mostra a última vez que alguém apareceu (offline mais recente). Dots verdes nos online. ── */
function onlineUids(){
  const p=S.presence||{}, out=[];
  for(const uid in p){ if(p[uid] && p[uid].on && S.participants[uid]) out.push(uid); }
  return out;
}
function presenceStrip(){
  const on=onlineUids();
  if(on.length>=2){
    const wrap=el("div","rail-pres");
    const row=el("div","pres-row");
    on.slice(0,6).forEach(uid=>{ const p=S.participants[uid];
      const av=faceAvatar(p.slug,p.name,"pres-av"); av.appendChild(el("span","on-dot")); row.appendChild(av); });
    row.appendChild(el("span","pres-lbl","<b>"+on.length+"</b> na área 🟢"));
    wrap.appendChild(row);
    // alguém palpitando agora (prioriza quem não é você)?
    let typer=null;
    for(const uid of on){ const pr=S.presence[uid]; if(pr&&pr.mid&&uid!==S.uid){ typer=uid; break; } }
    if(typer){ const p=S.participants[typer];
      wrap.appendChild(el("div","pres-typing","✍️ "+esc(p.name.split(" ")[0])+" tá palpitando…")); }
    return wrap;
  }
  // <2 online → "última vez por aqui" (offline mais recente, ignorando você)
  const pres=S.presence||{}; let last=null;
  for(const uid in pres){ const pr=pres[uid];
    if(!pr||!pr.ts||uid===S.uid||!S.participants[uid]) continue;
    if(!last||pr.ts>last.ts) last={uid,ts:pr.ts}; }
  if(!last) return null;  // ninguém registrado → não polui o rail
  const p=S.participants[last.uid];
  return el("div","rail-pres pres-last",'👋 por aqui <span data-ts="'+last.ts+'">'+fmtAgo(last.ts)+'</span>: <b>'+esc(p.name.split(" ")[0])+'</b>');
}

/* ── LIGA DO DIA: ranking que zera todo dia. Corrida AO VIVO durante o dia; coroa o campeão
   quando os jogos do dia acabam; dia morto mostra o último campeão + próxima jornada. ── */
function dayLeague(dayK){
  const rows=[];
  for(const uid in S.participants){ const p=S.participants[uid]; if(!p) continue;
    const pal=S.palpites[uid]||{}; let pts=0,exatos=0,played=0;
    for(const mid in S.matches){ const m=S.matches[mid];
      if(dayKey(m.kickoffMs)!==dayK) continue;
      const r=scoreOne(pal[mid],m); if(r){ pts+=r.pts; if(r.exact)exatos++; played++; } }
    rows.push({uid,slug:p.slug,name:p.name,pts,exatos,played}); }
  rows.sort((a,b)=> b.pts-a.pts || b.exatos-a.exatos || a.name.localeCompare(b.name));
  return rows;
}
function fmtDayShort(dayK){
  if(dayK===dayKey(Date.now())) return "hoje";
  if(dayK===dayKey(Date.now()-864e5)) return "ontem";
  const p=dayK.split("/"); const d=new Date(+p[2],+p[1]-1,+p[0]);
  return d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit"}).replace(/\.$/,"");
}
// dias navegáveis na Liga do Dia (asc): todo dia com jogo encerrado + hoje (se tiver jogo hoje)
function ligaNavDays(){
  const matches=matchList(); if(!matches.length) return [];
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const set=new Set(matches.filter(m=>m.status==="FINISHED").map(m=>dayKey(m.kickoffMs)));
  const todayK=dayKey(Date.now());
  if(matches.some(m=>dayKey(m.kickoffMs)===todayK)) set.add(todayK);
  return [...set].sort((a,b)=>parse(a)-parse(b));
}
let _ligaViewDay=null;  // dia em foco na Liga (null = mais recente); persiste entre rebuilds do rail
function ligaDoDiaPanel(){
  const matches=matchList(); if(!matches.length) return null;
  const navDays=ligaNavDays(); if(!navDays.length) return null;   // copa não começou → nada a mostrar
  const todayK=dayKey(Date.now());
  // dia em foco: o escolhido pelas setas (se ainda válido) ou o mais recente
  const dayK = (_ligaViewDay && navDays.indexOf(_ligaViewDay)>=0) ? _ligaViewDay : navDays[navDays.length-1];
  const idx=navDays.indexOf(dayK);
  const done=m=> m.status==="FINISHED"||m.status==="POSTPONED"||m.status==="CANCELLED";
  const dMatches=matches.filter(m=>dayKey(m.kickoffMs)===dayK);
  const isToday = dayK===todayK && dMatches.length>0;
  const live = isToday && dMatches.some(isLiveish);
  const allDone = dMatches.length>0 && dMatches.every(done);
  const rows=dayLeague(dayK).filter(r=>r.played>0);
  const panel=el("div","liga quiet");
  const head=el("div","liga-head");
  // setas pra passear pelos dias: ‹ mais antigo · mais novo ›
  const prev=el("button","liga-nav"+(idx>0?"":" off"),"‹"); prev.title="dia anterior";
  prev.onclick=ev=>{ ev.stopPropagation(); if(idx>0){ _ligaViewDay=navDays[idx-1]; requestRender({rail:true,screen:true}); } };
  const next=el("button","liga-nav"+(idx<navDays.length-1?"":" off"),"›"); next.title="dia seguinte";
  next.onclick=ev=>{ ev.stopPropagation(); if(idx<navDays.length-1){ _ligaViewDay=navDays[idx+1]; requestRender({rail:true,screen:true}); } };
  head.appendChild(prev);
  head.appendChild(el("span","liga-ttl","🏆 Liga do Dia"));
  head.appendChild(next);
  head.appendChild(el("span","liga-status"+(allDone?" crowned":""), isToday?(allDone?"encerrada":live?"AO VIVO":"hoje"):fmtDayShort(dayK)));
  panel.appendChild(head);
  if(!rows.length){
    panel.appendChild(el("div","liga-empty", isToday?"ninguém pontuou ainda hoje — a jornada tá começando 👀":"jornada sem pontuação"));
  } else {
    const top=rows.slice(0,3);
    const me=rows.find(r=>r.uid===S.uid);
    if(me && top.indexOf(me)<0) top.push(me);
    top.forEach(r=>{
      const pos=rows.indexOf(r)+1;
      const isWin=allDone && pos===1 && r.pts>0;
      const row=el("div","liga-row"+(r.uid===S.uid?" me":"")+(isWin?" win":""));
      row.appendChild(el("div","liga-pos",isWin?"👑":pos+"º"));
      row.appendChild(faceAvatar(r.slug,r.name,"liga-av",isWin?"rei":null));
      row.appendChild(el("div","liga-nm",esc(r.name.split(" ")[0])));
      row.appendChild(el("div","liga-pts",(r.pts>0?"+":"")+r.pts));
      panel.appendChild(row);
    });
  }
  // dica só quando a jornada de HOJE fecha (o "corrida rolando" ao vivo foi removido a pedido)
  if(isToday && allDone && rows.length){
    panel.appendChild(el("div","liga-foot","jornada encerrada — manda o print no grupo 📸"));
  }
  return panel;
}

/* ── MURAL: recordes vivos (client-side). Cada um só aparece quando vira "digno" (limiar);
   senão fica fora. Se nenhum qualifica, mostra "vem aí". ── */
function firstName(n){ return esc(String(n||"?").split(" ")[0]); }
// nomes dos co-recordistas: "Bala" · "Bala e Leo" · "Bala, Leo +2"
function muralNames(hs){ const f=hs.map(h=>'<b>'+firstName(h.name)+'</b>');
  return f.length===1?f[0]:f.length===2?f[0]+' e '+f[1]:f[0]+', '+f[1]+' +'+(f.length-2); }
// detalhe por jogo encerrado (pra streaks + drill-down): {m, pal, pts, exact}, em ordem cronológica
function uidFinishedDetailed(uid){
  const pal=S.palpites[uid]||{};
  return matchList().filter(m=>m.status==="FINISHED")
    .map(m=>{ const r=scoreOne(pal[m.id],m); return r?{m, pal:pal[m.id], pts:r.pts, exact:r.exact}:null; })
    .filter(Boolean);
}
// odd do resultado escolhido (casa/empate/fora) num palpite cravado
function chosenOdd(pal, od){
  if(!isComplete(pal) || !od || !od.home || !od.draw || !od.away) return null;
  return pal.h>pal.a ? od.home : pal.h<pal.a ? od.away : od.draw;
}
const ZEBRA_ODD = 6.5;  // odd do resultado >= 6.5 ≈ probabilidade implícita < ~15% (zebra "de verdade")
const CACADOR_ODD = 5.0; // sarrafo da "cravada ousada": odd >= 5.0 (~20%) já conta; ZEBRA_ODD só destaca as maiores no clique
const isMineHolders = hs => !!(S.me && hs.some(h=>h.slug===S.me.slug));
// CPUzão (slug "cpuzao") é personagem fictício e o __bot__ é sintético — ambos fora de QUALQUER recorde do Mural
const notBot = uid => { const p=S.participants[uid]||{}; return !p.isBot && p.slug!=="cpuzao"; };

/* ── RECORDES ── cada um devolve {key, ico, valence:'glory'|'shame', holders, num, label, detail()}
   ou null se ninguém qualifica. num = número-herói (placar). detail() é lazy (só roda no clique). */
function recTrail(testFn,ico,word,key,valence){
  const all=[];
  for(const uid in S.participants){ const p=S.participants[uid]; if(!p||!notBot(uid)) continue;
    const det=uidFinishedDetailed(uid);
    // RECORDE = maior sequência de jogos consecutivos que passam no teste (não a sequência atual)
    let bestLen=0,bestSum=0,bestGames=[], curLen=0,curSum=0,curGames=[];
    for(let i=0;i<det.length;i++){
      if(testFn(det[i].pts)){ curLen++; curSum+=det[i].pts; curGames.push(det[i]);
        if(curLen>bestLen||(curLen===bestLen&&curSum>bestSum)){ bestLen=curLen; bestSum=curSum; bestGames=curGames.slice(); } }
      else { curLen=0; curSum=0; curGames=[]; }
    }
    if(bestLen>=2) all.push({st:bestLen,sum:bestSum,games:bestGames,uid,slug:p.slug,name:p.name}); }
  if(!all.length) return null;
  // co-recordistas: todos com a MAIOR sequência empatam e aparecem juntos (fotinha de cada um)
  const max=Math.max(...all.map(x=>x.st));
  const win=all.filter(x=>x.st===max).sort((a,b)=>b.sum-a.sum);
  return { key, ico, valence, holders:win.map(w=>({uid:w.uid,slug:w.slug,name:w.name})),
    num:String(max), label:word+' seguidos',
    detail:()=> win.map(w=>({uid:w.uid,name:w.name,slug:w.slug,
      items:w.games.map(g=>({m:g.m,pal:g.pal,chip:(g.pts>0?'+':'')+g.pts,chipCls:g.pts>0?'gold':'dim'}))})) };
}
// odd média dos palpites cravados (>=3 com odds) — base de OUSADIA (alta) e BUNDÃO (baixa)
function avgOddsOf(uid){
  const pal=S.palpites[uid]||{}; let sum=0,n=0;
  for(const mid in S.matches){ const co=chosenOdd(pal[mid], S.odds&&S.odds[mid]); if(co==null) continue; sum+=co; n++; }
  return n>=3 ? sum/n : null;
}
function oddPicks(uid){
  const pal=S.palpites[uid]||{}; const out=[];
  for(const mid in S.matches){ const m=S.matches[mid]; const co=chosenOdd(pal[mid], S.odds&&S.odds[mid]);
    if(co!=null) out.push({m, pal:pal[mid], odd:co}); }
  return out.sort((a,b)=>a.m.kickoffMs-b.m.kickoffMs);
}
function recOdds(pick,ico,label,key,valence){
  let best=null;
  for(const uid in S.participants){ const p=S.participants[uid]; if(!p||!notBot(uid)) continue;
    const avg=avgOddsOf(uid); if(avg==null) continue;
    if(!best || pick(avg,best.v)) best={v:avg,uid,slug:p.slug,name:p.name}; }
  if(!best) return null;
  return { key, ico, valence, holders:[{uid:best.uid,slug:best.slug,name:best.name}],
    num:best.v.toFixed(2), label,
    detail:()=>[{uid:best.uid,name:best.name,slug:best.slug,
      items:oddPicks(best.uid).map(o=>({m:o.m,pal:o.pal,chip:o.odd.toFixed(2),chipCls:o.odd>=ZEBRA_ODD?'gold':''}))}] };
}
const recOusadia = ()=>recOdds((a,b)=>a>b,"🎲","mais ousado","ousado","glory");     // maior odd média
const recBundao  = ()=>recOdds((a,b)=>a<b,"🐔","só no favorito","bundao","shame");   // menor odd média
// (PROFETA / "cravados na mosca" removido a pedido — fora do Mural)
// CRAVADA OUSADA: mais resultados cravados que as odds davam < ~15% (e bateu)
function recCacador(){
  const all=[];
  for(const uid in S.participants){ const p=S.participants[uid]; if(!p||!notBot(uid)) continue;
    const hits=[];
    uidFinishedDetailed(uid).forEach(d=>{ const co=chosenOdd(d.pal, S.odds&&S.odds[d.m.id]);
      if(co!=null && co>=CACADOR_ODD && d.pts>=1) hits.push(Object.assign({odd:co}, d)); });
    if(hits.length) all.push({uid,slug:p.slug,name:p.name,hits}); }
  if(!all.length) return null;
  const max=Math.max(...all.map(x=>x.hits.length));
  const topOdd=x=>Math.max(...x.hits.map(h=>h.odd));
  const win=all.filter(x=>x.hits.length===max).sort((a,b)=>topOdd(b)-topOdd(a));
  return { key:'cacador', ico:'🦅', valence:'glory', holders:win.map(w=>({uid:w.uid,slug:w.slug,name:w.name})),
    num:String(max), label:max>1?'cravadas ousadas':'cravada ousada',
    // no clique: maiores odds primeiro; as zebras "de verdade" (>= ZEBRA_ODD) saem douradas, as demais discretas
    detail:()=> win.map(w=>({uid:w.uid,name:w.name,slug:w.slug,
      items:w.hits.slice().sort((a,b)=>b.odd-a.odd)
        .map(h=>({m:h.m,pal:h.pal,chip:'odd '+h.odd.toFixed(1),chipCls:h.odd>=ZEBRA_ODD?'gold':''}))})) };
}
/* mão de alface DA RODADA: pior pontuador da última rodada (dia) JÁ 100% encerrada —
   ancorado em dia concluído pra não dar a alface a um pé-frio no meio da jornada. */
function lastCompletedDay(){
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const byDay={};
  for(const mid in S.matches){ const m=S.matches[mid]; const k=dayKey(m.kickoffMs); (byDay[k]=byDay[k]||[]).push(m); }
  const done=m=>m.status==="FINISHED"||m.status==="POSTPONED"||m.status==="CANCELLED";
  const days=Object.keys(byDay).filter(k=> byDay[k].some(m=>m.status==="FINISHED") && byDay[k].every(done));
  if(!days.length) return null;
  return days.sort((a,b)=>parse(a)-parse(b))[days.length-1];
}
function recAlface(){
  const dayK=lastCompletedDay(); if(!dayK) return null;
  const rows=dayLeague(dayK).filter(r=>r.played>0 && notBot(r.uid));
  if(rows.length<2) return null;
  const minPts=Math.min(...rows.map(r=>r.pts));
  if(rows[0].pts===minPts) return null; // empate geral na rodada → ninguém leva a alface
  // empate no fundo: todos com a pior pontuação do dia dividem a alface (fotinha de cada um)
  const losers=rows.filter(r=>r.pts===minPts);
  const dayGames=matchList().filter(m=>dayKey(m.kickoffMs)===dayK && m.status==="FINISHED");
  return { key:'alface', ico:'🥬', valence:'shame',
    holders:losers.map(r=>({uid:r.uid,slug:r.slug,name:r.name})),
    num:(minPts>0?'+':'')+minPts, label:'mão de alface · '+fmtDayShort(dayK),
    detail:()=> losers.map(l=>({uid:l.uid,name:l.name,slug:l.slug,
      items:dayGames.map(m=>{ const r=scoreOne((S.palpites[l.uid]||{})[m.id],m);
        return {m, pal:(S.palpites[l.uid]||{})[m.id], chip:(r?(r.pts>0?'+':'')+r.pts:'—'), chipCls:(r&&r.pts>0?'':'dim')}; })})) };
}
/* "há X dias em último": dias seguidos que a MESMA pessoa fecha em último na classificação
   acumulada (reaproveita lastPlaceStreak, que já exige ≥2 dias e ignora empate geral no fundo). */
function recLanternaStreak(){
  const l=lastPlaceStreak(); if(!l) return null;
  return { key:'lanterna', ico:'🐌', valence:'shame', holders:[{uid:l.uid,slug:l.slug,name:l.name}],
    num:String(l.days), label:'dias na lanterna',
    detail:()=>[{uid:l.uid,name:l.name,slug:l.slug,
      note:'Fechou em último na classificação geral por '+l.days+' dias seguidos. Manda um abraço (ou não).'}] };
}

/* "dias dormindo": total ACUMULADO de dias (não precisa ser seguido) que a pessoa fechou
   em 1º / em último na classificação GERAL acumulada, somando cada dia com jogo encerrado.
   Memoizado por _resolveVer. Retorna { firstDays:[{uid,name,slug,days}], lastDays:[...] } ordenado. */
let _dormindo={v:-1,r:null};
function dormindoDays(){
  if(_dormindo.v===_resolveVer) return _dormindo.r;
  const out=(()=>{
    const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
    const dayset=new Set();
    for(const mid in S.matches){ const m=S.matches[mid]; if(m.status==="FINISHED") dayset.add(dayKey(m.kickoffMs)); }
    const days=[...dayset].sort((a,b)=>parse(a)-parse(b));
    if(!days.length) return null;
    const uids=Object.keys(S.participants).filter(u=>S.participants[u] && notBot(u));
    if(uids.length<2) return null;
    const firstCnt={}, lastCnt={};
    days.forEach(dayK=>{
      const dayMs=parse(dayK);
      const rows=uids.map(uid=>{ const pal=S.palpites[uid]||{}; let pts=0,ex=0;
        for(const mid in S.matches){ const m=S.matches[mid];
          if(m.status!=="FINISHED"||parse(dayKey(m.kickoffMs))>dayMs) continue;
          const r=scoreOne(pal[mid],m); if(r){ pts+=r.pts; if(r.exact)ex++; } }
        pts+=bonusScore(S.bonus[uid]||{}); return {uid,pts,ex,name:S.participants[uid].name}; });
      rows.sort((a,b)=> b.pts-a.pts || b.ex-a.ex || a.name.localeCompare(b.name));
      const maxP=Math.max(...rows.map(r=>r.pts)), minP=Math.min(...rows.map(r=>r.pts));
      if(maxP<=0 || maxP===minP) return;   // todo mundo zerado/empatado → sem ponta nem fundo nesse dia
      firstCnt[rows[0].uid]=(firstCnt[rows[0].uid]||0)+1;
      const lr=rows[rows.length-1]; lastCnt[lr.uid]=(lastCnt[lr.uid]||0)+1;
    });
    const rank=cnt=>Object.keys(cnt).map(uid=>{ const p=S.participants[uid];
      return {uid, slug:p?p.slug:null, name:p?p.name:uid, days:cnt[uid]}; })
      .sort((a,b)=> b.days-a.days || a.name.localeCompare(b.name));
    return { firstDays:rank(firstCnt), lastDays:rank(lastCnt) };
  })();
  _dormindo={v:_resolveVer, r:out};
  return out;
}
function recDormindo(which,ico,label,valence){
  const d=dormindoDays(); if(!d) return null;
  const list=which==="first"?d.firstDays:d.lastDays;
  if(!list.length) return null;
  const max=list[0].days; if(max<1) return null;
  const holders=list.filter(x=>x.days===max).map(x=>({uid:x.uid,slug:x.slug,name:x.name}));
  const placeWord=which==="first"?"na liderança":"no fundo da tabela";
  return { key:'dorme-'+which, ico, valence, holders, num:String(max), label,
    detail:()=> list.slice(0,3).map(x=>({uid:x.uid,name:x.name,slug:x.slug,
      note:x.days+(x.days===1?' dia':' dias')+' '+placeWord+' na classificação geral.'})) };
}
const recDormePonta = ()=>recDormindo("first","👑","dias dormindo na ponta","glory");
const recDormeFundo = ()=>recDormindo("last","💤","dias dormindo no fundo","shame");

// reações da lenda (só na arte ampliada): reaproveita reactions/lenda/{id}/{uid} = emoji.
// Duas opções: bater continência (🫡) ou jogar um coco (💩). PERMANENTE: clicou, travou pra sempre.
const LENDA_REACTS=["🫡","💩"];
const lendaId = L => L.id || L.img.split("/").pop().replace(/\.[a-z0-9]+$/i,"");
// hash estável do uid → posição orgânica fixa por pessoa (não pula a cada repaint)
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return h>>>0; }
function setLendaReaction(id,emoji){
  if(myReaction("lenda",id)) return;   // já reagiu → travado, não muda mais
  db.ref("reactions/lenda/"+id+"/"+S.uid).set(emoji).catch(()=>toast("reação não salvou","err"));

function openLenda(L){
  const id=lendaId(L);
  const lb=el("div","lenda-lb");
  lb.innerHTML='<span class="lb-x">×</span>'
    +'<div class="lenda-stage"><div class="lenda-aura" style="-webkit-mask-image:url(\''+esc(L.img)+'\');mask-image:url(\''+esc(L.img)+'\')"></div><img src="'+esc(L.img)+'" alt="'+esc(L.title)+'"><div class="lenda-orbit"></div></div>'
    +'<div class="lb-cap"><div class="lb-ttl">'+esc(L.title)+'</div>'
    +'<div class="lb-sub">'+esc(L.sub)+(L.date?' · '+esc(L.date):'')+'</div>'
    +(L.desc?'<p class="lb-desc">'+L.desc+'</p>':'')
    +'<div class="lenda-react"></div></div>';
  const orbit=lb.querySelector(".lenda-orbit");
  const reactBar=lb.querySelector(".lenda-react");
  function paintReacts(dataArg){
    const data=dataArg||(((S.reactions||{}).lenda)||{})[id]||{};
    const mine=data[S.uid]||null;
    // botões: só os emojis 🫡 / 💩. Reação é PERMANENTE → depois de reagir, os botões somem.
    reactBar.innerHTML="";
    if(!mine){
      LENDA_REACTS.forEach(e=>{ const b=el("button","lr-btn", e);
        b.onclick=ev=>{ ev.stopPropagation(); setLendaReaction(id,e); };
        reactBar.appendChild(b); });
    }
    // fichas flutuando em volta do grafite: emoji escolhido + nome, espalhadas de forma orgânica
    orbit.innerHTML="";
    const uids=Object.keys(data);
    const N=Math.max(uids.length,1);
    uids.forEach((u,i)=>{
      const p=S.participants[u]; if(!p) return;
      const h=hashStr(u), r1=(h%1000)/1000, r2=((h>>10)%1000)/1000, r3=((h>>20)%1000)/1000;
      // arco que DEIXA uma folga no topo-centro (sobre o rosto): laterais + base + cantos altos
      const gapHalf=48, start=-90+gapHalf, span=360-2*gapHalf;
      const base = N>1 ? start + span*(i/(N-1)) : 90;
      const ang=(base + (r1-0.5)*18) * Math.PI/180;            // jitter ±9° (irregular, sem invadir o rosto)
      const R=40 + r2*15;                                      // raio 40–55% (não um anel perfeito)
      const tok=el("div","lenda-orb"+(u===S.uid?" me":""));
      tok.style.left=(50+R*Math.cos(ang))+"%";
      tok.style.top =(50+R*Math.sin(ang))+"%";
      const inner=el("div","orb-in");
      inner.style.animationDelay=(r3*-4.5)+"s";                // dessincroniza o flutuar
      inner.style.animationDuration=(4.2+r1*2.4)+"s";
      inner.appendChild(el("span","orb-pill",'<span class="orb-e">'+data[u]+'</span> '+firstName(p.name)));
      tok.appendChild(inner); orbit.appendChild(tok);
    });
  }
  paintReacts();
  if(IS_LOCAL) lb._repaint=paintReacts;   // hook de inspeção no localhost
  // realtime enquanto a arte está aberta (reações dos outros entram na hora)
  const ref=db.ref("reactions/lenda/"+id);
  const cb=ref.on("value",snap=>paintReacts(snap.val()||{}));
  const close=()=>{ ref.off("value",cb); lb.remove(); };
  lb.onclick=ev=>{ if(ev.target.closest(".lenda-react")||ev.target.closest(".lenda-orb")) return; close(); };
  document.body.appendChild(lb);
}

  mod.appendChild(railSec("MURAL DA RODADA"));
  // discreto de propósito: é só uma curiosidade no canto — sem capa, sem número berrante, sem NOVO/reações
  const recs=[ recDormePonta(), recTrail(p=>p>=1,"🔥","acertos","acertos","glory"),

  if(!recs.length){ mod.appendChild(el("div","mural-soon","os recordes vêm aí — assim que rolar jogo 🏁")); return mod; }

/* ════════ FASE 1 — FEED DE ATIVIDADE (/activity) ════════
   Stream cronológico: confirmar palpite / reação / resenha (Fase 1, escritos pelo cliente)
   + gol/início/fim/troca-de-líder (Fase 2, função server-side). Escrita ATÔMICA (logActivity):
   o evento vai no MESMO update() da ação → feed e fonte nunca divergem. Anti-cola: o evento de
   palpite NÃO carrega placar; só o SEU cliente mostra o seu (lê de S.myPalpites). */
function logActivity(otherPaths, evt){
  const id=db.ref("activity").push().key;
  const ev=Object.assign({uid:S.uid, name:(S.me&&S.me.name)||"?", ts:Date.now()}, evt);
  const upd=Object.assign({}, otherPaths); upd["activity/"+id]=ev;
  return db.ref().update(upd);
}
function activityList(){
  const a=S.activity||{};
  return Object.keys(a).map(k=>Object.assign({id:k}, a[k])).filter(e=>e&&e.ts).sort((x,y)=>y.ts-x.ts);
}
function fmtAgo(ts){
  const s=Math.max(0,Math.floor((Date.now()-ts)/1000));
  if(s<60) return "agora";
  const m=Math.floor(s/60); if(m<60) return "há "+m+" min";
  const h=Math.floor(m/60); if(h<24) return "há "+h+" h";
  return "há "+Math.floor(h/24)+" d";
}
function matchLabel(mid){
  const m=S.matches[mid]; if(!m) return "";
  const tla=t=>String(t.tla||ptName(t.name).slice(0,3)).toUpperCase();
  return tla(m.home)+"×"+tla(m.away);
}

  const m=S.matches[mid]; if(m) S.todosDay=dayKey(m.kickoffMs);

        : esc(e.text||'');

        : esc(e.text||''));

    default:      return nm+' fez algo';

// linha de JOGO sintetizada: placar + carinhas de quem cravou + saldo do usuário. Determinístico.
function matchFeedRow(m, t, ts){
  const s=m.score||{}; if(s.home==null||s.away==null) return null;
  const cravou=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const r=scoreOne((S.palpites[uid]||{})[m.id], m); if(!r) continue;
    if(r.pts>=3) cravou.push({uid, name:p.name, slug:p.slug});
  }
  cravou.sort((a,b)=> (a.uid===S.uid?-1:0)-(b.uid===S.uid?-1:0)); // você primeiro na fileira
  const myR=scoreOne((S.palpites[S.uid]||{})[m.id], m);
  const mine = myR ? myR.pts : null;
  const id=t+"|"+m.id+"|"+s.home+"-"+s.away+"|"+cravou.length+"|"+(mine==null?"x":mine);
  return { id, t, mid:m.id, ts, score:{home:s.home,away:s.away}, cravou, mine };
}

function feedItem(e){
  if(e.t==="result"||e.t==="live") return feedMatchItem(e);
  const row=el("div","feed-it");

  const sysIco={goal:"⚽",matchstart:"🟢",matchend:"🏁"}[e.t]; // gol/início/fim: função server-side
  if(poke) row.classList.add("poke");

    if(S.presence&&S.presence[avUid]&&S.presence[avUid].on&&avUid!==S.uid) av.appendChild(el("span","on-dot")); // 🟢 online
    row.appendChild(av); }

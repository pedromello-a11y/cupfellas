// ── FEED (Fase 4): render INCREMENTAL. O módulo é persistente entre ticks; só itens
//    genuinamente novos entram (com slide-in), os que envelhecem saem, o resto fica
//    intacto (sem reload de avatar nem re-animação). "há X min" via ticker próprio. ──
function rawActivity(){ return (IS_LOCAL && window.__seedAct) ? window.__seedAct.slice() : activityList(); }
// ── FEED v2 "cara de feed": 1 jogo (encerrado/ao vivo) = 1 linha rica sintetizada de palpites+placar.
//    Os eventos crus de jogo (gol/início/fim/cravada) saem do stream — viram a linha do jogo.
//    Sociais (líder/reação/resenha/confirmar) seguem soltos no fluxo cronológico. ──
function feedEvents(){
  const raw=rawActivity();
  const cutoff=Date.now()-48*36e5;
  // ts "real" de cada jogo a partir dos eventos de sistema (fim/gol/início), p/ ordenar e janela
  const mTs={};
  raw.forEach(e=>{ if((e.t==="matchend"||e.t==="goal"||e.t==="matchstart")&&e.mid){ if(!mTs[e.mid]||e.ts>mTs[e.mid]) mTs[e.mid]=e.ts; } });
  // 1) LINHAS DE JOGO: 1 por jogo encerrado (dentro da janela 48h) ou ao vivo agora
  const rows=[];
  for(const mid in S.matches){
    const m=S.matches[mid]; if(!m) continue;
    const fin=m.status==="FINISHED", live=m.status==="IN_PLAY"||m.status==="PAUSED";
    if(!fin && !live) continue;
    const ts=mTs[mid]||m.kickoffMs||0;
    if(fin && ts<cutoff) continue;
    const r=matchFeedRow(m, fin?"result":"live", ts); if(r) rows.push(r);
  }
  // 2) EVENTOS SOCIAIS soltos no fluxo cronológico
  let social=raw.filter(e=> e.ts>=cutoff && (e.t==="lead"||e.t==="react"||e.t==="chat"));
  let rc=0; social=social.filter(e=>{ if(e.t!=="react") return true; return (++rc)<=4; }); // reação capada
  let all=rows.concat(social);
  if(S.feedMineOnly) all=all.filter(e=>{
    if(e.t==="result"||e.t==="live") return e.mine!=null || (e.cravou||[]).some(c=>c.uid===S.uid);
    return e.uid===S.uid || e.target===S.uid || e.lead===S.uid;
  });
  all.sort((a,b)=>(b.ts||0)-(a.ts||0));
  return all.slice(0,40);
}
const evKey=e=> e.id || (e.t+"|"+e.ts+"|"+(e.uid||e.mid||"")); // chave estável p/ diff (seed pode não ter id)
let _feedEls={}, _feedPrimed=false;
function renderFeedList(body){
  const events=feedEvents();
  if(!events.length){
    _feedEls={}; body.innerHTML="";
    body.appendChild(el("div","feed-empty", S.feedMineOnly?"você ainda não apareceu por aqui 👀":"tá quieto demais… 🦗 o babado vem aí"));
    _feedPrimed=true; return;
  }
  let list=body.querySelector(".feed-list");
  if(!list){ body.innerHTML=""; list=el("div","feed-list"); body.appendChild(list); }
  const keys=events.map(evKey), wanted=new Set(keys);
  for(const k in _feedEls){ if(!wanted.has(k)){ const n=_feedEls[k]; if(n&&n.parentNode)n.remove(); delete _feedEls[k]; } } // saiu da janela/filtro
  events.forEach((e,idx)=>{
    const k=keys[idx]; let node=_feedEls[k];
    if(!node){
      node=feedItem(e); node.dataset.evid=k;
      if(_feedPrimed){ node.classList.add("feed-new"); node.addEventListener("animationend",()=>node.classList.remove("feed-new"),{once:true}); } // só anima o que chega DEPOIS do 1º render
      _feedEls[k]=node;
    }
    if(list.children[idx]!==node) list.insertBefore(node, list.children[idx]||null); // reordena sem recriar
  });
  _feedPrimed=true;
}
// (faixa CRAVADAS separada removida no feed v2 — as cravadas agora vivem na fileira de
//  carinhas dentro da própria linha do jogo, sem duplicar nem brigar por espaço.)

  const a=S.bonusAnswers||{};
  const fields=[["campeao","Campeão"],["artilheiros","Artilheiro(s) — separe por vírgula"],
    ["melhorAtaque","Melhor ataque"],["melhorDefesa","Melhor defesa"],["neymar","Neymar marcou? (sim/nao)"]];
  const inputs={};
  fields.forEach(([k,l])=>{
    const f=el("div","admin-field"); f.innerHTML='<label>'+l+'</label>';
    const inp=el("input"); inp.type="text"; inp.value=a[k]||""; f.appendChild(inp); inputs[k]=inp; p3.appendChild(f);
  });
  const fb=el("div","admin-field"); fb.innerHTML='<label>Fase do Brasil</label>';
  const selB=el("select"); const o0=el("option",null,"— não pontua —"); o0.value=""; selB.appendChild(o0);
  BRASIL_FASES.forEach(f=>{ const o=el("option",null,f.label); o.value=f.k; if(a.brasilFase===f.k)o.selected=true; selB.appendChild(o); });
  fb.appendChild(selB); p3.appendChild(fb);
  const b3=el("button","btn","Salvar gabarito");
  b3.onclick=()=>{ const ans={}; fields.forEach(([k])=>ans[k]=inputs[k].value.trim()||null); ans.brasilFase=selB.value||null;
    adminCall("setBonusAnswers",{answers:ans}).then(r=>{ if(r)toast("gabarito salvo","ok"); }); };
  p3.appendChild(b3);
  root.appendChild(p3);

  // 4) gerenciar pessoas (renomear / remover duplicata)
  const pP=el("div","panel");
  pP.appendChild(el("div","panel-title","Gerenciar pessoas 👥"));
  const uids=Object.keys(S.participants||{});
  if(uids.length){
    pP.appendChild(el("div","muted","Renomeie ou remova participantes. Ex.: se \"Pedro\" e \"Nem\" são a mesma pessoa, remova o duplicado."));
    uids.sort((x,y)=>(S.participants[x].name||"").localeCompare(S.participants[y].name||"")).forEach(uid=>{
      const p=S.participants[uid];
      const row=el("div","person-row");
      const inp=el("input"); inp.type="text"; inp.value=p.name||""; inp.className="person-name";
      const tot=totalFor(uid);
      const info=el("span","person-info",esc(p.slug)+" · "+tot.pts+" pts");
      const save=el("button","btn ghost sm","salvar nome");
      save.onclick=()=>{ const nn=inp.value.trim(); if(nn) adminCall("renameParticipant",{uid,name:nn}).then(r=>{ if(r)toast("renomeado","ok"); }); };
      const del=el("button","btn sm","remover"); del.style.background="var(--red)"; del.style.color="#fff";
      del.onclick=()=>{ if(confirm("Remover \""+p.name+"\" de vez? Apaga identidade, palpites e bônus dessa pessoa."))
        adminCall("deleteParticipant",{uid,slug:p.slug}).then(r=>{ if(r){toast("removido: "+p.name,"ok"); renderAdmin(root);} }); };
      row.appendChild(inp); row.appendChild(info); row.appendChild(save); row.appendChild(del);
      pP.appendChild(row);
    });
  } else pP.appendChild(el("div","muted","Ninguém entrou ainda."));
  root.appendChild(pP);

  // 5) liberar identidade
  const p4=el("div","panel");
  p4.appendChild(el("div","panel-title","Liberar identidade"));
  p4.appendChild(el("div","muted","Pessoa trocou de celular: libera o nome pra ela entrar de novo no novo aparelho."));
  const slugs=Object.keys(S.claims||{});
  if(slugs.length){
    const sel=el("select");
    slugs.forEach(sg=>{ const o=el("option",null,sg); o.value=sg; sel.appendChild(o); });
    const f=el("div","admin-field"); f.innerHTML='<label>Slug</label>'; f.appendChild(sel); p4.appendChild(f);
    const b4=el("button","btn","Liberar claim");
    b4.onclick=()=>{ if(confirm("Liberar '"+sel.value+"'? A pessoa terá que re-escolher o nome."))
      adminCall("releaseClaim",{slug:sel.value}).then(r=>{ if(r)toast("liberado: "+sel.value,"ok"); }); };
    p4.appendChild(b4);
  } else p4.appendChild(el("div","muted","Ninguém claimou ainda."));
  root.appendChild(p4);

  // ── CPUzão ──────────────────────────────────────────────────────────────
  const p5=el("div","panel");
  p5.appendChild(el("div","panel-title","🤖 CPUzão"));
  p5.appendChild(el("div","muted","Participante sintético que crava palpites baseado nas odds da api-football. Requer API_FOOTBALL_KEY no Netlify. Limite: 100 calls/dia."));

  // Modo véspera (padrão): 2 calls de API, só os jogos de amanhã
  const b5eve=el("button","btn","Véspera — jogos de amanhã (2 calls)"); b5eve.style.marginTop="12px";
  b5eve.onclick=()=>botfellasRun(b5eve,{mode:"eve"});
  p5.appendChild(b5eve);

  // Modo janela: vários dias de uma vez
  const windowRow=el("div","row2"); windowRow.style.marginTop="10px";
  const b5win=el("button","btn ghost","Janela (2 calls/dia)");
  const daysInp=el("input"); daysInp.type="number"; daysInp.value="7"; daysInp.min=1; daysInp.max=45;
  daysInp.style.cssText="width:70px;text-align:center";
  const daysLabel=el("span","muted"," dias à frente"); daysLabel.style.alignSelf="center";
  b5win.onclick=()=>botfellasRun(b5win,{mode:"window",daysAhead:parseInt(daysInp.value)||7});
  windowRow.appendChild(b5win); windowRow.appendChild(daysInp); windowRow.appendChild(daysLabel);
  p5.appendChild(windowRow);

  // Modo backfill: cobre os jogos já rolados desde o início da Copa que o bot ainda não palpitou
  const b5back=el("button","btn ghost","Backfill — jogos já rolados desde 11/06 (2 calls/dia)");
  b5back.style.marginTop="10px";
  b5back.onclick=()=>botfellasRun(b5back,{mode:"backfill"});
  p5.appendChild(b5back);
  root.appendChild(p5);
}
function adminCall(action,extra){
  const pin=sessionStorage.getItem("wf_pin");
  return fetch("/.netlify/functions/admin",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({pin,action},extra))
  }).then(async res=>{
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      if(res.status===401){ sessionStorage.removeItem("wf_pin"); toast(data.error||"PIN errado","err"); renderScreen(); }
      else toast(data.error||"erro no admin","err");
      return null;
    }
    return data;
  }).catch(()=>{ toast("sem conexão com a function","err"); return null; });
}

function botfellasRun(btn,extra){
  const pin=sessionStorage.getItem("wf_pin");
  const orig=btn.textContent;
  btn.disabled=true; btn.textContent="rodando…";
  fetch("/.netlify/functions/botfellas",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({pin},extra))
  }).then(r=>r.json()).then(d=>{
    btn.disabled=false; btn.textContent=orig;
    if(d.ok) toast(`🤖 ${d.placed} palpites — ${d.withOdds} com odds · ${d.noOdds} empate-padrão · ${d.apiCalls} calls`,"ok");
    else toast(d.error||"erro no BotFellas","err");
  }).catch(()=>{ btn.disabled=false; btn.textContent=orig; toast("erro de rede","err"); });
}

function openModal(html){
  const root=$("#modalRoot");
  const bg=el("div","modal-bg");
  const m=el("div","modal",html);
  const close=el("button","close","×"); close.onclick=()=>bg.remove();
  m.insertBefore(close,m.firstChild);
  bg.appendChild(m); bg.onclick=e=>{ if(e.target===bg)bg.remove(); };
  root.appendChild(bg);
  return bg;
}

// perfil de um participante: bônus + palpites de jogos JÁ concluídos
// confronto direto entre você e `uid` nos jogos encerrados (6.2)
function h2h(uid){
  const myPal=S.palpites[S.uid]||{}, thPal=S.palpites[uid]||{};
  let mine=0, theirs=0, played=0, disc=null;
  matchList().forEach(x=>{
    if(x.status!=="FINISHED") return;
    const mr=scoreOne(myPal[x.id],x), tr=scoreOne(thPal[x.id],x);
    if(!mr && !tr) return;
    const myP=mr?mr.pts:0, thP=tr?tr.pts:0;
    played++;
    if(myP>thP) mine++; else if(thP>myP) theirs++;
    const gap=Math.abs(myP-thP);
    // jogo da discórdia: maior gap onde um pontuou e o outro zerou
    if(gap>0 && (myP===0 || thP===0) && (!disc || gap>disc.gap)){
      disc={m:x, gap, myP, thP, mineW:myP>thP};
    }
  });
  return {mine, theirs, played, disc};
}
function openProfile(uid){
  const p=S.participants[uid]; if(!p) return;
  const t=totalFor(uid);
  const bg=openModal('');
  const m=bg.querySelector(".modal");
  // cabeçalho
  const head=el("div","prof-head");
  head.appendChild(faceAvatar(p.slug,p.name,"prof-av"));
  const hi=el("div");
  hi.innerHTML='<div class="prof-name">'+esc(p.name)+'</div><div class="prof-pts"><b>'+t.pts+'</b> pts'+(t.exatos>0?' · '+t.exatos+' cravados':'')+'</div>';
  head.appendChild(hi);
  m.appendChild(head);
  // "Eu vs Você" (6.2): confronto direto nos mesmos jogos + o jogo da discórdia
  if(uid!==S.uid){
    const h=h2h(uid);
    if(h.played){
      const sec=el("div","prof-sec h2h");
      sec.appendChild(el("div","prof-sectitle","Eu vs Você"));
      const sb=el("div","h2h-score");
      sb.innerHTML='<span class="h2h-me'+(h.mine>=h.theirs?" win":"")+'">você <b>'+h.mine+'</b></span>'
        +'<span class="h2h-x">×</span>'
        +'<span class="h2h-them'+(h.theirs>h.mine?" win":"")+'"><b>'+h.theirs+'</b> '+esc(p.name)+'</span>';
      sec.appendChild(sb);
      sec.appendChild(el("div","h2h-sub",h.mine>h.theirs?"você leva a melhor 😎":h.theirs>h.mine?"ele te come pelas beiradas 😬":"empate técnico 🤝"));
      if(h.disc){ const d=h.disc;
        const who = d.mineW ? "você cravou e ele vacilou" : "ele cravou e você vacilou";
        sec.appendChild(el("div","h2h-disc",'🔥 <b>jogo da discórdia:</b> '+esc(ptName(d.m.home.name))+' '+d.m.score.home+'×'+d.m.score.away+' '+esc(ptName(d.m.away.name))+' — '+who+' ('+(d.mineW?'+'+d.myP+' × '+d.thP:'+'+d.thP+' × '+d.myP)+')'));
      }
      m.appendChild(sec);
    }
  }
  // bônus (só revela se travado, senão escondido por privacidade)
  const b=S.bonus[uid]||{};
  if(bonusLocked()){
    const bonusBox=el("div","prof-sec");
    bonusBox.appendChild(el("div","prof-sectitle","Bônus"));
    const items=[["Campeão",b.campeao],["Artilheiro",b.artilheiro],["Melhor ataque",b.melhorAtaque],
      ["Melhor defesa",b.melhorDefesa],["Neymar marca?",b.neymar?(b.neymar==="sim"?"SIM":"NÃO"):null],
      ["Brasil",(BRASIL_FASES.find(f=>f.k===b.brasilFase)||{}).label]];
    items.forEach(([k,v])=>{ const r=el("div","prof-row"); r.innerHTML='<span class="muted">'+k+'</span><b>'+(v?esc(v):'—')+'</b>'; bonusBox.appendChild(r); });
    m.appendChild(bonusBox);
  } else {
    m.appendChild(el("div","prof-sec muted","🔒 Bônus secretos até o apito inicial."));
  }
  // palpites de jogos concluídos
  const pal=S.palpites[uid]||{};
  const fins=matchList().filter(x=>x.status==="FINISHED");
  const box=el("div","prof-sec");
  box.appendChild(el("div","prof-sectitle","Palpites em jogos encerrados"));
  if(!fins.length){ box.appendChild(el("div","muted","Nenhum jogo terminou ainda.")); }
  else {
    fins.forEach(x=>{
      const pp=pal[x.id]; const r=scoreOne(pp,x);
      const row=el("div","prof-game");
      const cls=r? (r.pts===3?"pts-3":r.pts===1?"pts-1":"pts-0") : "pts-0";
      row.innerHTML='<span class="pg-teams">'+esc(ptName(x.home.name))+' <b>'+x.score.home+'×'+x.score.away+'</b> '+esc(ptName(x.away.name))+'</span>'
        +'<span class="pg-pal">'+(isComplete(pp)?(pp.h+'×'+pp.a):'—')+'</span>'
        +'<span class="chip '+cls+'">'+(r?(r.pts>0?'+':'')+r.pts:'0')+'</span>';
      box.appendChild(row);
    });
  }
  m.appendChild(box);
}

/* ════════ TICKER "expira em" — atualiza os contadores dos cards sem re-render ════════ */
function fmtExpira(ms){
  if(ms<=0) return null;
  const h=Math.floor(ms/36e5), m=Math.floor(ms%36e5/6e4), s=Math.floor(ms%6e4/1e3);
  const d=Math.floor(h/24);
  if(d>=1) return d+"d "+(h%24)+"h";
  if(h>=1) return h+"h "+pad(m)+"m";
  return pad(m)+"m "+pad(s)+"s";
}
setInterval(()=>{
  document.querySelectorAll("[data-expire]").forEach(elx=>{
    const ko=Number(elx.dataset.expire); const diff=ko-Date.now();
    const txt=fmtExpira(diff);
    if(txt===null){ elx.innerHTML='<span class="live-dot"></span>trancou'; elx.classList.remove("urgent"); }
    else { elx.innerHTML='🔒 tranca em <b>'+txt+'</b>'; if(diff<36e5) elx.classList.add("urgent"); }
  });
},1000);
function expiraChip(kickoffMs){
  const chip=el("span","expira"); chip.dataset.expire=kickoffMs;
  const diff=kickoffMs-Date.now(); const txt=fmtExpira(diff);
  if(txt===null) chip.innerHTML='<span class="live-dot"></span>trancou';
  else { chip.innerHTML='🔒 tranca em <b>'+txt+'</b>'; if(diff<36e5) chip.classList.add("urgent"); }
  return chip;
}

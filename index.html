.pg-lrow.s-h{justify-content:flex-start;background:linear-gradient(90deg,color-mix(in srgb,var(--cc) 15%,transparent),transparent 72%)}
.pg-lrow.s-a{flex-direction:row-reverse;background:linear-gradient(270deg,color-mix(in srgb,var(--cc) 15%,transparent),transparent 72%)}
.pg-lrow.s-d{justify-content:center;background:color-mix(in srgb,var(--cc) 9%,transparent)}
.pg-lscoreblk{display:flex;align-items:center;gap:9px;flex:none}
.pg-lrow.s-a .pg-lscoreblk{flex-direction:row-reverse}
.pg-lscore{font-family:var(--fdisp);font-weight:900;font-size:34px;line-height:1;letter-spacing:.5px;
  color:var(--text);white-space:nowrap}
.pg-lscore i{font-style:normal;color:var(--text-2);font-size:21px;margin:0 3px;vertical-align:middle}
.pg-lscore b{font-weight:900;color:var(--cc)}
.pg-lcrest{width:26px;height:19px;object-fit:contain;flex:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.pg-lrow .pg-cavs{flex:1}
.pg-lrow.s-a .pg-cavs{justify-content:flex-end}
.pg-lrow.s-d .pg-cavs{flex:none;justify-content:center}
.pg-lrow .pg-chip{flex:none}
.pg-lrow.empty{justify-content:center;font-size:12px;color:var(--text-2);font-style:italic;opacity:.5;background:none;padding:7px 4px}
/* caricatura SEM nome e SEM caixa, no maior tamanho (esquema "sticker" de antes) */
.pg-lrow .pg-cav-nm{display:none}
.pg-lrow .pg-cav{width:auto;gap:0}
.pg-lrow .pg-cav .face{width:70px;height:70px;font-size:31px}
/* veredito no apito (cravou brilha, zerou esmaece) */
.pg-lrow.crav .pg-lscore{color:var(--gold);text-shadow:0 0 14px rgba(232,197,71,.45)}
.pg-lrow.crav .pg-lscore b{color:var(--gold)}
.pg-lrow.miss{opacity:.92}
.pg-lrow.miss .pg-lscore{opacity:.45}
.pg-lrow.miss .pg-cav:not(.me):not(.risco) .face img{filter:grayscale(.75) brightness(.8);opacity:.62}
@media(max-width:520px){
  .pg-lrow .pg-cav .face{width:58px;height:58px;font-size:26px}
  .pg-lscore{font-size:28px}
}

/* seletor de dia: "trilha" — HOJE centralizado, indicador dourado deslizante, passado discreto */
.day-chips-wrap{position:relative;margin:0 -4px 16px}
.day-chips{position:relative;display:flex;gap:2px;overflow-x:auto;scroll-snap-type:x proximity;
  scrollbar-width:none;-ms-overflow-style:none;padding:2px 44px 12px}
.day-chips::-webkit-scrollbar{display:none}
/* setas pra alcançar datas fora da janela (some quando chega na ponta) */
.day-nav{position:absolute;top:3px;bottom:16px;width:32px;display:flex;align-items:center;z-index:4;
  border:0;background:transparent;padding:0;cursor:pointer}
.day-nav.l{left:0;justify-content:flex-start}
.day-nav.r{right:0;justify-content:flex-end}
.day-nav[hidden]{display:none}
.day-nav i{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
  font:900 17px/1 var(--fdisp);font-style:normal;color:var(--gold);
  background:rgba(11,10,7,.92);border:1px solid var(--border-soft);box-shadow:0 2px 9px rgba(0,0,0,.55)}
.day-nav:active i{transform:scale(.92)}
/* desktop: setas só aparecem ao passar o mouse na régua (no toque, usa-se o swipe) */
@media(hover:hover){
  .day-nav{opacity:0;pointer-events:none;transition:opacity .15s}
  .day-chips-wrap:hover .day-nav{opacity:1;pointer-events:auto}
  .day-nav:hover i{border-color:var(--gold)}
}
.day-chips button{flex:0 0 auto;scroll-snap-align:center;background:none;border:0;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;color:var(--text-2);
  padding:7px 15px 11px;transition:transform .1s}
.day-chips button:active{transform:scale(.94)}
.day-chips button .dc-tag{font-size:8px;font-weight:900;letter-spacing:.8px;color:var(--gold);
  text-transform:uppercase;height:9px;line-height:1;opacity:0;transition:opacity .2s}
.day-chips button.today .dc-tag{opacity:1}
.day-chips button .dc-wd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.8}
.day-chips button .dc-dn{font-family:var(--fdisp);font-weight:900;font-size:23px;line-height:.9;color:var(--text)}
.day-chips button.past{opacity:.4}
.day-chips button.past .dc-dn{color:var(--text-2);font-weight:700}
.day-chips button.active{opacity:1}
.day-chips button.active .dc-wd{color:var(--gold)}
.day-chips button.active .dc-dn{color:var(--gold)}
.day-chips .dc-indi{position:absolute;bottom:5px;left:0;height:3px;border-radius:3px;background:var(--gold);
  box-shadow:0 0 10px rgba(232,197,71,.55)}
.day-chips button .dc-live{position:absolute;top:5px;right:10px;width:6px;height:6px;border-radius:50%;
  background:var(--red);box-shadow:0 0 0 2px var(--bg),0 0 7px rgba(224,72,62,.8);animation:pulse 1.3s infinite}
.day-chips button .dc-pend{position:absolute;top:5px;right:10px;width:6px;height:6px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 0 2px var(--bg),0 0 7px rgba(232,197,71,.7);animation:pulse 1.3s infinite}

/* ──── painel AO VIVO (acompanhar em tempo real) — destaque DOURADO, não vermelho ──── */
.live-board{background:linear-gradient(180deg,rgba(240,204,77,.08),var(--bg-2));
  border:1.5px solid rgba(240,204,77,.5);border-radius:var(--radius);overflow:hidden;
  margin-bottom:18px;box-shadow:0 0 0 1px rgba(240,204,77,.12),0 14px 40px rgba(0,0,0,.5)}
.lb-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  padding:16px 18px 14px;background:linear-gradient(180deg,rgba(240,204,77,.11),transparent)}
.lb-team{display:flex;align-items:center;gap:10px;min-width:0}
.lb-team.r{flex-direction:row-reverse;text-align:right}
.lb-flag{width:42px;height:30px;object-fit:cover;border-radius:4px;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.lb-nm{font-family:var(--fdisp);font-weight:700;font-size:18px;line-height:1.05;color:var(--text)}
.lb-center{display:flex;flex-direction:column;align-items:center;gap:5px;flex:none}
.lb-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.5px;
  color:#1e1900;background:linear-gradient(180deg,var(--gold-bright),var(--gold));border:1px solid var(--gold);
  padding:2px 9px;border-radius:999px}
.lb-live .live-dot{background:var(--red);box-shadow:0 0 7px rgba(224,72,62,.7)}
.lb-score{font-family:var(--fdisp);font-weight:900;font-size:40px;line-height:1;color:var(--text);white-space:nowrap}
.lb-score i{font-style:normal;color:var(--text-2);font-size:26px;margin:0 8px;vertical-align:middle}
.lb-await{text-align:center;font-size:12px;color:var(--gold);font-weight:700;padding:2px 16px 12px;line-height:1.4}
.lb-summary{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 16px 12px}
.lb-sum{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--panel-2);color:var(--text-2)}
.lb-sum.s3{background:rgba(70,208,122,.16);color:var(--green);border:1px solid rgba(70,208,122,.3)}
.lb-sum.s1{background:rgba(240,204,77,.16);color:var(--gold);border:1px solid rgba(240,204,77,.3)}
.lb-list{padding:4px 8px 10px}
.lb-row{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:11px;transition:background .15s}
.lb-row + .lb-row{margin-top:2px}
.lb-row.me{background:linear-gradient(90deg,rgba(240,204,77,.14),transparent);box-shadow:inset 0 0 0 1px rgba(240,204,77,.25)}
.lb-row.top3{background:rgba(70,208,122,.07)}
.lb-rank{width:22px;text-align:center;font-family:var(--fdisp);font-weight:900;font-size:15px;color:var(--text-2);flex:none}
.lb-row .av{width:30px;height:30px;flex:none}
.lb-who{flex:0 1 auto;min-width:0;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-guess{font-family:var(--fdisp);font-weight:900;font-size:16px;color:var(--text);flex:none;min-width:42px;text-align:left}
.lb-guess.none{font-family:var(--fbody);font-weight:600;font-size:12px;color:var(--text-2)}
.lb-chip{flex:none;margin-left:auto}
/* duas colunas: lista + resenha lateral (live board e reveal) */
.lb-main,.tp-main{display:flex;flex-direction:column}
.side-ttl{font-family:var(--fdisp);font-weight:900;font-size:12px;letter-spacing:1px;color:var(--gold-dim);
  text-transform:uppercase;margin:0 0 6px;padding:0 2px}
@media(min-width:760px){
  .lb-main{flex-direction:row;gap:14px;padding:0 10px 8px;align-items:flex-start}
  .lb-main .lb-list{flex:1;min-width:0;padding:4px 0 6px}
  .lb-side{width:300px;flex:none;border-left:1px solid var(--border);padding-left:14px;align-self:stretch}
  .tp-main{flex-direction:row;gap:16px;align-items:flex-start}
  .tp-left{flex:1;min-width:0}
  .tp-side{width:300px;flex:none;border-left:1px solid var(--border);padding-left:16px}
  /* na lateral o chat ocupa a coluna */
  .lb-side .chat-thread,.tp-side .chat-thread{margin-top:0}
}
@media(max-width:759px){ .lb-side .side-ttl,.tp-side .side-ttl{display:none} }
/* ═══ RADAR DO PRÓXIMO GOL (5.2 — horizontal: rostos na borda externa · placar+badge
   pro centro · card na cor do país. casa→dir, visitante→esq) ═══ */
.lb-radar{padding:2px 13px 10px}
.radar-ttl{font-family:var(--fdisp);font-weight:900;font-size:10px;letter-spacing:2.5px;color:var(--gold-dim);
  text-align:center;margin-bottom:8px;opacity:.8;text-transform:uppercase}
.radar-ttl::before,.radar-ttl::after{content:"";display:inline-block;width:14px;height:1px;vertical-align:middle;
  margin:0 8px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.radar-ttl::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
/* faixa dos 3 tiles */
.gl-track{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:7px}
/* tile horizontal: cor via var --tc (cor do país, setada no JS) */
.gl-tile{position:relative;display:flex;align-items:center;justify-content:space-between;gap:6px;
  padding:7px 10px;border-radius:11px;overflow:hidden;
  border:1px solid color-mix(in srgb, var(--tc,#8A8268) 45%, transparent);
  background:linear-gradient(180deg, color-mix(in srgb, var(--tc,#8A8268) 16%, transparent), transparent 75%)}
.gl-tile.away{flex-direction:row-reverse}
.gl-tile.dead{opacity:.5;border-color:var(--border);background:var(--panel)}
.gt-block{display:flex;flex-direction:column;gap:2px;min-width:0}
.gl-tile.home .gt-block{align-items:flex-end;text-align:right}
.gl-tile.away .gt-block{align-items:flex-start;text-align:left}
.gt-tag{font-family:var(--fdisp);font-weight:800;font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  display:flex;align-items:center;gap:3px;white-space:nowrap;line-height:1;
  color:color-mix(in srgb, var(--tc,#8A8268) 65%, #ffffff)}
.gl-tile.dead .gt-tag{color:var(--text-2)}
.gt-arr{font-size:11px;line-height:1;opacity:.9}
.gt-srow{display:flex;align-items:center;gap:6px}
.gt-score{font-family:var(--fdisp);font-weight:900;font-size:24px;line-height:.85;color:var(--text);
  font-variant-numeric:tabular-nums}
.gt-score i{font-style:normal;opacity:.32;font-size:15px;margin:0 1px;vertical-align:1px}
/* rostos de quem CRAVA — na borda externa, um pouco maiores */
.gt-people{display:flex;align-items:center;flex:none}
.gt-people .face{width:28px;height:28px;flex:none;margin-left:-9px;border:2px solid var(--panel);border-radius:50%;
  font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.55)}
.gt-people .face:first-child{margin-left:0}
.gt-people .face.me{border-color:var(--gold)!important;z-index:1}
.gt-more{font-size:10px;font-weight:800;color:var(--text-2);margin-left:4px}
/* badge — +3 dourado sólido (cravada), +1 outline verde */
.gt-badge{font-family:var(--fdisp);font-weight:900;font-size:11px;letter-spacing:.3px;
  padding:1px 7px;border-radius:20px;font-variant-numeric:tabular-nums;line-height:1.5;flex:none}
.gt-badge.b3{background:linear-gradient(180deg,var(--gold-bright),#d8b034);color:#1a1305;
  box-shadow:0 2px 7px rgba(240,204,77,.3)}
.gt-badge.b1{background:rgba(70,208,122,.14);border:1px solid rgba(70,208,122,.5);color:var(--green)}
.gt-badge.b0{background:transparent;border:1px solid var(--border-soft);color:var(--text-2)}
.gt-none{font-size:9.5px;color:var(--text-2);font-style:italic;opacity:.65;line-height:1.2}
/* pivô central — a bola no placar ATUAL */
.gl-pivot{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  padding:0 3px;min-width:50px}
.gp-ball{font-size:16px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6));
  animation:glBob 2.3s ease-in-out infinite}
@keyframes glBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.gp-score{font-family:var(--fdisp);font-weight:900;font-size:17px;line-height:1.05;color:var(--gold-bright);
  font-variant-numeric:tabular-nums;text-shadow:0 0 12px rgba(240,204,77,.4)}
.gp-score i{font-style:normal;opacity:.4;font-size:12px;margin:0 1px}
.gp-tag{display:flex;align-items:center;gap:3px;font-family:var(--fdisp);font-weight:800;font-size:7.5px;
  letter-spacing:1.5px;color:var(--gold-dim);text-transform:uppercase}
.gp-tag .live-dot{width:4px;height:4px}
@media(max-width:420px){
  .gl-track{gap:5px} .gl-tile{padding:6px 7px}
  .gt-score{font-size:21px} .gt-score i{font-size:13px}
  .gt-people .face{width:24px;height:24px;margin-left:-8px;border-width:1.5px}
  .gt-tag{font-size:8.5px;letter-spacing:.4px} .gl-pivot{min-width:42px}
  .gt-srow{gap:4px} .gt-badge{padding:1px 6px;font-size:10.5px} }
/* ===== ALAVANCA de avisos no Zap (config no modal; gatilho no header) ===== */
.trig-box{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.trig-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;
  border-radius:11px;background:var(--panel-2);border:1px solid var(--border)}
.trig-info{display:flex;flex-direction:column;min-width:0}
.trig-info b{font-size:14px;color:var(--text)}
.trig-info span{font-size:11.5px;color:var(--text-2)}
.sw{position:relative;width:46px;height:26px;border:none;background:none;cursor:pointer;padding:0;flex:none}
.sw::before{content:"";position:absolute;inset:0;border-radius:999px;background:var(--panel);border:1px solid var(--border-soft);transition:background .2s,border-color .2s}
.sw-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#6b6450;box-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .2s,background .2s;z-index:1}
.sw.on::before{background:linear-gradient(180deg,var(--green),var(--green-deep));border-color:var(--green)}
.sw.on .sw-knob{transform:translateX(20px);background:#fff}
.trig-master{border-color:rgba(70,208,122,.4);background:linear-gradient(180deg,rgba(70,208,122,.08),var(--panel-2));margin-bottom:10px}
.trig-box.dimmed{opacity:.4;pointer-events:none;filter:grayscale(.4)}
.trig-foot{margin-top:14px;font-size:12.5px;color:var(--text-2);text-align:center;line-height:1.5}
/* ===== Badges da rodada (dica 1) ===== */
.badges-panel{margin-bottom:14px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-top:4px}
.badge-card{display:flex;align-items:center;gap:9px;padding:10px;border-radius:12px;
  background:var(--panel-2);border:1px solid var(--border);position:relative;overflow:hidden}
.badge-emoji{position:absolute;right:-6px;top:-8px;font-size:46px;opacity:.13;transform:rotate(12deg)}
.badge-av{width:38px;height:38px;flex:none}
.badge-info{min-width:0;position:relative;z-index:1}
.badge-title{font-family:var(--fdisp);font-weight:900;font-size:14px;color:var(--text);line-height:1}
.badge-who{font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-detail{font-size:11px;color:var(--text-2)}
/* ===== Reações nos palpites ===== */
.react-cell{display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.react-chip{display:inline-flex;align-items:center;gap:2px;font-size:12px;font-weight:700;
  background:var(--panel-2);border:1px solid var(--border);border-radius:999px;padding:2px 8px;cursor:pointer;transition:transform .1s}
.react-chip:active{transform:scale(.9)}
.react-chip.mine{border-color:var(--gold);background:rgba(240,204,77,.16)}
.react-add{width:25px;height:25px;border-radius:50%;border:1px dashed var(--border-soft);background:none;
  color:var(--text-2);font-size:14px;cursor:pointer;line-height:1;padding:0;flex:none;transition:all .15s}
.react-add:hover{border-color:var(--gold);color:var(--gold);border-style:solid}
/* botão de reação só aparece no hover da linha (desktop); em touch a linha toda é o gatilho */
.pg-prow2 .react-add{opacity:0}
.pg-prow2:hover .react-add{opacity:1}
@media(hover:none){
  .pg-prow2 .react-add{display:none}
  .pg-prow2.tap-react{cursor:pointer}
}
.react-pop{position:fixed;z-index:300;display:flex;gap:3px;padding:7px;background:var(--panel-2);
  border:1px solid var(--border-soft);border-radius:999px;box-shadow:var(--shadow)}
.react-pop button{background:none;border:none;font-size:22px;cursor:pointer;padding:3px 5px;border-radius:8px;line-height:1;transition:transform .12s}
.react-pop button:hover{background:rgba(240,204,77,.15);transform:scale(1.25)}
/* ===== Trash-talk / resenha — histórico rolável (mais recente embaixo) ===== */
.tp-chat{margin-top:12px;border-top:1px solid var(--border);padding-top:8px}
.tp-chat-tg{display:flex;align-items:center;gap:6px;width:100%;background:none;border:0;color:var(--text-2);font:inherit;font-size:12.5px;cursor:pointer;padding:4px 2px;text-align:left}
.tp-chat-tg:hover{color:var(--text)}
.tp-chat-tg b{color:var(--gold);font-weight:800}
.tp-chat-tg .dim{color:var(--text-2);font-weight:400}
.tp-chat-tg .tp-chat-chev{margin-left:auto;font-size:11px;opacity:.7}
.tp-chat .chat-thread{margin-top:6px;border-top:0;padding-top:0}
.chat-thread{margin-top:16px;border-top:1px solid var(--border);padding-top:10px}
.chat-body{margin-top:4px}
.chat-list{max-height:340px;overflow-y:auto;padding:2px 2px;display:flex;flex-direction:column}
.chat-empty{font-size:12.5px;color:var(--text-2);font-style:italic;padding:4px 0}
.chat-cluster{display:flex;align-items:flex-end;gap:7px;max-width:88%;margin-bottom:7px}
.chat-cluster.me{flex-direction:row-reverse;margin-left:auto}
.chat-bubbles{display:flex;flex-direction:column;gap:3px;min-width:0}
.chat-cluster.me .chat-bubbles{align-items:flex-end}
.chat-av{width:26px;height:26px;flex:none}
.chat-bub{font-size:13.5px;line-height:1.35;background:var(--panel-2);border-radius:13px;border-bottom-left-radius:4px;padding:6px 11px}
.chat-cluster.me .chat-bub{background:rgba(240,204,77,.13);border-bottom-left-radius:13px;border-bottom-right-radius:4px}
.chat-who{display:block;font-weight:800;color:var(--gold);font-size:11px;margin-bottom:1px;letter-spacing:.3px}
.chat-text{color:var(--text);word-break:break-word}
.chat-form{display:flex;gap:7px;margin-top:8px}
.chat-form input{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--border-soft);border-radius:11px;
  padding:10px 13px;color:var(--text);font-size:13.5px;font-family:var(--fbody)}
.chat-form input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,204,77,.12)}
.chat-send{background:var(--gold);color:#1a1500;border:none;border-radius:11px;padding:10px 16px;font-weight:800;font-size:13px;cursor:pointer;flex:none}
.chat-send:active{transform:translateY(1px)}
/* link discreto "assistir o jogo" (abre a live específica do jogo na CazéTV) */
.watch-live{display:block;text-align:center;margin:2px 12px 12px;font-size:12px;font-weight:700;
  color:var(--text-2);text-decoration:none;letter-spacing:.2px;cursor:pointer}
.watch-live:hover{color:var(--gold);text-decoration:underline}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(11,10,7,.97);
  display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.overlay-inner{max-width:520px;width:100%;text-align:center}
.overlay h2{font-family:var(--fdisp);font-weight:900;font-size:28px;letter-spacing:1px;margin:0 0 6px}
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin:18px 0}
.id-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 8px;text-align:center}
.id-card.taken{opacity:.4}
.id-card .av{width:54px;height:54px;font-size:22px;margin:0 auto 7px}
.id-card .nm{font-weight:700;font-size:13px}
.id-card .seal{font-size:10px;color:var(--text-2);margin-top:3px}
.id-new{display:flex;gap:8px;margin-top:14px}
.id-new input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:13px;font-size:16px;text-align:center}
.id-new input:focus{outline:none;border-color:var(--gold)}
/* login com PIN */
.login-box{display:flex;flex-direction:column;gap:10px;max-width:340px;margin:20px auto 8px}
.login-box input{background:var(--bg);color:var(--text);border:1.5px solid var(--border-soft);
  border-radius:var(--radius-sm);padding:14px;font-size:17px;text-align:center;font-weight:700}
.login-box input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,204,77,.15)}
.login-box .btn{padding:14px;font-size:16px}
.login-hint{font-size:12.5px;margin-top:4px}
.grid-label{grid-column:1/-1;font-size:12px;color:var(--text-2);font-weight:700;text-align:left;margin-bottom:-2px}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:310;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:20px}
.modal h3{font-family:var(--fdisp);font-weight:900;font-size:24px;margin:0 0 12px}
.modal .close{float:right;background:none;border:none;color:var(--text-2);font-size:22px;line-height:1}
/* perfil */
.prof-head{display:flex;align-items:center;gap:14px;margin:-4px -4px 16px;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(240,204,77,.12),var(--panel-2) 70%);border:1px solid var(--border-soft)}
.prof-av{width:84px;height:84px;flex:none}
.prof-name{font-family:var(--fdisp);font-weight:900;font-size:27px;line-height:1}
.prof-pts{color:var(--text-2);font-size:14px;margin-top:4px}
.prof-pts b{color:var(--gold);font-size:18px;font-family:var(--fdisp)}
.prof-sec{margin-top:14px}
.prof-sectitle{font-family:var(--fdisp);font-weight:900;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px}
/* Eu vs Você (6.2) */
.prof-sec.h2h{background:var(--panel-2);border:1px solid var(--border-soft);border-radius:12px;padding:12px}
.h2h-score{display:flex;align-items:center;justify-content:center;gap:12px;font-size:15px;color:var(--text-2)}
.h2h-score b{font-family:var(--fdisp);font-weight:900;font-size:26px;color:var(--text);font-variant-numeric:tabular-nums}
.h2h-me.win b,.h2h-them.win b{color:var(--gold)}
.h2h-x{color:var(--text-2);font-weight:700}
.h2h-sub{text-align:center;font-size:12px;color:var(--text-2);margin-top:4px}
.h2h-disc{margin-top:10px;font-size:12.5px;color:var(--text);line-height:1.4;border-top:1px solid var(--border);padding-top:9px}
.h2h-disc b{color:var(--gold)}
.prof-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.prof-game{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.pg-teams{flex:1;min-width:0}.pg-teams b{color:var(--gold)}
.pg-pal{color:var(--text-2);font-weight:700;white-space:nowrap}
.ex-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:14px}
.rules-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.rules-tbl td{padding:6px;border-bottom:1px solid var(--border)}
.rules-tbl td:last-child{text-align:right;color:var(--gold);font-weight:700}

/* toast */
.toast-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:400;
  display:flex;flex-direction:column;gap:8px;align-items:center;width:calc(100% - 28px);max-width:420px}
.toast{background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;font-weight:600;font-size:14px;box-shadow:var(--shadow);
  animation:toastIn .3s;text-align:center;width:100%}
.toast.err{border-color:var(--red);color:#ffb4ae}
.toast.ok{border-color:var(--green);color:#a8f0c4}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* admin */
.admin-field{margin-bottom:14px}
.admin-field label{display:block;font-weight:700;font-size:13px;margin-bottom:5px;color:var(--text-2)}
.admin-field input,.admin-field select{width:100%;background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;font-size:15px}
.admin-field input:focus,.admin-field select:focus{outline:none;border-color:var(--gold)}
.row2{display:flex;gap:10px}
.row2 > *{flex:1}
.person-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.person-row:last-child{border-bottom:none}
.person-name{flex:1;min-width:120px;background:var(--bg);color:var(--text);border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);padding:9px 11px;font-size:15px;font-weight:700}
.person-name:focus{outline:none;border-color:var(--gold)}
.person-info{font-size:12px;color:var(--text-2);font-weight:600;white-space:nowrap}

/* empty state */
.empty{text-align:center;padding:50px 20px;color:var(--text-2)}
.empty .big{font-family:var(--fdisp);font-weight:900;font-size:22px;color:var(--text);margin-bottom:8px}

/* confete */
.confetti{position:fixed;width:8px;height:8px;z-index:500;pointer-events:none;border-radius:1px}

.hidden{display:none!important}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:rot .8s linear infinite;margin:40px auto}
@keyframes rot{to{transform:rotate(360deg)}}
/* skeleton de boot (8.3) — percepção de velocidade > spinner */
@keyframes skpulse{0%,100%{opacity:.5}50%{opacity:.85}}
.boot-skel{max-width:1180px;margin:0 auto;padding:20px 14px}
.boot-skel .sk{background:linear-gradient(90deg,var(--panel),var(--panel-2),var(--panel));
  border:1px solid var(--border);border-radius:12px;animation:skpulse 1.3s ease-in-out infinite}
.sk-hero{height:98px;margin-bottom:18px}
.sk-chips{display:flex;gap:8px;margin-bottom:16px}
.sk-chip{width:76px;height:30px;border-radius:999px;display:inline-block}
.sk-card{height:120px;margin-bottom:12px}

/* ════════ MOBILE ════════ */
@media(max-width:560px){
  /* header mais compacto: countdown não quebra em 4 linhas */
  .header-row{gap:8px}
  .logo{font-size:21px}
  .countdown{font-size:11px;letter-spacing:.3px}
  .countdown .nums{font-size:14px;display:block;margin:1px 0}
  /* card de jogo: time empilha bandeira em cima + nome embaixo (sem cortar) */
  .match-body{gap:6px}
  .team{flex-direction:column;gap:5px;text-align:center;align-items:center}
  .team.away{flex-direction:column}
  .team .tname{white-space:normal;font-size:13px;line-height:1.15;max-height:2.4em;overflow:hidden}
  .crest-frame{width:46px;height:32px}
  .score-in{gap:6px}
  .score-in input{width:46px;height:48px;font-size:23px}
  .match.featured .crest-frame{width:50px;height:35px}
  .match.featured .team .tname{font-size:14px}
  /* hero um pouco menor */
  .hero{padding:14px 16px 14px 14px;gap:12px}
  .hero-pts .big{font-size:42px}
  .hero-name{font-size:21px}
}

/* ════════ PODERES — cartas/moeda (protótipo local, gated IS_LOCAL) ════════ */
/* chip de saldo discreto no header */
.coin-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--fdisp);font-weight:800;
  font-size:15px;color:var(--gold);background:rgba(232,197,71,.08);
  border:1px solid rgba(232,197,71,.35);border-radius:999px;padding:4px 11px 4px 5px;
  letter-spacing:.5px;white-space:nowrap;cursor:pointer;transition:background .2s,border-color .2s}
.coin-chip:hover{background:rgba(232,197,71,.14);border-color:rgba(232,197,71,.55)}
.coin-chip .coin{width:19px;height:19px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 35% 30%,#FFE57A,#b9912a);
  display:inline-flex;align-items:center;justify-content:center;color:#1a1500;font-size:10px;font-weight:900;
  box-shadow:0 1px 3px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,255,255,.25)}

.pw-intro{color:var(--text-2);font-size:13.5px;line-height:1.55;margin:2px 0 16px;max-width:680px}
.pw-testbanner{background:linear-gradient(180deg,rgba(232,197,71,.14),rgba(232,197,71,.05));
  border:1px solid var(--gold-dim);border-radius:10px;padding:11px 14px;margin:2px 0 14px;
  color:var(--text);font-size:13px;line-height:1.5;max-width:680px}
.pw-testbanner b{color:var(--gold)}
.pw-intro b{color:var(--gold)}
.pw-deck{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(12px,2vw,22px);perspective:1400px;max-width:1080px}
@media(max-width:760px){ .pw-deck{grid-template-columns:repeat(2,1fr);gap:14px} }
.pw-card.off{filter:grayscale(.55) opacity(.6)}
/* ── PICKER DE CARTA: overlay escuro, cartas no centro (sem modal) ── */
.cards-pick{position:fixed;inset:0;z-index:320;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(14px,3vh,26px);background:rgba(7,6,3,.84);backdrop-filter:blur(5px);opacity:0;transition:opacity .25s;padding:24px}
.cards-pick.on{opacity:1}
.cp-close{position:fixed;top:18px;right:20px;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  font-size:24px;color:var(--text-2);background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;transition:.2s}
.cp-close:hover{color:var(--text);background:rgba(255,255,255,.12)}
.cp-title{font-family:var(--fdisp);font-weight:800;font-size:14px;letter-spacing:.4px;color:var(--text-2);
  text-align:center;text-transform:uppercase;max-width:560px}
.cp-title b{color:var(--text)}
.cp-deck{display:flex;flex-wrap:wrap;gap:clamp(14px,2.5vw,28px);justify-content:center;align-items:center;perspective:1400px;max-width:1000px}
.cp-card{width:clamp(150px,20vw,216px);aspect-ratio:880/1227;flex:none}
@media(max-width:560px){ .cp-card{width:clamp(132px,40vw,178px)} .cp-deck{gap:14px} }
/* selo de custo: dimensionado e posicionado pra COBRIR TOTALMENTE o "3" do PNG (sem reexportar a arte) */
.cp-cost{position:absolute;top:3%;right:3%;min-width:22%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fdisp);font-weight:900;font-size:clamp(10px,1.25vw,13px);color:#1a1500;
  background:linear-gradient(180deg,#FFE57A,var(--gold));border-radius:7px;padding:3px 6px;z-index:3;
  box-shadow:0 0 0 2px #0d0a05}
.cp-flag{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;white-space:nowrap;
  background:rgba(224,72,62,.88);color:#fff;padding:2px 8px;border-radius:6px;z-index:3}
.cp-choose{margin-top:8px;text-align:center;font-family:var(--fdisp);font-weight:800;font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
/* passo 2: carta escolhida + alvos (painel enxuto sobre a tela escura) */
.cp-step2{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.cp-chosen{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.cp-chosen img{width:46px;aspect-ratio:880/1227;object-fit:contain;flex:none;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}
.cp-chosen-txt b{font-family:var(--fdisp);font-size:18px;color:var(--gold);display:block;line-height:1}
.cp-chosen-txt span{font-size:12px;color:var(--text-2);line-height:1.4}
.cp-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

/* camadas (como na vitrine): deal-in → float → tilt parallax → flip */
.pw-card{position:relative;aspect-ratio:880/1227;cursor:pointer;
  opacity:0;animation:pwDeal .65s cubic-bezier(.2,.8,.2,1) forwards}
.pw-card:nth-child(1){animation-delay:.04s}
.pw-card:nth-child(2){animation-delay:.13s}
.pw-card:nth-child(3){animation-delay:.22s}
.pw-card:nth-child(4){animation-delay:.31s}
@keyframes pwDeal{from{opacity:0;transform:translateY(40px) scale(.94)}to{opacity:1;transform:translateY(0)}}
.pw-inner{position:absolute;inset:0;transform-style:preserve-3d;animation:pwFloat 5.5s ease-in-out infinite}
.pw-card:nth-child(2) .pw-inner{animation-delay:-1.3s}
.pw-card:nth-child(3) .pw-inner{animation-delay:-2.6s}
.pw-card:nth-child(4) .pw-inner{animation-delay:-3.9s}
@keyframes pwFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pw-tilt{position:absolute;inset:0;transform-style:preserve-3d;
  transition:transform .25s cubic-bezier(.2,.7,.2,1);
  transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg))}
.pw-flipper{position:absolute;inset:0;transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.2,.8,.2,1)}
.pw-card:hover .pw-flipper,.pw-card:focus-within .pw-flipper,.pw-card.flipped .pw-flipper{transform:rotateY(180deg)}
.pw-card:hover .pw-flipper{transition:transform .35s cubic-bezier(.2,.8,.2,1)}
.pw-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px}
.pw-front img{width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 12px 22px rgba(0,0,0,.55));transition:filter .3s}
.pw-card:hover .pw-front img{filter:drop-shadow(0 16px 30px rgba(0,0,0,.65)) drop-shadow(0 0 22px rgba(232,197,71,.4))}
/* sheen recortado no formato da carta (holo arco-íris + glare branco) */
.pw-fx{position:absolute;inset:0;pointer-events:none;
  -webkit-mask:var(--img) center/contain no-repeat;mask:var(--img) center/contain no-repeat}
.pw-glare{background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.45) 48%,transparent 62%);
  background-size:250% 250%;mix-blend-mode:overlay;opacity:.5;animation:pwSheen 4.6s linear infinite}
.pw-holo{background:linear-gradient(115deg,transparent 28%,rgba(255,120,220,.55),rgba(120,200,255,.55),rgba(120,255,180,.55),transparent 72%);
  background-size:300% 300%;mix-blend-mode:color-dodge;opacity:.13;animation:pwSheen 9s linear infinite}
@keyframes pwSheen{0%{background-position:140% 0}100%{background-position:-80% 0}}
@media(prefers-reduced-motion:reduce){
  .pw-card{animation:none;opacity:1}
  .pw-inner,.pw-glare,.pw-holo{animation:none}
}

.pw-back{transform:rotateY(180deg);overflow:hidden;
  background:linear-gradient(180deg,#1a1709,#100d06);border:2px solid var(--gold);
  box-shadow:0 0 22px rgba(232,197,71,.2), inset 0 0 0 1px var(--border);
  display:flex;flex-direction:column;padding:14px 13px 12px}
.pw-back::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red) 0 33.3%,var(--green) 33.3% 66.6%,#3a86ff 66.6% 100%)}
.pw-bk-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-top:5px}
.pw-bk-title{font-family:var(--fdisp);font-weight:900;font-size:clamp(15px,2.2vw,20px);line-height:.92;
  text-transform:uppercase;background:linear-gradient(180deg,#FFE57A,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.pw-bk-cost{flex:none;font-family:var(--fdisp);font-weight:900;font-size:12px;color:#1a1500;
  background:linear-gradient(180deg,#FFE57A,var(--gold));border-radius:999px;padding:1px 8px;line-height:1.5}
.pw-bk-desc{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:6px;
  font-size:clamp(11.5px,1.5vw,14px);font-weight:600;line-height:1.45;color:var(--text)}
.pw-bk-desc b{color:var(--gold)} .pw-bk-desc .bad{color:var(--red)} .pw-bk-desc .good{color:var(--green)}
.pw-play{margin-top:8px;width:100%;font-family:var(--fdisp);font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;font-size:12.5px;color:#1a1500;cursor:pointer;
  background:linear-gradient(180deg,#FFE57A,var(--gold));border:none;border-radius:8px;padding:8px;
  transition:transform .12s, filter .2s}
.pw-play:hover{transform:translateY(-1px);filter:brightness(1.06)}
.pw-play:disabled{background:#2a2616;color:var(--text-2);cursor:not-allowed;transform:none;filter:none}
.pw-foot{margin:16px 0 0;font-size:12.5px;color:var(--text-2);line-height:1.5}
.pw-foot b{color:var(--gold)}
.pw-field{margin:12px 0 0}
.pw-flabel{display:block;font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.pw-sel{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px}
.pw-sel:focus{outline:none;border-color:var(--gold)}
.pw-mesa{margin-top:26px}
.pw-play-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;padding:9px 12px;border:1px solid var(--border);

// com fallback automático (onerror) pro avatar de sempre e depois pra inicial.
function avatarCandidates(slug,name,variant){
  const bases=[];
  if(variant){
    if(slug)bases.push(slug+"_"+variant);
    const vBySlugName=slugify(name); if(vBySlugName && !bases.includes(vBySlugName+"_"+variant))bases.push(vBySlugName+"_"+variant);
  }
  if(slug)bases.push(slug);
  const bySlugName=slugify(name); if(bySlugName && !bases.includes(bySlugName))bases.push(bySlugName);
  // variantes (jegue/rei) podem ser webp animado → tenta .webp antes do .png; restante só .png
  const c=[];
  for(const b of bases){
    if(variant && b.endsWith("_"+variant)) c.push(b+".webp");
    c.push(b+".png");
  }
  return c;
}

    img.onerror = ()=>tryNext(cands.slice(1));
  };
  wrap.textContent = initial;
  tryNext(avatarCandidates(slug,name));
  return wrap;
}
// rosto puro (sem círculo/borda) — a caricatura transparente vira um sticker
function faceAvatar(slug,name,cls,variant){
  const initial = (name||"?").trim().charAt(0).toUpperCase();
  const wrap = el("span","face "+(cls||""));
  wrap.textContent = initial;
  const tryNext = (cands)=>{
    if(!cands.length) return;
    const img = new Image();
    img.src = "assets/avatars/"+cands[0];
    img.onload = ()=>{ wrap.textContent=""; wrap.appendChild(img);
      // camada de fumaça opcional ({base}_smoke.webp): sobrepõe alinhada ao sticker,
      // mesmo enquadramento (contain/bottom-center). Se não existir, onerror remove.
      if(variant){
        const base=cands[0].replace(/\.(webp|png)$/i,"");
        const sm=new Image();
        sm.src="assets/avatars/"+base+"_smoke.webp";
        sm.alt=""; sm.setAttribute("aria-hidden","true");
        sm.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:bottom center;pointer-events:none;filter:none";
        sm.onload=()=>{ wrap.style.position="relative"; wrap.appendChild(sm); };
        sm.onerror=()=>{};
      }
    };
    img.onerror = ()=>tryNext(cands.slice(1));
  };
  tryNext(avatarCandidates(slug,name,variant));
  return wrap;
}

let _listening=false;
function attachListeners(){
  if(_listening) return; _listening=true;
  const bind = (path, key, transform) => db.ref(path).on("value", s=>{
    S[key] = transform ? transform(s.val()) : (s.val()||{});
    onData(key);
  });
  bind("matches","matches");
  bind("claims","claims");
  bind("participants","participants",v=>{ const o=v||{};
    for(const k in o){ if(o[k]&&o[k].name) o[k]=Object.assign({},o[k],{name:capName(o[k].name)}); }
    return o; });
  bind("palpites","palpites");
  bind("bonus","bonus");
  bind("bonusAnswers","bonusAnswers");
  db.ref("standings").on("value", s=>{ S.standings=s.val()||[]; onData("standings"); });
  db.ref("scorers").on("value", s=>{ S.scorers=s.val()||[]; onData("scorers"); });
  bind("meta","meta");
  bind("triggers","triggers");   // alavanca de avisos no Zap
  bind("reactions","reactions"); // reações nos palpites
  bind("chat","chat");           // trash-talk por jogo
  bind("plays","plays");         // poderes/cartas jogadas (resolução no cliente)
  bind("odds","odds");            // odds do CPUzão p/ mostrar o favorito no card
  bind("presence","presence");    // quem tá online agora (Fase 3)
  // FEED (Fase 1): últimos 50 eventos do /activity. Ordena por "ts" (índice em database.rules.json)
  // porque eventos do servidor usam chave determinística (g_/s_/e_/c_, não-cronológica) p/ não duplicar.
  db.ref("activity").orderByChild("ts").limitToLast(50).on("value", s=>{ S.activity=s.val()||{}; onData("activity"); });
  // meus palpites/bonus
  db.ref("palpites/"+S.uid).on("value", s=>{ S.myPalpites=s.val()||{}; onData("myPalpites"); });
  db.ref("bonus/"+S.uid).on("value", s=>{ S.myBonus=s.val()||{}; onData("myBonus"); });
  setupPresence();
}

/* ════════ PRESENÇA (Fase 3): quem tá online agora ════════
   /presence/{uid} = {on:1|0, ts:serverTs, mid?:jogo em edição}. onDisconnect MARCA offline
   (não remove → preserva "última vez aqui"). Padrão .info/connected reata na reconexão.
   Em local a escrita é negada (regra não publicada) → falha quieta; valida no deploy. */
let _presRef=null;
function setupPresence(){
  if(!S.uid || _presRef) return;
  try{
    const SV=firebase.database.ServerValue.TIMESTAMP;
    _presRef=db.ref("presence/"+S.uid);
    db.ref(".info/connected").on("value", s=>{
      if(s.val()===false) return;
      _presRef.onDisconnect().update({on:0, ts:SV})
        .then(()=>_presRef.update({on:1, ts:SV}))
        .catch(()=>{});
    });
  }catch(e){}
}
// "tá palpitando…": marca o jogo em edição (foco no input) e limpa no blur
function presenceTyping(mid){
  if(!_presRef) return;
  _presRef.update({mid: mid||null, ts:firebase.database.ServerValue.TIMESTAMP}).catch(()=>{});
}

// ════════ ROBÔ NO BOLÃO (7.1) — participante sintético, 100% no cliente (não escreve no RTDB) ════════
const BOT_UID="__bot__";
const botEnabled = ()=> !!(S.triggers||{}).botOn;
// palpite determinístico do robô: hash do id do jogo → um placar fixo (ele "nem assiste")
function botGuess(m){
  if(!m||!m.home||!m.away) return null;
  if(m.home.name==="A definir"||m.away.name==="A definir") return null;
  let hsh=0; const id=String(m.id); for(let i=0;i<id.length;i++) hsh=(hsh*31+id.charCodeAt(i))>>>0;
  const opts=[[2,1],[1,0],[2,0],[1,1],[0,1]]; const o=opts[hsh%opts.length];
  return {h:o[0], a:o[1]};
}
// injeta/remove o robô em S.participants + S.palpites conforme o flag /triggers.botOn
function injectBot(){
  if(!botEnabled()){ if(S.participants) delete S.participants[BOT_UID]; if(S.palpites) delete S.palpites[BOT_UID]; return; }
  S.participants=S.participants||{}; S.palpites=S.palpites||{};
  S.participants[BOT_UID]={slug:"bot", name:"BOT", isBot:true};
  const g={};
  for(const mid in (S.matches||{})){ const gg=botGuess(S.matches[mid]); if(gg) g[mid]={h:gg.h,a:gg.a,ts:0,confirmed:true}; }
  S.palpites[BOT_UID]=g;
}
/* ════════ AGENDADOR DE RENDER (coalescido) ════════
   Antes: cada um dos ~17 listeners chamava renderSidebar+renderRail+renderScreen
   NA HORA. Numa rajada (carga inicial, ou jogo ao vivo com /matches a cada ~2s +
   presence/activity dos outros) isso virava dezenas de rebuilds sincrônicos por
   segundo → travava e, pior, arrancava o <input> debaixo do dedo de quem digitava
   (teclado do celular caía, número sumia). Agora os eventos só MARCAM o que ficou
   sujo e o render acontece UMA vez por frame (requestAnimationFrame).
   Regra de ouro: enquanto um input de palpite/resenha está focado, NÃO reconstruir
   a tela (renderScreen destrói o input). Fica pendente e descarrega no blur. */
let _dirty={sidebar:false,rail:false,screen:false};
let _renderQueued=false;
let _screenDeferred=false;
function isEditingInput(){
  const af=document.activeElement;
  return !!(af && af.tagName==="INPUT" && af.dataset &&
    ((af.dataset.mid && af.dataset.side) || af.dataset.chat));
}
function requestRender(parts){
  if(parts.sidebar) _dirty.sidebar=true;
  if(parts.rail)    _dirty.rail=true;
  if(parts.screen)  _dirty.screen=true;
  if(_renderQueued) return;
  _renderQueued=true;
  requestAnimationFrame(runRender);
}
function runRender(){
  _renderQueued=false;
  const d=_dirty; _dirty={sidebar:false,rail:false,screen:false};
  try{ if(d.sidebar) renderSidebar(); }catch(e){ console.error("sidebar",e); }
  try{ if(d.rail)    renderRail();    }catch(e){ console.error("rail",e); }
  if(d.screen){
    if(isEditingInput()){ _screenDeferred=true; }   // não destrói o input em uso → descarrega no blur
    else { try{ renderScreen(); }catch(e){ console.error("screen",e); } }
  }
}
// chamado no blur dos inputs (e após salvar): aplica o render da tela que ficou pendente
function flushDeferredScreen(){
  if(_screenDeferred && !isEditingInput()){
    _screenDeferred=false;
    try{ renderScreen(); }catch(e){ console.error("screen",e); }
  }
}
function onData(key){
  if(!S.ready) return;
  bumpResolve();  // invalida o cache de resolução das cartas (palpite/placar/jogada mudou)
  injectBot(); // re-aplica o robô após qualquer atualização que sobrescreva o estado
  if(key==="meta") updateCountdown();
  if(key==="matches"){ fillBrand(); detectGoals(); }
  if(key==="triggers"){ updateCommsBtn(); refreshOpenLever(); }
  if(key==="matches"||key==="palpites"||key==="bonus"||key==="bonusAnswers") detectLeader();
  // presence/activity só alimentam a coluna da direita (online + feed) — não há por que
  // reconstruir a tela de palpites por causa deles (era a maior fonte de rebuild "à toa").
  const railOnly = (key==="presence" || key==="activity");
  // a aba "Feed" (mobile) espelha o rail → eventos rail-only também precisam re-renderizar a tela.
  // (o deferral no foco de input continua valendo: runRender adia se houver input em uso.)
  const feedScreen = S.screen==="feed";
  requestRender({ sidebar:!railOnly, rail:true, screen:!railOnly || feedScreen });
}

/* ════════ GOL: som + notificação ════════
   Compara o placar dos jogos ao vivo a cada atualização do /matches.
   Se a soma de gols aumentou, toca a buzina e dispara notificação. */
const _liveScores = {}; // mid -> total de gols já visto
let _goalsPrimed = false; // só dispara depois do 1º snapshot (evita falso gol no load)
function detectGoals(){
  const fresh = {};
  let goalEvents = [];
  for(const mid in S.matches){
    const m=S.matches[mid];
    const liveNow = m.status==="IN_PLAY"||m.status==="PAUSED";
    if(!liveNow){ continue; }
    const s=m.score||{};
    const tot=(s.home||0)+(s.away||0);
    fresh[mid]=tot;
    if(_goalsPrimed && _liveScores[mid]!=null && tot>_liveScores[mid]){
      goalEvents.push(m);
    }
  }
  // mantém histórico de jogos que saíram do ar vivo (pra não re-disparar)
  Object.assign(_liveScores, fresh);
  if(goalEvents.length){ goalEvents.forEach(fireGoal); }
  _goalsPrimed = true;
}
/* ════════ TROCA DE LÍDER: escreve {t:"lead"} quando alguém NOVO assume o 1º lugar.
   Mesmo molde do detectGoals: só dispara após o 1º snapshot (_leaderPrimed evita falso
   evento no load). Dedup entre clientes: id determinístico (lead-<lider>-<nFinished>) +
   regra ".write !data.exists()" → o 1º a gravar ganha, os outros tomam denied silencioso.
   A regra exige uid===auth.uid, então o evento leva uid=QUEM gravou e o líder vai em e.lead. */
let _leaderPrimed=false, _lastLeaderUid=null;
function detectLeader(){
  const rows=ranking();
  if(!rows.length) return;
  const top=rows[0];
  // só conta líder ISOLADO e com pontos > 0 (empate no topo não tem "um" líder)
  const tieAtTop = rows.length>1 && rows[1].pts===top.pts;
  const leaderUid = (top.pts>0 && !tieAtTop) ? top.uid : null;
  if(_leaderPrimed && leaderUid && _lastLeaderUid && leaderUid!==_lastLeaderUid){
    let fin=0; for(const mid in S.matches){ if(S.matches[mid].status==="FINISHED") fin++; }
    const id="lead-"+leaderUid+"-"+fin;
    db.ref("activity/"+id).set({uid:S.uid, name:top.name, lead:leaderUid, ts:Date.now(), t:"lead"}).catch(()=>{});
  }
  if(leaderUid) _lastLeaderUid=leaderUid; // baseline só anda quando há líder isolado
  _leaderPrimed=true;
}
let _audioCtx=null;
function ensureAudio(){
  if(_audioCtx) { if(_audioCtx.state==="suspended") _audioCtx.resume(); return _audioCtx; }
  try{ _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  return _audioCtx;
}
// som de gol: arquivo assets/goal.mp3 (pré-carregado). Sem fallback sintetizado
// (o anterior, por oscilador, ficou ruim — o Pedro trocou pelo mp3).
let _goalAudio=null;
function playGoalHorn(){
  try{
    if(!_goalAudio){ _goalAudio=new Audio("assets/goal.mp3"); _goalAudio.preload="auto"; }
    _goalAudio.currentTime=0;
    _goalAudio.volume=0.9;
    const p=_goalAudio.play();
    if(p&&p.catch) p.catch(()=>{}); // navegador pode bloquear sem gesto — silencioso
  }catch(e){}
}
function fireGoal(m){
  playGoalHorn();
  const home=ptName(m.home.name), away=ptName(m.away.name);
  const s=m.score||{};
  const placar=(s.home||0)+"×"+(s.away||0);

    if(board){ board.classList.remove("goal-pop"); void board.offsetWidth; board.classList.add("goal-pop"); }
  },60);
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification("⚽ GOOOL!", {body:home+" "+placar+" "+away+" — corre ver no CupFellas!", tag:"goal-"+m.id, icon:"assets/icons/icon-192.png"}); }catch(e){}
  }
}
// pede permissão de notificação (chamado por gesto do usuário)
function askNotif(){
  if(!("Notification" in window)){ toast("seu navegador não suporta notificação","err"); return; }
  ensureAudio(); // destrava o áudio no mesmo gesto
  if(Notification.permission==="granted"){ subscribePush(); toast("notificações já estão ligadas 🔔","ok"); updateNotifBtn(); return; }
  if(Notification.permission==="denied"){ toast("notificação bloqueada — libere nas config. do navegador","err"); return; }
  Notification.requestPermission().then(p=>{
    if(p==="granted"){ toast("massa! te aviso até com o app fechado 🔔","ok"); subscribePush(); }
    updateNotifBtn();

// Web Push: registra a inscrição no Firebase /pushSubs pra o robô notificar com o app FECHADO.
const VAPID_PUBLIC="BE3G-0CKVn4HeLe5vN2pD7IFxG_KIvG9XQDq3-b3L0Pg4YFXQ7JGbRPwWIoAbCUvqfQ5tGsYGCwHy2UWFcWSycQ";
function urlB64ToUint8(s){
  const pad="=".repeat((4-s.length%4)%4);
  const b=(s+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(b); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function subscribePush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window) || !S.uid) return;
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});
    const key=btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,"").slice(-24);
    await db.ref("pushSubs/"+S.uid+"/"+key).set(JSON.parse(JSON.stringify(sub)));
  }catch(e){ console.warn("push subscribe falhou:", e.message); }
}
function updateNotifBtn(){
  const b=$("#notifBtn"); if(!b) return;
  const on = ("Notification" in window) && Notification.permission==="granted";
  b.classList.toggle("on",on);
  b.title = on ? "notificações de gol ligadas" : "ativar notificações de gol";
}

function setLoginBusy(b){ const btn=$("#loginBtn"); if(btn){ btn.disabled=b; btn.textContent=b?"entrando…":"entrar / criar"; } }
function loginOrCreate(name,pin){
  const slug=slugify(name);
  if(!slug){ toast("digita um nome de verdade","err"); return; }
  if(!pin || pin.length<4){ toast("PIN de 4+ caracteres","err"); return; }
  _loggingIn=true; setLoginBusy(true);
  const email=slugEmail(slug), pass=pinPass(pin);
  auth.createUserWithEmailAndPassword(email,pass)
    .then(()=>finishLogin(slug,name))
    .catch(err=>{
      if(err.code==="auth/email-already-in-use"){
        auth.signInWithEmailAndPassword(email,pass)
          .then(()=>finishLogin(slug,name))
          .catch(e2=>{ _loggingIn=false; setLoginBusy(false);
            if(e2.code==="auth/wrong-password"||e2.code==="auth/invalid-credential") toast("PIN errado pra esse nome 🤨","err");
            else toast("erro ao entrar ("+e2.code+")","err"); });
      } else if(err.code==="auth/operation-not-allowed"){
        _loggingIn=false; setLoginBusy(false);
        toast("admin: ative E-mail/senha no Firebase Auth","err");
      } else { _loggingIn=false; setLoginBusy(false); toast("erro ("+err.code+")","err"); }
    });
}
function finishLogin(slug,name){
  S.uid=auth.currentUser.uid; S.me={slug,name:capName(name)};
  Promise.all([
    db.ref("participants/"+S.uid).set({slug,name}),
    db.ref("claims/"+slug).set({uid:S.uid}).catch(()=>{})
  ]).then(()=>{
    _loggingIn=false; setLoginBusy(false);
    attachListeners();
    $("#overlay").classList.add("hidden");
    if(!S.ready) enterApp(); else renderScreen();
  }).catch(()=>{ _loggingIn=false; setLoginBusy(false); toast("sem conexão, tenta de novo","err"); });
}

  S.participants={ "dev-local":{slug:"teste",name:"Teste"} };

/* localhost-only: entra como uma identidade EXISTENTE só pra VISUALIZAR (?as=<slug>), com os dados
   reais do banco (leitura pública). Escritas serão negadas pelas regras — é modo de inspeção. */
function viewAs(slug){
  if(!IS_LOCAL) return;
  const tryEnter=()=>{
    let uid=null; for(const u in S.participants){ const p=S.participants[u]; if(p&&p.slug===slug){ uid=u; break; } }
    if(!uid) return false;
    S.uid=uid; S.me={slug, name:(S.participants[uid].name||slug)};
    $("#overlay").classList.add("hidden"); $("#boot").classList.add("hidden");
    if(!S.ready) enterApp(); else renderScreen();
    return true;
  };
  if(tryEnter()) return;
  // /participants ainda não chegou: tenta de novo quando o listener popular o estado
  const iv=setInterval(()=>{ if(tryEnter()) clearInterval(iv); }, 200);
  setTimeout(()=>clearInterval(iv), 8000);
}

/* ════════ COCKPIT AO VIVO (proposta fase de grupos) ════════
   Ticker multi-jogo + boletim do dia + tabela do grupo ao vivo. Tudo computado no
   cliente (matches/palpites/standings), aditivo (só aparece com jogo ao vivo).
   Cliques são AÇÃO DO USUÁRIO → chamam renderScreen direto (não viola o loop de render). */
const tlaOf = t => String((t&&t.tla)||ptName(t&&t.name).slice(0,3)).toUpperCase();
const liveishList = ()=> matchList().filter(isLiveish);
const _nk = n => String(n||"").toLowerCase().normalize("NFD").replace(/[^a-z]/g,"");

// ticker: chips de todos os jogos rolando + meu provisório; clicar troca o "jogo em foco"
function liveTicker(){
  const lives=liveishList();
  if(!lives.length) return null;
  if(!S.focusLive || !S.matches[S.focusLive] || !isLiveish(S.matches[S.focusLive])) S.focusLive=lives[0].id;
  const wrap=el("div","lvtk");
  wrap.appendChild(el("div","lvtk-head",'<span class="live-dot"></span> TÁ ROLANDO · '+lives.length+(lives.length>1?' JOGOS':' JOGO')));
  // até 2 jogos simultâneos (rodada final de 1 grupo) = 2-up sem scroll; 3+ volta a rolar
  const row=el("div","lvtk-row"+(lives.length<=2?" duo":""));
  lives.forEach(m=>{
    const s=m.score||{};
    const pal=(S.palpites[S.uid]||{})[m.id];
    const r=scoreOne(pal,m);
    const tag = !isComplete(pal) ? '<span class="lvtk-p pn">—</span>'
      : (r&&r.pts>=3)?'<span class="lvtk-p p3">+3</span>':(r&&r.pts>=1)?'<span class="lvtk-p p1">+1</span>':'<span class="lvtk-p p0">0</span>';
    const chip=el("div","lvtk-chip"+(m.id===S.focusLive?" foco":""));
    chip.innerHTML='<div class="lvtk-sc">'+esc(tlaOf(m.home))+' '+(s.home==null?0:s.home)+'×'+(s.away==null?0:s.away)+' '+esc(tlaOf(m.away))+'</div>'
      +'<div class="lvtk-me">'+tag+' <span>'+(m.id===S.focusLive?'em foco':'você')+'</span></div>';
    chip.onclick=()=>{ S.focusLive=m.id; renderScreen(); };
    row.appendChild(chip);
  });
  wrap.appendChild(row);
  return wrap;
}

// boletim do dia: soma o provisório de TODA a leva de hoje (coerente com a fase de grupos)
function boletimHoje(){
  const today=dayKey(Date.now());
  const todays=matchList().filter(m=>dayKey(m.kickoffMs)===today);
  const counted=todays.filter(m=>isLiveish(m)||m.status==="FINISHED");
  if(!counted.length) return null;
  const myP=S.palpites[S.uid]||{};
  let total=0,c3=0,c1=0,c0=0,amea=0;
  counted.forEach(m=>{
    const dob=!!(playsFor(m.id)||{}).dobradinha, mult=dob?2:1;
    const r=scoreOne(myP[m.id],m);
    if(m.status==="FINISHED"){ if(r) total+=r.pts*mult; return; }
    if(!isComplete(myP[m.id])) return;
    const pts=r?r.pts:0; total+=pts*mult;
    if(pts>=3)c3++; else if(pts>=1)c1++; else c0++;
    if(pts>=1){ const s=m.score||{};
      const a1=scoreAt(myP[m.id],(s.home||0)+1,(s.away||0)), a2=scoreAt(myP[m.id],(s.home||0),(s.away||0)+1);
      if(Math.min(a1,a2)<pts) amea++; }
  });
  const pend=todays.filter(m=>m.kickoffMs>Date.now() && m.status!=="FINISHED" && m.status!=="POSTPONED").length;
  const p=el("div","panel boletim");
  p.appendChild(el("div","bol-tot",(total>0?"+":"")+total+'<small>PROVISÓRIO · HOJE</small>'));
  p.appendChild(el("div","bol-sep"));
  const st=el("div","bol-states");
  const line=(col,n,txt)=>{ const d=el("div","bol-st"); d.innerHTML='<span class="bol-dot" style="background:'+col+'"></span><b>'+n+'</b> '+txt; return d; };
  st.appendChild(line("var(--green)",c3,"cravada"+(c3===1?"":"s")+" viva"+(c3===1?"":"s")));
  st.appendChild(line("#9BBF3D",c1,"no resultado"));
  st.appendChild(line("#E0A23E",amea,"ameaçada"+(amea===1?"":"s")));
  st.appendChild(line("var(--red)",c0,"fria"+(c0===1?"":"s")));
  if(pend) st.appendChild(line("var(--text-2)",pend,"a começar"));
  p.appendChild(st);
  return p;
}

// escudo de um time pelo NOME (acha nos matches/standings) — fallback p/ tabela projetada
function crestForTeam(name){
  const k=_nk(name);
  for(const m of matchList()){
    if(m.home && _nk(m.home.name)===k && m.home.crest) return m.home.crest;
    if(m.away && _nk(m.away.name)===k && m.away.crest) return m.away.crest;
  }
  for(const g of (S.standings||[])) for(const r of (g.table||[])) if(_nk(r.name)===k && r.crest) return r.crest;
  return "";
}

/* RESOLVE O PLACAR de um jogo por CAMADAS (prioridade), pra projetar a tabela final:
   (a) FINISHED → (b) parcial ao vivo → (c) MEU palpite (jogo não começou) →
   (d) sem palpite = null (não pontua / fica de fora da conta). Retorna {home,away,src} | null. */
function resolveScore(m){
  const s=m.score||{};
  if(m.status==="FINISHED" && s.home!=null && s.away!=null) return {home:s.home, away:s.away, src:"fin"};
  if(isLiveish(m) && s.home!=null && s.away!=null) return {home:s.home, away:s.away, src:"live"};
  if(m.status!=="FINISHED" && !isLiveish(m)){
    const pal=(S.palpites[S.uid]||{})[m.id];
    if(isComplete(pal)) return {home:pal.h, away:pal.a, src:"pal"};
  }
  return null;
}

/* TABELA PROJETADA do grupo: calcula do ZERO a partir dos jogos do grupo (formato 2026:
   4 times, 6 jogos), resolvendo cada jogo por camadas (resolveScore). NÃO soma deltas num
   snapshot — recomeça do zero, então finalizados não contam dobrado. */
function projGroupTable(group){
  const gms=matchList().filter(m=>m.group===group);
  if(!gms.length) return null;
  const T={};
  const ensure=t=>{ const n=t.name; if(!T[n]) T[n]={name:n, crest:t.crest||crestForTeam(n), p:0,w:0,d:0,l:0,pts:0,gf:0,ga:0, _live:false}; return T[n]; };
  gms.forEach(m=>{ ensure(m.home); ensure(m.away); });
  const resolved=[]; // [{m, rs}] dos jogos com placar definido (p/ confronto direto)
  gms.forEach(m=>{
    const rs=resolveScore(m); if(!rs) return;
    resolved.push({m,rs});
    const rh=T[m.home.name], ra=T[m.away.name]; if(!rh||!ra) return;
    rh.p++; ra.p++;
    rh.gf+=rs.home; rh.ga+=rs.away; ra.gf+=rs.away; ra.ga+=rs.home;
    if(rs.home>rs.away){ rh.pts+=3; rh.w++; ra.l++; }
    else if(rs.home<rs.away){ ra.pts+=3; ra.w++; rh.l++; }
    else { rh.pts++; ra.pts++; rh.d++; ra.d++; }
    if(rs.src==="live"){ rh._live=true; ra._live=true; } // destaca quem tem jogo rolando agora
  });
  const rows=Object.values(T);
  rows.forEach(r=>r.gd=r.gf-r.ga);
  rankGroupRows(rows, resolved); // desempate oficial FIFA (geral → confronto direto → sorteio)
  rows.forEach((r,i)=>r.pos=i+1);
  return rows;
}

/* ORDENAÇÃO de um grupo pelos critérios FIFA (regulamento da Copa):
   1) pontos · 2) saldo geral · 3) gols pró geral  →  se empatar:
   4) pontos no confronto direto · 5) saldo no confronto direto · 6) gols pró no confronto direto
   →  (fair play não temos) · sorteio (determinístico p/ estabilidade). O confronto direto é uma
   MINI-LIGA só entre os empatados — cobre empate de 2 OU de 3+ times. Ordena rows in-place. */
function rankGroupRows(rows, resolved){
  rows.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf); // critérios gerais
  const out=[];
  let i=0;
  while(i<rows.length){
    let j=i+1;
    while(j<rows.length && rows[j].pts===rows[i].pts && rows[j].gd===rows[i].gd && rows[j].gf===rows[i].gf) j++;
    const tied=rows.slice(i,j);
    if(tied.length>1) sortHeadToHead(tied, resolved);
    out.push.apply(out, tied);
    i=j;
  }
  for(let k=0;k<rows.length;k++) rows[k]=out[k];
  return rows;
}
function sortHeadToHead(tied, resolved){
  const set=new Set(tied.map(t=>_nk(t.name)));
  const H={}; tied.forEach(t=>H[_nk(t.name)]={pts:0,gd:0,gf:0});
  resolved.forEach(({m,rs})=>{
    const h=_nk(m.home.name), a=_nk(m.away.name);
    if(!set.has(h)||!set.has(a)) return; // só jogos ENTRE os empatados
    H[h].gf+=rs.home; H[h].gd+=rs.home-rs.away;
    H[a].gf+=rs.away; H[a].gd+=rs.away-rs.home;
    if(rs.home>rs.away) H[h].pts+=3; else if(rs.home<rs.away) H[a].pts+=3; else { H[h].pts++; H[a].pts++; }
  });
  tied.sort((x,y)=>{ const hx=H[_nk(x.name)], hy=H[_nk(y.name)];
    return hy.pts-hx.pts || hy.gd-hx.gd || hy.gf-hx.gf || _nk(x.name).localeCompare(_nk(y.name)); });
}

/* PREVISÃO DOS 3ºS LUGARES (formato 2026: 12 grupos, passam 1º+2º + os 8 MELHORES 3ºs).
   Projeta todos os grupos, junta os 3ºs colocados, ranqueia (pts, SG, GP) → top 8 entram. */
function bestThirds(){
  const groups=[...new Set(matchList().map(m=>m.group).filter(Boolean))];
  const thirds=[];
  groups.forEach(g=>{ const rows=projGroupTable(g); if(rows && rows[2]) thirds.push(Object.assign({group:g}, rows[2])); });
  thirds.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || _nk(a.name).localeCompare(_nk(b.name)));
  const topN=Math.min(8, thirds.length);
  thirds.forEach((r,i)=> r._thirdRank=i+1);
  const inSet=new Set(thirds.slice(0,topN).map(r=>r.group));
  return {inSet, thirds, topN};
}

// render da tabela PROJETADA do grupo (corte + selo classificado/melhor 3º dentro-fora/eliminado).
// Jogos não disputados entram pelo PALPITE da pessoa (resolveScore camada d) — é isso que decide
// quem fica como melhor 3º. Sem simulação manual: só projeção.
function liveGroupTable(m){
  if(!m.group) return null;
  const rows=projGroupTable(m.group);
  if(!rows) return null;
  const bt=bestThirds();
  const thirdIn=bt.inSet.has(m.group); // o 3º projetado deste grupo está no top-8?
  const box=el("div","lgt");
  box.appendChild(el("div","lgt-h",'<span class="live-dot"></span> GRUPO '+esc(groupLabel(m.group))+' · TABELA PROJETADA'));
  rows.forEach((r,i)=>{
    let cls,tagTxt,tagCls;
    if(r.pos<=2){ cls="q"; tagTxt="classificado"; tagCls="tg-q"; }
    else if(r.pos===3){ cls="t"; tagTxt=thirdIn?"melhor 3º":"3º · fora"; tagCls=thirdIn?"tg-tin":"tg-tout"; }
    else { cls="x"; tagTxt="eliminado"; tagCls="tg-x"; }
    const row=el("div","lgt-row "+cls);
    row.innerHTML='<span class="lgt-pos">'+r.pos+'</span>'
      +'<span class="lgt-nm'+(r._live?" lgt-live":"")+'">'+teamFlag(r)+'<span class="lgt-tx">'+esc(ptName(r.name))+'</span></span>'
      +'<span class="lgt-pts">'+(r.pts||0)+'</span>'
      +'<span class="lgt-n">'+(r.gd>0?"+":"")+r.gd+'</span>'
      +'<span class="lgt-tag '+tagCls+'">'+tagTxt+'</span>';
    box.appendChild(row);
    if(i===1) box.appendChild(el("div","lgt-cut","linha de corte"));
  });
  const top2=rows.slice(0,2).map(r=>ptName(r.name)).join(" e ");
  const third=rows[2]?ptName(rows[2].name):null;
  box.appendChild(el("div","lgt-foot","Projeção: <b>"+esc(top2)+"</b> passam"
    +(third?" · <b>"+esc(third)+"</b> "+(thirdIn?"entra como melhor 3º":"fica de fora dos 8 melhores 3ºs"):"")));
  return box;
}

// bandeirinha de uma linha da tabela (crest do time; some no erro)
function teamFlag(r){
  const src=r.crest||crestForTeam(r.name);
  return src ? '<img class="lgt-fl" src="'+esc(src)+'" onerror="this.style.visibility=\'hidden\'">' : '<span class="lgt-fl ph"></span>';
}

/* ════════ CHAVEAMENTO PROJETADO (16-avos → final) — formato 2026 ════════
   Slots oficiais do bracket FIFA 2026 (jogos M73–M88 nos 16-avos). Preenche os 16-avos a partir
   da PROJEÇÃO dos grupos (palpites + resultados, com os mesmos desempates da tabela). Os 8 melhores
   3ºs entram nos slots permitidos via casamento (cada slot só aceita 3º de certos grupos, conforme
   a FIFA). Fases após os 16-avos ficam "a definir" (ainda não há palpite de mata-mata). Visível a
   todos; tudo computado no cliente. */
const BRK_R32=[
  {id:"M73",a:{t:"ru",g:"A"},b:{t:"ru",g:"B"}},
  {id:"M74",a:{t:"w",g:"E"}, b:{t:"3"}},
  {id:"M75",a:{t:"w",g:"F"}, b:{t:"ru",g:"C"}},
  {id:"M76",a:{t:"w",g:"C"}, b:{t:"ru",g:"F"}},
  {id:"M77",a:{t:"w",g:"I"}, b:{t:"3"}},
  {id:"M78",a:{t:"ru",g:"E"},b:{t:"ru",g:"I"}},
  {id:"M79",a:{t:"w",g:"A"}, b:{t:"3"}},
  {id:"M80",a:{t:"w",g:"L"}, b:{t:"3"}},
  {id:"M81",a:{t:"w",g:"D"}, b:{t:"3"}},
  {id:"M82",a:{t:"w",g:"G"}, b:{t:"3"}},
  {id:"M83",a:{t:"ru",g:"K"},b:{t:"ru",g:"L"}},
  {id:"M84",a:{t:"w",g:"H"}, b:{t:"ru",g:"J"}},
  {id:"M85",a:{t:"w",g:"B"}, b:{t:"3"}},
  {id:"M86",a:{t:"w",g:"K"}, b:{t:"3"}},
  {id:"M87",a:{t:"ru",g:"D"},b:{t:"ru",g:"G"}},
  {id:"M88",a:{t:"w",g:"J"}, b:{t:"ru",g:"H"}}
];
// grupos elegíveis p/ o 3º de cada slot (M-id → grupos), p/ casar os 8 melhores 3ºs
const BRK_THIRD_SLOTS=[
  {id:"M74",set:["A","B","C","D","F"]},{id:"M77",set:["C","D","F","G","H"]},
  {id:"M79",set:["C","E","F","H","I"]},{id:"M80",set:["E","H","I","J","K"]},
  {id:"M81",set:["B","E","F","I","J"]},{id:"M82",set:["A","E","H","I","J"]},
  {id:"M85",set:["E","F","G","I","J"]},{id:"M86",set:["D","E","I","J","L"]}
];
// dois lados do chaveamento (cada um vai dos 16-avos à semi) + a final juntando os dois
const BRK_SIDES=[
  {key:"top",label:"Lado A", r32:["M74","M77","M73","M75","M83","M84","M81","M82"], r16:["M89","M90","M93","M94"], qf:["M97","M98"], sf:["M101"]},
  {key:"bot",label:"Lado B", r32:["M76","M78","M79","M80","M86","M88","M85","M87"], r16:["M91","M92","M95","M96"], qf:["M99","M100"], sf:["M102"]}
];
// grafo de avanço: cada jogo do mata-mata recebe os vencedores de dois jogos anteriores
const BRK_FEED={
  M89:["M74","M77"],M90:["M73","M75"],M91:["M76","M78"],M92:["M79","M80"],
  M93:["M83","M84"],M94:["M81","M82"],M95:["M86","M88"],M96:["M85","M87"],
  M97:["M89","M90"],M98:["M93","M94"],M99:["M91","M92"],M100:["M95","M96"],
  M101:["M97","M98"],M102:["M99","M100"],M104:["M101","M102"]
};
const BRK_RLABEL={M89:"oit.",M90:"oit.",M91:"oit.",M92:"oit.",M93:"oit.",M94:"oit.",M95:"oit.",M96:"oit.",
  M97:"quartas",M98:"quartas",M99:"quartas",M100:"quartas",M101:"semi",M102:"semi"};

// projeta os 12 grupos → byGroup{A:{w,ru,third}} + casa os 8 melhores 3ºs nos slots permitidos.
// IMPORTANTE: chaveia por LETRA do grupo (groupLabel), pois a API real usa "GROUP_A"… e os slots
// do bracket usam "A"…"L" — sem normalizar, byGroup nunca casa e tudo vira "a definir".
function projBracket(){
  const rawGroups=[...new Set(matchList().map(m=>m.group).filter(Boolean))];
  const byGroup={};
  rawGroups.forEach(rg=>{ const L=groupLabel(rg).toUpperCase(); const rows=projGroupTable(rg);
    if(L && rows && rows.length>=3) byGroup[L]={w:rows[0],ru:rows[1],third:rows[2]}; });
  const bt=bestThirds();
  // bt.inSet tem os valores BRUTOS de grupo (ex.: "GROUP_C") → mapeia p/ letra
  const qual=[...bt.inSet].map(rg=>groupLabel(rg).toUpperCase()).filter(L=>byGroup[L]); // 3ºs classificados
  // casamento bipartido (caminho aumentante): cada slot recebe um grupo elegível, sem repetir
  const slotMatch={}, groupMatch={};
  function aug(slot,seen){
    for(const g of slot.set){ if(qual.indexOf(g)<0||seen.has(g)) continue; seen.add(g);
      const cur=groupMatch[g];
      if(cur==null || aug(BRK_THIRD_SLOTS.find(s=>s.id===cur),seen)){ slotMatch[slot.id]=g; groupMatch[g]=slot.id; return true; } }
    return false;
  }
  BRK_THIRD_SLOTS.forEach(s=>aug(s,new Set()));
  return {byGroup, slotMatch, bt};
}
// resolve um slot dos 16-avos → {team:{name,crest}|null, label}
function brkSlotTeam(mid, ref, P){
  if(ref.t==="w"){ const x=P.byGroup[ref.g]; return {team:x?x.w:null, label:"1º "+ref.g}; }
  if(ref.t==="ru"){ const x=P.byGroup[ref.g]; return {team:x?x.ru:null, label:"2º "+ref.g}; }
  const g=P.slotMatch[mid]; const x=g&&P.byGroup[g]; return {team:x?x.third:null, label:g?("3º "+g):"melhor 3º"};
}
/* ── SIMULAÇÃO do mata-mata (só pra brincar/printar; NUNCA persiste nem pontua) ──
   S.brkPick[mid]="a"|"b" marca quem o usuário escolheu pra passar. Os jogos das fases
   seguintes herdam os vencedores escolhidos (brkPair recursivo). */
function brkPair(mid, P){
  const r32=BRK_R32.find(x=>x.id===mid);
  if(r32) return {a:brkSlotTeam(mid,r32.a,P), b:brkSlotTeam(mid,r32.b,P)};
  const f=BRK_FEED[mid];
  const wslot=(fm)=>{ const w=brkWinner(fm,P); return w?{team:w,label:null}:{team:null,label:"venc. "+(BRK_RLABEL[fm]||"jogo")}; };
  return {a:wslot(f[0]), b:wslot(f[1])};
}
function brkWinner(mid, P){
  const pick=S.brkPick[mid]; if(!pick) return null;
  const pair=brkPair(mid,P); const slot=pick==="a"?pair.a:pair.b;
  return slot&&slot.team ? slot.team : null;
}
function brkChildOf(mid){ for(const k in BRK_FEED){ if(BRK_FEED[k][0]===mid||BRK_FEED[k][1]===mid) return k; } return null; }
function brkClearDownstream(mid){ let c=brkChildOf(mid); while(c){ delete S.brkPick[c]; c=brkChildOf(c); } }
function brkPickTeam(mid, side){
  if(S.brkPick[mid]===side) delete S.brkPick[mid]; else S.brkPick[mid]=side;
  brkClearDownstream(mid); // mudou o vencedor → invalida as escolhas que dependiam dele
  renderScreen();
}

let _chaveSide="top"; // parte do chaveamento em foco (persistente)
function renderChave(root){
  root.innerHTML="";
  if(!Object.keys(S.matches).length){ root.appendChild(noMatches()); return; }
  root.appendChild(el("div","section-head","🗝️ CHAVEAMENTO PROJETADO"));
  root.appendChild(el("div","chave-sub","Montado pelos <b>palpites do bolão</b>: 1º, 2º e os 8 melhores 3ºs de cada grupo, com os critérios de desempate da Copa. <b>Toque num time pra simular quem passa</b> — vale só pra brincar/printar, <b>não conta pro bolão</b> nem fica salvo."));
  const P=projBracket();
  // segmented: Lado A · Lado B · Final
  const seg=el("div","chave-seg");
  [["top","Lado A"],["bot","Lado B"],["final","Final"]].forEach(([k,lbl])=>{
    const b=el("button","chave-tab"+(_chaveSide===k?" on":""),lbl);
    b.onclick=()=>{ _chaveSide=k; renderScreen(); };
    seg.appendChild(b);
  });
  if(Object.keys(S.brkPick).length){
    const clr=el("button","chave-clear","↺ limpar simulação");
    clr.onclick=()=>{ S.brkPick={}; renderScreen(); };

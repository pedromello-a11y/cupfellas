/* ════════ SCORING ENGINE ════════ */
const _scoreCache = {};
function scoreOne(pal, m){
  if(!pal || pal.h==null || pal.a==null) return null;
  if(!m || m.score==null || m.score.home==null || m.score.away==null) return null;
  return {pts:scoreAt(pal,m.score.home,m.score.away), exact:(pal.h===m.score.home&&pal.a===m.score.away)};
}
/* ════════ QUEM AVANÇA (mata-mata) ════════
   Regra nova (jun/2026): no mata-mata, além do palpite normal dos 90min (3/1/0), a pessoa
   pode dizer QUEM PASSA caso o jogo empate em 90 e vá pra prorrogação/pênaltis. Acertou quem
   avança = +1 EXTRA, mesmo errando o placar. SÓ paga quando o jogo de fato passou dos 90
   (winner90==="DRAW"); decidido nos 90 já está embutido no resultado. Plano (não dobra), nunca
   negativo. O palpite guarda pal.adv = "HOME"|"AWAY". Quem realmente passou:
   - decidido em 90 → o vencedor (winner90);
   - empate em 90 → m.advancer ("HOME"|"AWAY"), vindo do sync (score.winner/pênaltis) ou do admin. */
const isKnockout = (m)=> !!m && !!m.stage && m.stage!=="GROUP_STAGE";
function advancerActual(m){
  if(!isKnockout(m)) return null;
  if(m.winner90==="HOME") return "HOME";
  if(m.winner90==="AWAY") return "AWAY";
  return m.advancer || null; // empate em 90 → precisa do dado real de quem passou
}
// palpite de "quem avança" desse usuário nesse jogo: explícito (pal.adv) ou implícito pelo placar
function advancerPick(pal){
  if(!pal) return null;
  if(pal.adv==="HOME"||pal.adv==="AWAY") return pal.adv;
  if(pal.h!=null && pal.a!=null && pal.h!==pal.a) return pal.h>pal.a?"HOME":"AWAY"; // não-empate → vencedor implícito
  return null;
}
// +1 do "quem avança": só em jogo de mata-mata FINISHED que empatou em 90 e teve quem passa acertado
function advancerBonus(pal, m){
  if(!isKnockout(m) || m.status!=="FINISHED" || m.winner90!=="DRAW") return 0;
  const act=m.advancer; if(!act) return 0;
  const pick=advancerPick(pal); if(!pick) return 0;
  return pick===act ? 1 : 0;
}
// pontua um palpite contra um placar hipotético (usado pelo Radar do Próximo Gol)
function scoreAt(pal, sh, sa){
  if(!pal || pal.h==null || pal.a==null) return 0;
  const ph=pal.h, pa=pal.a;
  if(ph===sh && pa===sa) return 3;
  const pr = ph>pa?1:ph<pa?-1:0, sr = sh>sa?1:sh<sa?-1:0;
  return pr===sr ? 1 : 0;
}
function bonusScore(b){
  const a = S.bonusAnswers||{}; let pts=0;
  const eq=(x,y)=> x!=null && y!=null && String(x).trim().toLowerCase()===String(y).trim().toLowerCase();
  if(a.campeao && eq(b.campeao,a.campeao)) pts+=10;
  if(a.artilheiros && b.artilheiro){
    const list=String(a.artilheiros).split(",").map(s=>s.trim().toLowerCase());
    if(list.includes(String(b.artilheiro).trim().toLowerCase())) pts+=8;
  }
  if(a.melhorAtaque && eq(b.melhorAtaque,a.melhorAtaque)) pts+=5;
  if(a.melhorDefesa && eq(b.melhorDefesa,a.melhorDefesa)) pts+=5;
  if(a.neymar && eq(b.neymar,a.neymar)) pts+=3;
  if(a.brasilFase && b.brasilFase && eq(b.brasilFase,a.brasilFase)){
    const f = BRASIL_FASES.find(x=>x.k===b.brasilFase); if(f) pts+=f.pts;
  }
  return pts;
}
/* ── PODERES: resolução das cartas na pontuação ──
   /plays/{matchId} = {
     dobradinha: { by, ts },                              // cap 1 por jogo (×2 pra todos)
     risco:    { [byUid]: { target, ts } },               // vários autores
     fantasma: { [byUid]: { target, side:'h'|'a', delta, ts } },
     troca:    { [byUid]: { a, b, ts } }
   }
   Determinístico, computado no cliente. Ordem: troca → gol fantasma → base → multiplicadores/risco.
   No-op quando não há jogadas → caminho de pontuação atual fica idêntico. */
const PLAY_COST = 5;
let _resolveVer=0; const _resolveCache={};
const bumpResolve = ()=>{ _resolveVer++; };
/* ════ DOBRADINHA AUTOMÁTICA NO BRASIL (×2 pra geral) ════
   Todo jogo da Seleção, a partir do cutoff, entra em campo com a carta Dobradinha já
   acionada: pontua ×2 pra todo mundo (igual à carta) e o card ganha o visual dourado.
   Determinístico, NÃO grava nada no banco — é uma regra do cliente (some se reverter o deploy).
   "A partir de agora" = exclui Brasil 1×1 Marrocos (13/06, já encerrado). */
const X2_BRASIL_FROM = Date.parse("2026-06-19T00:00:00-03:00");
const isBrasilTeam = (t)=> !!t && (t.name==="Brazil" || t.name==="Brasil" || String(t.tla||"").toUpperCase()==="BRA");
const isAutoX2 = (m)=> !!m && m.kickoffMs>X2_BRASIL_FROM && (isBrasilTeam(m.home)||isBrasilTeam(m.away));
/* plays EFETIVAS de um jogo = jogadas reais (/plays) + a Dobradinha automática do Brasil. */
function playsFor(mid){
  const real=(S.plays&&S.plays[mid])||null;
  const m=S.matches&&S.matches[mid];
  if(m && isAutoX2(m)) return Object.assign({}, real, {dobradinha:(real&&real.dobradinha)||{auto:true, ts:m.kickoffMs}});
  return real;
}
function hasAnyPlays(){
  const P=S.plays; if(P) for(const k in P){ const pm=P[k]; if(pm && (pm.dobradinha||pm.risco||pm.fantasma||pm.troca)) return true; }
  const M=S.matches; if(M) for(const mid in M){ if(isAutoX2(M[mid])) return true; }
  return false;
}
/* este jogo tem carta (real ou Dobradinha automática do Brasil)? — pra decisões POR JOGO
   (não usar o global hasAnyPlays no reveal, senão o veredito some de TODOS os jogos). */
function matchHasPlays(mid){
  const pm=playsFor(mid);
  return !!(pm && (pm.dobradinha||pm.risco||pm.fantasma||pm.troca));
}
// objeto keyed-por-autor → lista com {by,...} ordenada por ts
function playList(obj){
  if(!obj) return [];
  return Object.keys(obj).map(by=>Object.assign({by}, obj[by])).sort((x,y)=>(x.ts||0)-(y.ts||0));
}
/* ── badges das cartas ativas num jogo (lê S.plays[mid]); null se nada ──
   Perspectiva: realça (.me + "VOCÊ") quando a carta mira/sabota/troca o usuário atual.
   Data-driven → em produção (S.plays vazio) não renderiza nada. */
function playBadges(mid){
  const pm=playsFor(mid); if(!pm) return null;
  const chips=[];
  const riscoTitle='acertou o resultado: +1 nesse jogo pra ele e o autor anula o próximo palpite · '
    +'errou: próximo jogo dele anulado e o autor ganha +1 avulso';
  if(pm.dobradinha) chips.push(["pb-dob","🃏 jogo dobrado ×2"]);
  if(pm.risco) for(const by in pm.risco){ const t=pm.risco[by].target, me=t===S.uid;
    chips.push(["pb-risco"+(me?" me":""),"🎯 "+(me?"risco em VOCÊ":"risco em "+esc(pwName(t))), riscoTitle]); }
  if(pm.fantasma) for(const by in pm.fantasma){ const f=pm.fantasma[by], me=f.target===S.uid;
    chips.push(["pb-fant"+(me?" me":""),"👻 "+(f.delta<0?"−1":"+1")+" gol "+(me?"no SEU palpite":"em "+esc(pwName(f.target)))]); }
  if(pm.troca) for(const by in pm.troca){ const t=pm.troca[by], me=t.a===S.uid||t.b===S.uid;
    chips.push(["pb-troca"+(me?" me":""),"🔀 "+(me?"SEU palpite trocado":esc(pwName(t.a))+" ⇄ "+esc(pwName(t.b)))]); }
  if(!chips.length) return null;
  const wrap=el("div","play-badges");
  chips.forEach(c=>{ const s=el("span","pb "+c[0], c[1]); if(c[2]) s.title=c[2]; wrap.appendChild(s); });
  return wrap;
}
/* ── ícones das cartas que MIRAM neste uid (afetam a pontuação dele) → pro ranking ── */
function playMarksFor(uid){
  const out=[]; const P=S.plays||{};
  for(const mid in P){ const pm=P[mid]||{};
    if(pm.risco) for(const by in pm.risco) if(pm.risco[by].target===uid) out.push(["🎯","alvo de Risco"]);
    if(pm.fantasma) for(const by in pm.fantasma) if(pm.fantasma[by].target===uid) out.push(["👻","palpite sabotado"]);
    if(pm.troca) for(const by in pm.troca){ const t=pm.troca[by]; if(t.a===uid||t.b===uid) out.push(["🔀","palpite trocado"]); }
  }
  const bonus=(riscoEffects().bonus||{})[uid];
  if(bonus) out.push(["🎯+"+bonus, "ganhou "+bonus+(bonus===1?" ponto avulso":" pontos avulsos")+" com Risco (o alvo errou o resultado)"]);
  return out;
}
function computeMatch(mid, m){
  const plays = playsFor(mid) || {};
  // palpites ORIGINAIS e EFETIVOS (cópia) de todos participantes — eff vale mesmo sem placar
  const orig={}, eff={};
  for(const uid in S.participants){
    const p=(S.palpites[uid]||{})[mid];
    orig[uid] = (p && p.h!=null && p.a!=null) ? {h:p.h, a:p.a} : null;
    eff[uid]  = orig[uid] ? {h:orig[uid].h, a:orig[uid].a} : null;
  }
  // 1) TROCA — troca o par de palpites de a/b (cópia fresca, evita aliasing com o gol fantasma)
  playList(plays.troca).forEach(t=>{ const A=eff[t.a], B=eff[t.b];
    if(t.a in eff) eff[t.a]= B?{h:B.h,a:B.a}:null;
    if(t.b in eff) eff[t.b]= A?{h:A.h,a:A.a}:null; });
  // 2) GOL FANTASMA — ±1 gol no lado do alvo, clamp 0..20
  playList(plays.fantasma).forEach(f=>{ const e=eff[f.target]; if(e){ const s=f.side==='a'?'a':'h'; e[s]=Math.max(0,Math.min(20, e[s]+(f.delta<0?-1:1))); } });
  const hasScore = m && m.score && m.score.home!=null && m.score.away!=null;
  if(!hasScore) return {pts:{}, exact:{}, eff, orig, riscoHit:{}};
  const sh=m.score.home, sa=m.score.away;
  // 3) base + exato
  const base={}, exact={};
  for(const uid in eff){ const e=eff[uid];
    base[uid]= e? scoreAt(e,sh,sa) : 0;
    exact[uid]= e? (e.h===sh && e.a===sa) : false;
  }
  // 4) DOBRADINHA — único multiplicador que resta, ×2 pra todo mundo
  const mult={};
  for(const uid in eff) mult[uid] = plays.dobradinha ? 2 : 1;
  const pts={};
  for(const uid in eff) pts[uid]= base[uid]*mult[uid];
  // 5) RISCO (regra nova) — mira no resultado (V/E/D), não no placar:
  //    alvo ACERTA o resultado → alvo ganha +1 extra NESTE jogo (riscoHit=true).
  //    O efeito cruzado (anular o próximo jogo do alvo ou de quem usou a carta,
  //    e o bônus avulso de +1 pra quem usou) é resolvido em riscoEffects(), pois
  //    depende do PRÓXIMO jogo do calendário — fora do escopo deste jogo.
  const riscoHit={};
  playList(plays.risco).forEach(r=>{ const tgt=r.target, e=eff[tgt];
    const acertou = !!(e && scoreAt(e,sh,sa)>=1);
    riscoHit[tgt]=acertou;
    if(acertou) pts[tgt]=(pts[tgt]||0)+1;
  });
  return {pts, exact, eff, orig, base, mult, riscoHit};
}
/* ── RISCO: efeito cruzado no PRÓXIMO jogo do calendário (regra nova, 14/06/2026) ──
   Resolvido só quando o jogo M (onde a carta foi jogada) já terminou:
   - alvo ACERTOU o resultado (V/E/D) de M → alvo +1 em M (já aplicado no computeMatch);
     quem usou a carta tem o PRÓXIMO jogo do calendário ANULADO (0 pts, sem exato).
   - alvo ERROU → o PRÓXIMO jogo do calendário do ALVO fica ANULADO (0 pts);
     quem usou a carta ganha +1 AVULSO no total (não vinculado a jogo nenhum).
   Determinístico, memoizado por _resolveVer. */
let _riscoFx={v:-1,r:null};
function riscoEffects(){
  if(_riscoFx.v===_resolveVer) return _riscoFx.r;
  const voided={}, bonus={};
  const order=matchList();
  for(let i=0;i<order.length;i++){
    const m=order[i], mid=m.id;
    const pm=(S.plays&&S.plays[mid])||{};
    if(!pm.risco || m.status!=="FINISHED") continue;
    const res=computeMatch(mid,m);
    const nxt=order[i+1];
    if(!nxt) continue; // último jogo da copa → sem "próximo jogo" pra anular
    playList(pm.risco).forEach(r=>{
      const by=r.by, tgt=r.target;
      if(res.riscoHit[tgt]) voided[by+"|"+nxt.id]=true;
      else { voided[tgt+"|"+nxt.id]=true; bonus[by]=(bonus[by]||0)+1; }
    });
  }
  _riscoFx={v:_resolveVer, r:{voided,bonus}};
  return _riscoFx.r;
}
/* ── feedback visual: o que as cartas fizeram com ESTE uid neste jogo (ou null) ──
   scoreChanged = palpite mexido (gol fantasma / troca); doubled = pontos ×2 (dobradinha/risco);
   penalty = −N (risco). Lê S.plays + resolver; data-driven → sem cartas devolve null. */
function playFx(uid, mid){
  const pm=playsFor(mid); if(!pm) return null;
  const res=matchResolve(mid);
  const o=res.orig&&res.orig[uid], e=res.eff&&res.eff[uid];
  const fx={scoreChanged:false, kind:null, fantDelta:0, doubled:false, riscoBonus:false, voided:false, eff:e, orig:o};
  if((o&&e&&(o.h!==e.h||o.a!==e.a)) || (!o&&e)){
    fx.scoreChanged=true;
    let fant=null; if(pm.fantasma) for(const by in pm.fantasma) if(pm.fantasma[by].target===uid) fant=pm.fantasma[by];
    let troca=false; if(pm.troca) for(const by in pm.troca){ const t=pm.troca[by]; if(t.a===uid||t.b===uid) troca=true; }
    fx.kind = (fant&&!troca) ? 'fant' : (troca&&!fant) ? 'troca' : 'both';
    if(fant) fx.fantDelta = fant.delta<0?-1:1;
  }
  if(res.mult && res.mult[uid]===2 && res.base[uid]>0) fx.doubled=true;
  if(res.riscoHit && res.riscoHit[uid]) fx.riscoBonus=true;
  if(res.voided && res.voided[uid]) fx.voided=true;
  return (fx.scoreChanged||fx.doubled||fx.riscoBonus||fx.voided) ? fx : null;
}
/* score de um palpite no reveal, mostrando a SABOTAGEM se houve (orig riscado → efetivo colorido). */
function scoreCellHTML(uid, mid, pal){
  const base = (pal&&pal.h!=null) ? (pal.h+"×"+pal.a) : "—";
  const fx = IS_LOCAL ? playFx(uid,mid) : null;
  if(!fx || !fx.scoreChanged || !fx.eff) return '<span class="sc">'+base+'</span>';
  const icon = fx.kind==='troca' ? '🔀' : fx.kind==='fant' ? '👻' : '🃏';
  const cls  = fx.kind==='troca' ? 'sc-troca' : 'sc-fant';
  const origTxt = fx.orig ? (fx.orig.h+"×"+fx.orig.a) : "—";
  return '<span class="sc sc-fx '+cls+'"><s class="sc-old">'+origTxt+'</s>'
       + '<span class="sc-new">'+fx.eff.h+"×"+fx.eff.a+'</span>'
       + '<span class="sc-ico" title="palpite alterado por carta">'+icon+'</span></span>';
}
/* chip de pontos no reveal: usa o RESOLVER quando há cartas (pontos ×2 / −1 marcados). */
function pgPointsChip(uid, mid, m, fin){
  const usePlays = matchHasPlays(mid);
  const hasScore = m.score && m.score.home!=null;
  let pts, exact;
  if(usePlays && hasScore){
    const res=matchResolve(mid); const eff=res.eff&&res.eff[uid];
    if(!eff && !res.pts[uid]) return null;
    pts=res.pts[uid]||0; exact=!!(res.exact&&res.exact[uid]);
  } else {
    const r=scoreOne((S.palpites[uid]||{})[mid], m); if(!r) return null;
    pts=r.pts; exact=r.exact;
  }
  const cls = pts>=3?"pts-3":pts>=1?"pts-1":pts<0?"pts-neg":"pts-0";
  let html=(pts>0?"+":"")+pts;
  if(usePlays){ const fx=playFx(uid,mid);
    if(fx){
      if(fx.voided) html+=' <i class="fx-tag pen">anulado 🚫</i>';
      else {
        if(fx.doubled) html+=' <i class="fx-tag dbl">🃏×2</i>';
        if(fx.riscoBonus) html+=' <i class="fx-tag dbl">🎯+1</i>';
      }
    } }
  const chip=el("span","chip pg-chip "+cls); chip.innerHTML=html; return chip;
}
function matchResolve(mid){
  const c=_resolveCache[mid];
  if(c && c.v===_resolveVer) return c.r;
  const r=computeMatch(mid, S.matches[mid]);
  const vd=riscoEffects().voided;
  for(const uid in r.pts){ if(vd[uid+"|"+mid]){ r.pts[uid]=0; r.exact[uid]=false; (r.voided=r.voided||{})[uid]=true; } }
  _resolveCache[mid]={v:_resolveVer, r};
  return r;
}
// settledOnly=true → conta SÓ jogos encerrados (usado pelas MOEDAS: saldo só muda no apito
// final, nunca com placar parcial). Sem o flag, conta o provisório ao vivo (classificação).
function totalFor(uid, settledOnly){
  let pts=0, exatos=0;
  const pal = S.palpites[uid]||{};
  const usePlays = hasAnyPlays();   // só entra no caminho com cartas quando alguém jogou
  for(const mid in S.matches){
    const m=S.matches[mid];
    const live = m.status==="IN_PLAY" || m.status==="PAUSED";
    // jogo rolando/intervalo conta provisório (placar parcial), pra classificação
    // já refletir "quem tá ganhando" mesmo antes do apito final
    if(m.status!=="FINISHED" && !live) continue;
    if(settledOnly && live) continue;   // moedas: parcial ao vivo NÃO conta
    if(usePlays){
      const eff=matchResolve(mid);
      pts += eff.pts[uid]||0;
      if(eff.exact[uid] && m.status==="FINISHED") exatos++;
    } else {
      const r=scoreOne(pal[mid], m);
      if(r){ pts+=r.pts; if(r.exact && m.status==="FINISHED") exatos++; }
    }
    // +1 "quem avança": só em jogo encerrado de mata-mata que foi pra prorrogação/pênaltis
    if(m.status==="FINISHED") pts += advancerBonus(pal[mid], m);
  }
  if(usePlays) pts += (riscoEffects().bonus[uid]||0);
  pts += bonusScore(S.bonus[uid]||{});
  return {pts, exatos};
}
function ranking(){
  const rows=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const t=totalFor(uid);
    rows.push({uid, slug:p.slug, name:p.name, pts:t.pts, exatos:t.exatos});
  }
  rows.sort((a,b)=> b.pts-a.pts || b.exatos-a.exatos || a.name.localeCompare(b.name));
  return rows;
}
// destaque por VALOR DE PONTOS (não por posição), pra empate no topo realçar TODOS os empatados.
// rankOf = "dense rank": empatados em pontos compartilham o mesmo número (1,1,3...).
// O desempate por exatos continua valendo na ORDEM das linhas; aqui é só o realce visual.
function rankTiers(rows){
  if(!rows.length) return {maxPts:0,lastPts:null,rankOf:{}};
  const pts=rows.map(r=>r.pts);
  const maxPts=Math.max(...pts);
  const lastPts=rows.length>1?Math.min(...pts):null;
  const rankOf={}; rows.forEach(r=>{ rankOf[r.uid]=pts.filter(p=>p>r.pts).length+1; });
  // quantos empatados na lanterna (só conta como "último" se não for empate geral no topo)
  const lastCount=(lastPts!=null && lastPts<maxPts) ? pts.filter(p=>p===lastPts).length : 0;
  return {maxPts,lastPts,lastCount,rankOf};
}

/* ── CASTIGO DO ÚLTIMO (staged, gated IS_LOCAL) ──
   Quantos dias seguidos (mais recentes, com jogo encerrado) a MESMA pessoa terminou
   em último na classificação ACUMULADA. Determinístico; memoizado por _resolveVer. */
let _lanterna={v:-1,r:null};
function lastPlaceStreak(){
  if(_lanterna.v===_resolveVer) return _lanterna.r;
  const out=(()=>{
    const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
    const dayset=new Set();
    for(const mid in S.matches){ const m=S.matches[mid]; if(m.status==="FINISHED") dayset.add(dayKey(m.kickoffMs)); }
    const days=[...dayset].sort((a,b)=>parse(a)-parse(b));
    if(!days.length) return null;
    const uids=Object.keys(S.participants).filter(u=>S.participants[u] && notBot(u));
    if(uids.length<2) return null;
    // último da classificação acumulada até o fim do dia dado (mesmo desempate de ranking())
    const lastUpTo=dayMs=>{
      const rows=uids.map(uid=>{ const pal=S.palpites[uid]||{}; let pts=0,ex=0;
        for(const mid in S.matches){ const m=S.matches[mid];
          if(m.status!=="FINISHED"||parse(dayKey(m.kickoffMs))>dayMs) continue;
          const r=scoreOne(pal[mid],m); if(r){ pts+=r.pts; if(r.exact)ex++; } }
        pts+=bonusScore(S.bonus[uid]||{}); return {uid,pts,ex,name:S.participants[uid].name}; });
      rows.sort((a,b)=> b.pts-a.pts || b.ex-a.ex || a.name.localeCompare(b.name));
      const maxP=Math.max(...rows.map(r=>r.pts));
      const lr=rows[rows.length-1];
      return lr.pts<maxP ? lr.uid : null;   // empate geral no fundo = sem lanterna definida
    };
    const cur=lastUpTo(parse(days[days.length-1]));
    if(!cur) return null;
    let streak=0;
    for(let i=days.length-1;i>=0;i--){ if(lastUpTo(parse(days[i]))===cur) streak++; else break; }
    if(streak<2) return null;
    const p=S.participants[cur];
    return {uid:cur, name:p?p.name:cur, slug:p?p.slug:null, days:streak};
  })();
  _lanterna={v:_resolveVer, r:out};
  return out;
}
// faixa de humilhação no topo do Bolão (gated IS_LOCAL — castigo do último ainda em prova)
function lanternaBanner(){
  if(!IS_LOCAL) return null;
  const l=lastPlaceStreak(); if(!l) return null;
  const f=el("div","lanterna-faixa");
  f.appendChild(el("span","lf-veg","🥬"));
  f.appendChild(el("div","lf-txt",
    'LANTERNA HÁ <span class="lf-days">'+l.days+' dias</span>: <b>'+esc(l.name)+'</b> — segura essa mão de alface 🫵'));
  return f;
}

/* ════════ CASTIGA O JEGUE — brincadeira lateral (staged, IS_LOCAL) ════════
   Cena em camadas (corpo + canvas p/ riscar o nome + rabo que balança + rosto do
   lanterna virado pra frente). Chicote: anima a cena, marca a bunda, conta as
   chicotadas. Vítima = último colocado AO VIVO. Contador local por enquanto
   (sync no RTDB depois, com OK do Pedro). */
let _jpEls=null, _jpCtx=null, _jpMuted=false, _jpAc=null, _jpDrew=false, _jpVictim={v:-1,r:null}, _jpModal=null, _jpDock=null;

// abre/fecha o card num modal central (gatilho = clicar no 🔥 da linha do lanterna)
function jegueOpen(uid){
  if(!_jpEls||!_jpModal) return;
  _jpPinUid = uid || null;   // clicou no jegue de alguém → fixa ELE como vítima do card
  _jpModal._body.appendChild(_jpEls.palco);
  _jpModal.classList.add("open");
  jegueRefresh();
  requestAnimationFrame(()=>jpInitCanvas());
}
function jegueClose(){
  if(!_jpModal) return;
  _jpModal.classList.remove("open");
  if(_jpDock) _jpDock.appendChild(_jpEls.palco);   // palco volta pro "armário" oculto
  // NÃO reseta o dano: o streak segura por 3 min mesmo fechando/reabrindo o card
}

// vítimas = TODOS os empatados na lanterna ao vivo (1+; vários quando há empate no fundo).
// [] se todo mundo empatado no geral (não dá pra apontar um último). Memoizado por _resolveVer.
function jegueVictims(){
  if(_jpVictim.v===_resolveVer) return _jpVictim.r;
  const out=(()=>{
    // MESMA fonte da classificação exibida (provisório ao vivo + cartas), pra o conjunto de
    // vítimas bater exatamente com as linhas que mostram o jeguinho 🐴/🥬 (isLast no rankTiers).
    const rows=ranking();
    if(rows.length<2) return [];
    const hl=rankTiers(rows);
    if(hl.lastPts==null || hl.lastPts>=hl.maxPts) return [];   // empate geral no fundo = sem vítima
    return rows.filter(r=>r.pts===hl.lastPts);                 // todos os lanternas (1 ou mais)
  })();
  _jpVictim={v:_resolveVer, r:out};
  return out;
}
// vítima "padrão" (primeiro da lanterna pelo desempate); null se ninguém no fundo
function jegueVictimNow(){ const vs=jegueVictims(); return vs.length?vs[0]:null; }

// rosto da vítima: DESCANSA num frame estático (nada de webp em loop sozinho).
// Pré-carrega os frames de animação (animado/{base}_2..4.png) p/ tocar SÓ na chicotada.
function jegueHeadImg(slug,name){
  const img=el("img"); img.className="jp-rosto-img"; img.alt="";
  const rest=avatarCandidates(slug,name,"jegue").filter(c=>!/\.webp$/i.test(c)); // estático (sem .webp animado)
  let i=0; const tryRest=()=>{ if(i>=rest.length){ img.style.display="none"; return; } img.src="assets/avatars/"+rest[i++]; };
  img.onerror=tryRest; tryRest();
  const base=((slug||slugify(name||""))+"_jegue");
  const restSrc = rest[0] ? "assets/avatars/"+rest[0] : null;
  const seq=[ restSrc, "assets/avatars/animado/"+base+"_2.png", "assets/avatars/animado/"+base+"_3.png", "assets/avatars/animado/"+base+"_4.png" ];
  const ok=seq.map((s,idx)=> idx===0 && !!s);
  seq.forEach((s,idx)=>{ if(idx===0||!s) return; const p=new Image(); p.onload=()=>{ok[idx]=true;}; p.onerror=()=>{ok[idx]=false;}; p.src=s; });
  img._jpFrames=seq; img._jpFrameOK=ok; img._jpRest=restSrc;
  return img;
}

// toca a animação do avatar por frames (rest→2→3→4→rest); reinicia a CADA chicotada.
// Sem frames (vítima sem set animado) → careta no rosto estático.
function jpPlayHeadAnim(){
  const head=_jpEls&&_jpEls.head; if(!head) return;
  const all=head._jpFrames||[], okv=head._jpFrameOK||[], rest=head._jpRest||all[0];
  const anim=all.filter((s,idx)=> idx>0 && okv[idx]);
  if(!anim.length){ _jpReplay(head,"wince",300); return; }
  if(head._jpAnimT){ clearInterval(head._jpAnimT); head._jpAnimT=null; }
  const frames=[...anim, rest]; let k=0; head.src=frames[0];
  head._jpAnimT=setInterval(()=>{ k++;
    if(k>=frames.length){ clearInterval(head._jpAnimT); head._jpAnimT=null; head.src=rest; return; }
    head.src=frames[k];
  },80);
}

// som do chicote: estalo REAL (assets/sfx/whip.wav). Clona o Audio a cada golpe pra
// cliques rápidos sobreporem; pitch levemente aleatório pra não soar repetitivo.
// Se o arquivo faltar, cai no synth (ruído filtrado).
let _jpWhipAudio=null, _jpWhipAudioOk=null;
function jpWhipSound(){
  if(_jpMuted) return;
  if(_jpWhipAudioOk===null){
    _jpWhipAudio=new Audio("assets/sfx/whip.wav");
    _jpWhipAudio.addEventListener("canplaythrough",()=>{_jpWhipAudioOk=true;},{once:true});
    _jpWhipAudio.addEventListener("error",()=>{_jpWhipAudioOk=false;},{once:true});
    _jpWhipAudio.load();
  }
  if(_jpWhipAudioOk){
    try{ const a=_jpWhipAudio.cloneNode(); a.volume=0.85; a.playbackRate=0.92+Math.random()*0.18; a.play().catch(()=>{}); return; }catch(e){}
  }
  // fallback synth (enquanto o wav carrega ou se faltar)
  try{
    _jpAc=_jpAc||new (window.AudioContext||window.webkitAudioContext)();
    const ac=_jpAc, t=ac.currentTime, len=Math.floor(ac.sampleRate*0.12);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
    const src=ac.createBufferSource(); src.buffer=buf;
    const hp=ac.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1100;
    const g=ac.createGain(); g.gain.setValueAtTime(.5,t); g.gain.exponentialRampToValueAtTime(.001,t+.12);
    src.connect(hp); hp.connect(g); g.connect(ac.destination); src.start();
  }catch(e){}
}

// reinicia a animação a CADA chamada (cliques rápidos engatilham de novo, sempre):
// cancela o timer anterior pra ele não tirar a classe no meio do próximo disparo.
const _jpReplay=(node,cls,ms)=>{
  if(node._jpT) clearTimeout(node._jpT);
  node.classList.remove(cls); void node.offsetWidth; node.classList.add(cls);
  node._jpT=setTimeout(()=>{ node.classList.remove(cls); node._jpT=null; },ms);
};

// reação da chicotada: anima o AVATAR (frames) + tranco curto + flick do rabo + FX + poeira.
// Nada disso roda sozinho — só quando alguém chicoteia.
function jpAnimateWhip(withSound){
  if(!_jpEls) return;
  if(withSound) jpWhipSound();
  jpPlayHeadAnim();                          // ← a animação do avatar (reinicia a cada chicotada)
  _jpReplay(_jpEls.stage,"hit",320);
  _jpReplay(_jpEls.rabo,"flick",450);
  // ângulo e altura do risco variam a cada golpe (ora -, ora +; nunca igual)
  const ang=(Math.random()<.5?-1:1)*(14+Math.random()*30);
  _jpEls.slash.style.setProperty("--ang", ang.toFixed(1)+"deg");
  _jpEls.slash.style.top=(48+Math.random()*16)+"%";
  _jpReplay(_jpEls.slash,"go",280);
  _jpReplay(_jpEls.welt,"go",1000);
  _jpReplay(_jpEls.crack,"go",500);
  jpSpawnDust();
}

/* estágios de dano do corpo: quanto maior o STREAK (combo), mais machucado o jegue fica.
   Escalável — é só ir adicionando {min, src} conforme o Pedro fizer novos avatares. */
const JP_BODY_STAGES=[
  {min:0,   src:"assets/avatars/jegue_corpo.png"},
  {min:5,   src:"assets/avatars/jegue_corpo_2.png"},
  {min:20,  src:"assets/avatars/jegue_corpo_3.png"},
  {min:40,  src:"assets/avatars/jegue_corpo_4.png"},
  {min:60,  src:"assets/avatars/jegue_corpo_5.png"},
  {min:100, src:"assets/avatars/jegue_corpo_6.png"},
  {min:140, src:"assets/avatars/jegue_corpo_7.png"},
];
JP_BODY_STAGES.forEach(s=>{ const p=new Image(); p.src=s.src; });   // pré-carrega p/ não piscar
let _jpStage=0;
function jpSetBodyStage(streak){
  let idx=0; for(let i=0;i<JP_BODY_STAGES.length;i++) if(streak>=JP_BODY_STAGES[i].min) idx=i;
  if(idx===_jpStage) return;
  const leveledUp = idx>_jpStage;
  _jpStage=idx;
  if(_jpEls&&_jpEls.corpo) _jpEls.corpo.src=JP_BODY_STAGES[idx].src;
  if(leveledUp) _jpReplay(_jpEls.stage,"hit",320);   // tranco extra ao "subir de nível" de dano
}

// STREAK acumulado: conta as chicotadas e SÓ reseta após 3 min sem bater (o dano "segura").
// Mostra "x{n} 🔥" e dirige o estágio de dano. Persiste entre abrir/fechar o card.
const JP_STREAK_RESET=180000;   // 3 minutos
let _jpComboN=0, _jpComboT=null;
function jpCombo(){
  _jpComboN++;
  if(_jpComboN>=2 && _jpEls.combo){ _jpEls.combo.textContent="x"+_jpComboN+" 🔥"; _jpEls.combo.style.opacity="1"; _jpReplay(_jpEls.combo,"show",260); }
  jpSetBodyStage(_jpComboN);
  clearTimeout(_jpComboT);
  _jpComboT=setTimeout(()=>{ _jpComboN=0; if(_jpEls.combo) _jpEls.combo.style.opacity="0"; jpSetBodyStage(0); }, JP_STREAK_RESET);
}
function jpSpawnPlus(){
  if(!_jpEls) return; const e=el("div","jp-plus","+1");
  e.style.left=(42+Math.random()*16)+"%"; e.style.top="50%";
  _jpEls.stage.appendChild(e); requestAnimationFrame(()=>e.classList.add("go"));
  setTimeout(()=>e.remove(),720);
}
function jpSpawnDust(){
  if(!_jpEls) return; const s=_jpEls.stage;
  for(let i=0;i<6;i++){ const d=el("div","jp-dust");
    const ang=-Math.PI*(0.1+Math.random()*0.8), dist=16+Math.random()*22;
    d.style.left=(46+Math.random()*12)+"%"; d.style.top=(58+Math.random()*8)+"%";
    d.style.setProperty("--dx",Math.round(Math.cos(ang)*dist)+"px");
    d.style.setProperty("--dy",Math.round(Math.sin(ang)*dist)+"px");
    s.appendChild(d); requestAnimationFrame(()=>d.classList.add("go"));

function jpWhip(){

/* ── cor por participante: hue espaçado por ângulo áureo (sat/luz fixos = alta visibilidade
   sobre a garupa clara). Estável por slug; nada de amarelo lavado (sat alto + luz média). ── */
const _jpHash=s=>{ let h=0; for(let i=0;i<String(s).length;i++) h=(h*31+String(s).charCodeAt(i))|0; return Math.abs(h); };
function jpColorFor(uid){
  const uids=Object.keys(S.participants||{}).filter(u=>S.participants[u])
    .sort((a,b)=>((S.participants[a].slug||a)).localeCompare(S.participants[b].slug||b));
  let i=uids.indexOf(uid); if(i<0) i=_jpHash(uid)%12;
  return "hsl("+Math.round((i*137.508)%360)+" 85% 47%)";
}

/* traços = vetores normalizados (0..1) + autor + cor. COMPARTILHADOS entre contas via
   RTDB (/jegue/strokes/{key} = {u:uid, c:cor, d:"x,y;x,y;..."}); leitura pública, escrita
   só nos próprios (regra em database.rules.json). _jpCur = traço em andamento (local). */
let _jpStrokes=[], _jpCur=null, _jpStrokesRef=null;
const jpEncode = pts => pts.map(p=>p[0].toFixed(3)+","+p[1].toFixed(3)).join(";");
const jpDecode = d => String(d).split(";").map(s=>{const a=s.split(","); return [parseFloat(a[0]),parseFloat(a[1])];}).filter(p=>p.length===2 && !isNaN(p[0]) && !isNaN(p[1]));

function jpSubscribeStrokes(){
  if(_jpStrokesRef) return;
  _jpStrokesRef=db.ref("jegue/strokes");
  _jpStrokesRef.on("value", snap=>{
    const v=snap.val()||{}, arr=[];
    for(const key in v){ const s=v[key]; if(!s||!s.d) continue;
      arr.push({key, uid:s.u, color:s.c||"#E8C547", pts:jpDecode(s.d)}); }
    _jpStrokes=arr; jpRedraw();
  }, ()=>{ /* permissão/erro: mantém o que já tem, sem quebrar */ });
}

function jpDrawStroke(st){
  if(!st.pts||st.pts.length<1) return;
  const cv=_jpEls.canvas, dpr=window.devicePixelRatio||1, w=cv.width/dpr, h=cv.height/dpr;
  _jpCtx.strokeStyle=st.color; _jpCtx.beginPath();
  _jpCtx.moveTo(st.pts[0][0]*w, st.pts[0][1]*h);
  for(let i=1;i<st.pts.length;i++) _jpCtx.lineTo(st.pts[i][0]*w, st.pts[i][1]*h);
  _jpCtx.stroke();
}
function jpRedraw(){
  if(!_jpCtx) return;
  const cv=_jpEls.canvas, dpr=window.devicePixelRatio||1;
  _jpCtx.clearRect(0,0,cv.width/dpr,cv.height/dpr);
  for(const st of _jpStrokes) jpDrawStroke(st);
  if(_jpCur) jpDrawStroke(_jpCur);   // mantém o traço em andamento mesmo quando chega update de outro
}

function jpInitCanvas(){
  const cv=_jpEls.canvas, r=cv.getBoundingClientRect();
  if(!r.width) return false;
  const dpr=window.devicePixelRatio||1;
  cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr);
  _jpCtx=cv.getContext("2d"); _jpCtx.scale(dpr,dpr);
  _jpCtx.lineCap="round"; _jpCtx.lineJoin="round"; _jpCtx.lineWidth=6;
  // sombra escura sutil = contorno que destaca QUALQUER cor sobre a garupa clara
  _jpCtx.shadowColor="rgba(0,0,0,.4)"; _jpCtx.shadowBlur=2;
  jpRedraw();
  return true;
}

function jpBindCanvas(){
  const cv=_jpEls.canvas;
  const npos=e=>{ const r=cv.getBoundingClientRect(); return [(e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height]; };
  cv.addEventListener("pointerdown",e=>{ if(!_jpCtx && !jpInitCanvas()) return;
    _jpCur={uid:S.uid, color:jpColorFor(S.uid), pts:[npos(e)]}; _jpDrew=true;
    cv.setPointerCapture(e.pointerId); e.preventDefault(); });
  cv.addEventListener("pointermove",e=>{ if(!_jpCur||!_jpCtx) return; _jpCur.pts.push(npos(e));
    const r=cv.getBoundingClientRect(), n=_jpCur.pts.length, a=_jpCur.pts[n-2], b=_jpCur.pts[n-1];
    _jpCtx.strokeStyle=_jpCur.color; _jpCtx.beginPath();
    _jpCtx.moveTo(a[0]*r.width,a[1]*r.height); _jpCtx.lineTo(b[0]*r.width,b[1]*r.height); _jpCtx.stroke();
    e.preventDefault(); });
  const end=()=>{ if(!_jpCur) return; const c=_jpCur; _jpCur=null;
    if(c.pts.length>1){ try{ db.ref("jegue/strokes").push({u:S.uid, c:c.color, d:jpEncode(c.pts)}).catch(()=>{}); }catch(e){} }
  };
  cv.addEventListener("pointerup",end); cv.addEventListener("pointercancel",end); cv.addEventListener("pointerleave",end);
}

// limpa SÓ os traços do próprio usuário (remove do RTDB → some pra todo mundo); o resto fica
function jpClear(){
  try{ for(const st of _jpStrokes) if(st.uid===S.uid && st.key) db.ref("jegue/strokes/"+st.key).remove().catch(()=>{}); }catch(e){}
  _jpStrokes=_jpStrokes.filter(s=>s.uid!==S.uid); jpRedraw(); _jpDrew=false;
}

/* ── pendências (notificações) ── */
const isTodayMs = ms => dayKey(ms)===dayKey(Date.now());
function pendingMatches(filterFn){
  return matchList().filter(m=> filterFn(m.kickoffMs) && m.kickoffMs>Date.now()
    && m.status!=="POSTPONED" && m.status!=="CANCELLED" && !isConfirmed(S.myPalpites[m.id]));
}
const pendingToday = ()=> pendingMatches(isTodayMs);
function pendingBonus(){
  if(bonusLocked()) return false;
  const b=S.myBonus||{};
  return ["campeao","artilheiro","melhorAtaque","melhorDefesa","neymar","brasilFase"].some(k=>!b[k]);

/* ════════ RENDER: dispatcher ════════ */
function renderScreen(){
  const m = $("#main"); if(!m) return;
  _screenDeferred=false;   // qualquer render da tela quita o que estava pendente
  // estrutura persistente: hero (todas as abas) + conteúdo da tela
  let hero=$("#heroSlot"), content=$("#screenContent");
  if(!hero || !content){
    m.innerHTML="";
    hero=el("div"); hero.id="heroSlot"; m.appendChild(hero);
    content=el("div"); content.id="screenContent"; m.appendChild(content);
  }
  // hero "você é {nome}" + pontos em TODAS as abas (some no admin)
  hero.innerHTML="";
  if(S.me && S.screen!=="admin") hero.appendChild(myHero());
  // preserva foco/cursor de um input de palpite durante re-renders ao vivo
  // preserva foco/cursor/valor de um input durante re-renders ao vivo:
  // palpite (data-mid+data-side) OU resenha (data-chat) — senão o texto digitado some
  const af = document.activeElement;
  let restore = null;
  if(af && af.tagName==="INPUT" && af.dataset){
    if(af.dataset.mid && af.dataset.side)
      restore = { sel:'input[data-mid="'+af.dataset.mid+'"][data-side="'+af.dataset.side+'"]', val:af.value, start:af.selectionStart };
    else if(af.dataset.chat)
      restore = { sel:'input[data-chat="'+af.dataset.chat+'"]', val:af.value, start:af.selectionStart };
  }
  if(S.screen==="palpites") renderPalpites(content);
  else if(S.screen==="bolao") renderTodos(content);
  else if(S.screen==="tracker") renderTracker(content);
  else if(S.screen==="chave") renderChave(content);
  else if(S.screen==="ranking") renderRanking(content);
  else if(S.screen==="poderes") renderPoderes(content);
  else if(S.screen==="feed") renderFeed(content);
  else if(S.screen==="admin") renderAdmin(content);
  updateNavBadges();
  updateCoinChip();
  setupLiveSticky();
  jegueRefresh();
  if(restore){
    const nx = content.querySelector(restore.sel);
    if(nx && !nx.disabled){
      nx.value = restore.val;            // mantém o que o usuário digitou
      nx.focus();
      try{ nx.setSelectionRange(restore.start,restore.start); }catch(e){}
    }
  }
}
// placar grudado no topo quando o card AO VIVO sai da viewport (8.2)
let _liveObs=null;
function setupLiveSticky(){
  const bar=$("#liveSticky"); if(!bar) return;
  if(_liveObs){ _liveObs.disconnect(); _liveObs=null; }
  const board=document.querySelector(".live-board[data-mid]");
  if(!board){ bar.classList.add("hidden"); return; }
  const mid=board.dataset.mid;
  const paint=()=>{ const m=S.matches[mid]; if(!m){ bar.classList.add("hidden"); return; }
    const s=m.score||{}; const r=scoreOne((S.palpites[S.uid]||{})[mid],m);
    const chip = r? (r.pts===3?'<span class="chip prov-3">+3 🔥</span>':r.pts===1?'<span class="chip prov-1">+1</span>':'<span class="chip prov-0">0</span>') : '';
    bar.innerHTML='<span class="ls-live"><span class="live-dot"></span>AO VIVO</span>'
      +'<span class="ls-score">'+esc(ptName(m.home.name))+' <b>'+(s.home==null?0:s.home)+'×'+(s.away==null?0:s.away)+'</b> '+esc(ptName(m.away.name))+'</span>'
      +chip+'<button class="ls-back">voltar ›</button>';
    bar.querySelector(".ls-back").onclick=()=>board.scrollIntoView({behavior:"smooth",block:"center"});
  };
  _liveObs=new IntersectionObserver(es=>{
    es.forEach(e=>{ const above=!e.isIntersecting && e.boundingClientRect.top<0;
      if(above){ paint(); bar.classList.remove("hidden"); } else bar.classList.add("hidden"); });
  },{threshold:0, rootMargin:"-58px 0px 0px 0px"});
  _liveObs.observe(board);
}

// frase de perseguição: vizinho de cima (ou de baixo, se líder) + a diferença (6.1)
function chaseLine(rows,pos,myPts){
  if(rows.length<2) return "";
  if(pos>0){
    const up=rows[pos-1], d=up.pts-myPts;
    if(d<=0) return "📈 empatou com <b>"+esc(up.name)+"</b> — um acerto e assume";
    return "🎯 <b>"+d+"</b> "+(d===1?"ponto":"pontos")+" atrás de <b>"+esc(up.name)+"</b>"+(d<=3?" — um acerto hoje e você passa":"");
  }
  // líder: olha o vizinho de baixo
  const down=rows[1], d=myPts-down.pts;
  if(d<=0) return "👑 líder no empate — <b>"+esc(down.name)+"</b> cola no teu cangote";
  return "👑 líder · <b>"+esc(down.name)+"</b> tá <b>"+d+"</b> atrás, no teu cangote";
}

    }
    mid.appendChild(posRow);
    // linha de perseguição (6.1): preenche o vazio do hero com o duelo de quem tá perto
    const chase=chaseLine(rows,pos,t.pts);
    if(chase) mid.appendChild(el("div","hero-chase",chase));
  }
  hero.appendChild(mid);
  const pts=el("div","hero-pts");
  const big=el("div","big", String(_heroPts==null?t.pts:_heroPts));
  pts.appendChild(big);
  pts.appendChild(el("div","lbl","pontos"));
  if(t.exatos>0) pts.appendChild(el("div","ex",t.exatos+" cravados 🎯"));
  hero.appendChild(pts);
  // count-up dos pontos quando mudam (ex.: saiu um gol e você foi pra +3) — 3.4
  countUp(big, _heroPts==null?t.pts:_heroPts, t.pts);
  _heroPts=t.pts;
  return hero;
}
let _heroPts=null;
// rola os dígitos de `from` até `to` (easeOutCubic, ~600ms); respeita reduced-motion
function countUp(node, from, to){
  if(from===to || matchMedia("(prefers-reduced-motion: reduce)").matches){ node.textContent=to; return; }
  const dur=600, t0=performance.now(), diff=to-from;
  const step=now=>{ const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
    node.textContent=Math.round(from+diff*e); if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

// corte da "leva": jogos que começam até ~3h da manhã contam pro dia ANTERIOR (jogo nos
// EUA/Canadá que rola de madrugada no Brasil é a mesma leva). Desloca 3h e usa a data local.
const DAY_SHIFT = 3*36e5;
const dayKey = ms => new Date(ms - DAY_SHIFT).toLocaleDateString("pt-BR");
const dayLabel = ms => new Date(ms - DAY_SHIFT).toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"long"}).toUpperCase();
const timeLabel = ms => new Date(ms).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); // horário real do jogo

const startOfToday = ()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); };
function renderProximos(root){
  const now=Date.now();
  const today=dayKey(now);
  // (cockpit ao vivo — ticker + boletim — fica só na tela Bolão; aqui em "Meus palpites" não entra)
  // aviso enxuto (1 linha) só no celular se houver pendência de hoje
  const pendHoje = pendingToday();
  if(pendHoje.length){
    root.appendChild(el("div","mob-alert","⚠️ você tem <b>"+pendHoje.length+" palpite"+(pendHoje.length>1?"s":"")+"</b> de hoje pra cravar"));
  }
  // todos os jogos de hoje em diante, agrupados por dia
  const upcoming = matchList().filter(m=>m.kickoffMs>=startOfToday());
  if(!upcoming.length){ root.appendChild(el("div","empty","Acabou a Copa, fellas. Foi bom enquanto durou. 🏆")); return; }
  // o "próximo jogo": ao vivo agora, senão o mais cedo ainda por vir
  const liveNow = upcoming.find(m=>m.status==="IN_PLAY"||m.status==="PAUSED");
  const nextUp = upcoming.find(m=>m.kickoffMs>now && m.status!=="FINISHED" && m.status!=="POSTPONED");
  const featuredId = liveNow ? liveNow.id : (nextUp ? nextUp.id : null);
  const days = groupByDay(upcoming);
  const limit = S.proxDays || 2;   // por padrão hoje + amanhã
  const shown = days.slice(0, limit);
  const myP=S.palpites[S.uid]||{};
  shown.forEach(([k,ms,games])=>{
    const isToday = dayKey(ms)===today;
    const pend=games.filter(g=>g.status!=="FINISHED"&&g.status!=="POSTPONED"&&g.status!=="CANCELLED"&&g.kickoffMs>Date.now()&&!isConfirmed(myP[g.id])).length;
    const head=el("div","day-head"+(isToday?" today":""));
    head.innerHTML='<span class="dh-date">'+(isToday?'<span class="dh-today">HOJE</span> ':'')+dayLabel(ms)+'</span>'
      +'<span class="dh-meta">'+games.length+' jogo'+(games.length>1?'s':'')
        +(pend>0?' · <b>'+pend+' a cravar</b>':' · tudo cravado ✓')+'</span>';
    root.appendChild(head);
    games.forEach(m=>root.appendChild(matchCard(m, false, m.id===featuredId)));
  });
  // botão "ver mais"
  if(days.length>limit){
    const wrap=el("div",null); wrap.style.textAlign="center"; wrap.style.margin="12px 0 4px";
    const btn=el("button","btn ghost","▼ ver próximos dias");
    btn.onclick=()=>{ S.proxDays=limit+2; renderScreen(); };
    wrap.appendChild(btn);
    root.appendChild(wrap);
  } else if(limit>2 && days.length>2){
    const wrap=el("div",null); wrap.style.textAlign="center"; wrap.style.margin="12px 0 4px";
    const btn=el("button","btn ghost sm","▲ recolher");
    btn.onclick=()=>{ S.proxDays=2; renderScreen(); };
    wrap.appendChild(btn);
    root.appendChild(wrap);
  }
}
function groupByDay(list){
  const map={};
  list.forEach(m=>{ const k=dayKey(m.kickoffMs); (map[k]=map[k]||[]).push(m); });
  return Object.keys(map).sort((a,b)=>map[a][0].kickoffMs-map[b][0].kickoffMs)
    .map(k=>[k,map[k][0].kickoffMs,map[k]]);
}
const isComplete = p => p && Number.isInteger(p.h) && Number.isInteger(p.a);
// palpite CONFIRMADO = travado pelo dono (sem volta). Reveal geral só quando todos confirmam.
const isConfirmed = p => isComplete(p) && p.confirmed === true;

function matchCard(m, forceDisabled, featured){
  const live = m.status==="IN_PLAY"||m.status==="PAUSED";
  const fin = m.status==="FINISHED";
  const myPal = S.myPalpites[m.id];
  // jogo de hoje, ainda palpitável e sem palpite OU não confirmado → notificação vermelha
  const palpitable = !forceDisabled && !live && !fin && m.status!=="POSTPONED" && m.status!=="CANCELLED" && Date.now()<m.kickoffMs;
  const needsPalp = palpitable && isTodayMs(m.kickoffMs) && !isConfirmed(myPal);
  // acento de borda: verde = confirmado/trancado · dourado = rascunho completo aguardando confirmar
  const isCfm = isConfirmed(myPal) && !live && !fin;
  const isDraft = palpitable && isComplete(myPal) && !isConfirmed(myPal);
  const card=el("div","match"+(forceDisabled?" disabled":"")+(live?" live-card":"")+(fin?" fin-card":"")+(featured?" featured":"")+(needsPalp?" needs-palp":"")+(isCfm?" cfm-card":"")+(isDraft?" draft-card":""));
  card.dataset.mid=m.id;
  if(needsPalp){ card.appendChild(el("span","nopalp-dot")); }
  if(featured){
    const badge=el("div","feat-badge"+(live?" live":""),(live?'<span class="live-dot"></span>ACONTECENDO AGORA':'⚽ PRÓXIMO JOGO'));
    card.appendChild(badge);
  }
  const top=el("div","match-top");
  let stageTxt = m.group ? ("Grupo "+groupLabel(m.group)) : (STAGE_PT[m.stage]||m.stage||"");
  const rightTxt = live ? '<span style="color:var(--gold);font-weight:800"><span class="live-dot"></span>AO VIVO</span>'
    : fin ? 'ENCERRADO'
    : '<span style="color:var(--gold)">'+new Date(m.kickoffMs).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})+' · '+timeLabel(m.kickoffMs)+'</span>';
  const venueTxt = m.venue ? '<span class="venue">📍 '+esc(m.venue)+'</span>' : '<span></span>';
  top.innerHTML='<span>'+esc(stageTxt)+'</span>'+venueTxt+'<span>'+rightTxt+'</span>';
  top.style.gap="8px";
  card.appendChild(top);
  // DOBRADINHA automática (Brasil): faixa dourada + realce no card de palpite
  if((playsFor(m.id)||{}).dobradinha){
    card.classList.add("dobrada");
    card.appendChild(el("div","m-dobrada-banner",'🃏 jogo dobrado · vale <b>×2</b> pra geral'));
  }

  // odds do CPUzão: só revela o favorito DEPOIS de CONFIRMAR o palpite (não ao só digitar) — anti-cola
  if(isConfirmed(myPal)){
    const ob=oddsBadge(m);
    if(ob){ const obRow=el("div","odds-row"); obRow.appendChild(ob); card.appendChild(obRow); }
  }

  const body=el("div","match-body");
  // home team
  const th=el("div","team");
  th.appendChild(crestImg(m.home.crest));
  th.appendChild(el("div","tname",esc(ptName(m.home.name))));
  // score / inputs
  const center=buildScoreCenter(m, forceDisabled);
  // away team
  const ta=el("div","team away");
  ta.appendChild(crestImg(m.away.crest));
  ta.appendChild(el("div","tname",esc(ptName(m.away.name))));
  body.appendChild(th); body.appendChild(center); body.appendChild(ta);
  card.appendChild(body);
  // mata-mata: "quem avança" — escolhe TOCANDO na própria seleção (th/ta); strip abaixo dá o contexto
  if(isKnockout(m) && !forceDisabled){ const ar=buildAdvRow(m, palpitable, th, ta); if(ar) card.appendChild(ar); }
  if(live) card.appendChild(watchLiveLink(m));
  // badges das cartas jogadas neste jogo (🃏 dobrado · 🎯 risco em você · 👻 · 🔀)
  const pb=playBadges(m.id); if(pb) card.appendChild(pb);

  // footer: (expira em / flash salvo) à esquerda · chip de pontuação à direita
  const foot=el("div","match-foot");
  const leftWrap=el("div"); leftWrap.style.display="flex"; leftWrap.style.alignItems="center"; leftWrap.style.gap="8px";
  const upcoming = !live && !fin && m.status!=="POSTPONED" && Date.now()<m.kickoffMs;
  // "tranca em" só pros jogos de hoje
  if(upcoming && isTodayMs(m.kickoffMs)) leftWrap.appendChild(expiraChip(m.kickoffMs));
  const flash=el("span","flash"); flash.dataset.flash="1";
  leftWrap.appendChild(flash);
  foot.appendChild(leftWrap);
  // jogo palpitável: botão CONFIRMAR (trava sem volta) ou selo de confirmado;
  // demais estados: chip de pontuação
  if(upcoming && !forceDisabled){
    foot.appendChild(buildConfirmUI(m, myPal));
  } else {
    foot.appendChild(buildPtsChip(m));
  }
  card.appendChild(foot);
  return card;
}
function buildConfirmUI(m, pal){

    const b=el("button","confirm-btn",'confirmar 🔒');

function confirmPalpite(mid){
  const pal=S.myPalpites[mid];
  if(!isComplete(pal)){ toast("preenche o placar primeiro","err"); return; }
  const m=S.matches[mid];
  // mata-mata empatado: não dá pra confirmar sem cravar quem passa de fase
  if(m && isKnockout(m) && pal.h===pal.a && !pal.adv){
    toast("empatou? toque em quem passa de fase antes de confirmar 🛡️","err");
    const card=document.querySelector('.match[data-mid="'+mid+'"]');
    if(card) card.querySelectorAll('.team.advsel').forEach(t=>{ t.classList.remove("adv-flash"); void t.offsetWidth; t.classList.add("adv-flash"); });
    return;
  }
  const nm = m ? (ptName(m.home.name)+" "+pal.h+"×"+pal.a+" "+ptName(m.away.name)) : (pal.h+"×"+pal.a);
  showConfirmDialog(
    "Confirmar palpite?",
    "Você está cravando <b>"+esc(nm)+"</b>.<br>Depois de confirmar <b>não dá pra mudar</b> — é palpite de macho.",
    ()=>{
      // grava o palpite PRIMEIRO (crítico). O evento de feed é best-effort: NUNCA
      // pode derrubar o confirmar (ex.: regras do /activity não publicadas → permission).
      db.ref("palpites/"+S.uid+"/"+mid).set(Object.assign({h:pal.h,a:pal.a,ts:Date.now(),confirmed:true}, pal.adv?{adv:pal.adv}:{}))
        .then(()=>{
          toast("palpite cravado e trancado 🔒","ok");
          logActivity({}, {t:"confirm", mid:mid}).catch(()=>{});
        })
        .catch(e=>{
          if(/permission/i.test(e.message||"")) toast("⏱️ tarde demais, a bola já rolou","err");
          else toast("sem conexão — não confirmou","err");
        });
    }
  );
}
// odds salvas pelo CPUzão (netlify/functions/botfellas.js) em /odds/{matchId}
function oddsBadge(m){
  const o = S.odds && S.odds[m.id];
  if(!o || !o.home || !o.draw || !o.away) return null;
  const min = Math.min(o.home, o.draw, o.away);
  let fav;
  if(min===o.draw) fav="empate";
  else if(min===o.home) fav=ptName(m.home.name);
  else fav=ptName(m.away.name);
  const chip=el("span","chip odds-chip");
  chip.title="odds (CPUzão): casa "+o.home.toFixed(2)+" · empate "+o.draw.toFixed(2)+" · fora "+o.away.toFixed(2);
  chip.innerHTML='💰 favorito das casas: <b>'+esc(fav)+'</b> ('+min.toFixed(2)+')';
  return chip;
}
function crestImg(src){
  const i=new Image(); i.className="crest"; i.src=src||"";

function buildScoreCenter(m, forceDisabled){

// rascunho em memória: o que foi digitado mas ainda NÃO virou par completo salvo.
// Garante que, se um rebuild escapar, o número digitado é repintado em vez de sumir
// (ex.: digita a casa "2", toca no fora → antes o "2" evaporava, pois par incompleto
// nunca é gravado e só o input focado era preservado).
const _draft={};
function mkInput(mid,side,val,locked){
  const i=el("input"); i.type="text"; i.inputMode="numeric"; i.maxLength=2;
  i.dataset.mid=mid; i.dataset.side=side;
  // valor exibido: o salvo (number) manda; senão, o rascunho não-salvo
  let shown = Number.isInteger(val)?val:"";
  if(shown==="" && _draft[mid] && _draft[mid][side]!=null) shown=_draft[mid][side];
  i.value = shown;
  if(locked) i.disabled=true;
  i.addEventListener("input",()=>{
    i.value=i.value.replace(/[^0-9]/g,"").slice(0,2);
    (_draft[mid]=_draft[mid]||{})[side]=i.value;   // guarda o rascunho (sobrevive a rebuild)
    schedulePalpiteSave(mid);
  });
  i.addEventListener("focus",()=>presenceTyping(mid));   // "tá palpitando…" no rail dos outros
  i.addEventListener("blur",()=>{
    presenceTyping(null);
    // setTimeout(0): se o foco apenas pulou pro input irmão (casa→fora), isEditingInput()
    // ainda é true e o render adiado NÃO descarrega (não destrói o input de destino).
    setTimeout(flushDeferredScreen,0);
  });
  return i;
}
/* ──────── QUEM AVANÇA: escolhe TOCANDO na própria seleção do card (sem repetir bandeira/nome) ──────── */
const ADV_SHIELD='<svg class="adv-ico" viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 11 4.6-2.4 8-6 8-11V5l-8-3z" fill="currentColor"/></svg>';
// marca um bloco de time (th/ta) como escolhido/vencedor: anel dourado (CSS) + escudo no nome
function markAdvTeam(node, cls){
  if(!node) return;
  node.classList.add(cls);
  const tn=node.querySelector(".tname");
  if(tn && !tn.querySelector(".adv-tn-ico")) tn.insertAdjacentHTML("afterbegin",'<span class="adv-tn-ico">'+ADV_SHIELD+'</span>');

function buildAdvRow(m, palpitable, th, ta){
  const pal=S.myPalpites[m.id]||{};
  const hn=ptName(m.home.name), an=ptName(m.away.name);
  const fin=m.status==="FINISHED", live=m.status==="IN_PLAY"||m.status==="PAUSED";

  // ── encerrado nos pênaltis: realça quem passou no card + veredito do seu chute ──
  if(fin && m.winner90==="DRAW"){
    const act=m.advancer;
    const row=el("div","adv adv-done");
    if(!act){ row.innerHTML='<span class="adv-cap">'+ADV_SHIELD+'PÊNALTIS</span><span class="adv-pending">empatou em 90 — aguardando quem passou</span>'; return row; }
    markAdvTeam(act==="HOME"?th:ta,"advwon");
    const pick=advancerPick(pal), hit=pick && pick===act;
    let verdict;
    if(!pick) verdict='<span class="adv-verdict none">sem chute</span>';
    else if(hit) verdict='<span class="adv-verdict hit">✓ você cravou +1</span>';
    else verdict='<span class="adv-verdict miss">você foi de '+esc(pick==="HOME"?hn:an)+'</span>';
    row.innerHTML='<span class="adv-cap">'+ADV_SHIELD+'PASSOU NOS PÊNALTIS · <b>'+esc(act==="HOME"?hn:an)+'</b></span>'+verdict;
    return row;
  }
  // decidido em 90 num jogo encerrado: a regra do "quem avança" não se aplica
  if(fin) return null;

  // ── palpitável: SEMPRE dá pra escolher quem passa, em qualquer jogo de mata-mata.
  //    Mesmo cravando placar decidido, o jogo pode empatar e ir pros pênaltis — então
  //    a pessoa pode dizer quem passa nesse caso. Default = vencedor implícito pelo placar. ──
  if(palpitable){
    const locked=isConfirmed(pal);
    const explicit=(pal.adv==="HOME"||pal.adv==="AWAY"); // escolheu na mão
    const cur=advancerPick(pal);                         // quem passa hoje: explícito OU implícito pelo placar
    const tie=(pal.h==null||pal.a==null||pal.h===pal.a); // empate/branco no placar
    const needPick=tie && !explicit;                     // empate sem escolha → precisa escolher
    const cap = needPick ? 'EMPATOU EM 90? ESCOLHA QUEM PASSA DE FASE'
              : tie       ? 'QUEM PASSA DE FASE'
              :             'SE EMPATAR, QUEM PASSA NOS PÊNALTIS';
    const row=el("div","adv adv-pick"+(needPick?" needpick":" chosen"));
    row.innerHTML='<span class="adv-cap big">'+ADV_SHIELD+cap+'</span>';
    [["HOME",th],["AWAY",ta]].forEach(([sd,node])=>{
      if(!node) return;
      // escolha na mão = cartão dourado (advon); derivada do placar = marca discreta (advimp)
      const mk=()=> markAdvTeam(node, explicit?"advon":"advimp");
      if(locked){ if(cur===sd) mk(); return; }
      node.classList.add("advsel");                      // cartão tocável (cara de botão)
      if(cur===sd) mk();
      node.onclick=()=>setAdvancer(m.id,sd);
      node.setAttribute("role","button"); node.tabIndex=0;
      node.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); setAdvancer(m.id,sd); } };
    });
    return row;
  }

  // ── ao vivo empatando: realça quem você apostou pra passar ──
  if(live){
    const pick=advancerPick(pal); if(!pick) return null;
    markAdvTeam(pick==="HOME"?th:ta,"advimp");
    const row=el("div","adv adv-live");
    row.innerHTML='<span class="adv-cap">'+ADV_SHIELD+'SE FOR PROS PÊNALTIS · <b>'+esc(pick==="HOME"?hn:an)+'</b></span>';
    return row;
  }
  return null;
}
function setAdvancer(mid, side){
  const pal=S.myPalpites[mid]||(S.myPalpites[mid]={});
  pal.adv=side; // eco otimista
  if(DEMO){
    (S.palpites[S.uid]=S.palpites[S.uid]||{})[mid]=Object.assign({}, S.palpites[S.uid][mid], {adv:side});
    requestRender({screen:true}); return;
  }
  db.ref("palpites/"+S.uid+"/"+mid).update({adv:side,ts:Date.now()})
    .then(()=>toast("quem passa: cravado 🛡️","ok"))
    .catch(e=>{ if(/permission/i.test(e.message||"")) toast("⏱️ tarde demais, a bola já rolou","err"); else toast("sem conexão — não salvou","err"); });
  requestRender({screen:true});
}
function buildPtsChip(m){
  const pal=S.myPalpites[m.id];
  if(m.status==="POSTPONED") return el("span","chip prov-0","adiado 🤷");
  const dob=!!(playsFor(m.id)||{}).dobradinha;   // jogo do Brasil = ×2 pra geral
  const x2=dob?" 🃏×2":"";
  const eff=(b)=> dob? b*2 : b;
  if(m.status==="IN_PLAY"||m.status==="PAUSED"){
    const r=scoreOne(pal,m);
    if(!r) return el("span","chip live pulse",'<span class="live-dot"></span>AO VIVO');
    const cls=r.pts===3?"prov-3":r.pts===1?"prov-1":"prov-0";
    const txt=r.pts>=1?("se acabar assim: +"+eff(r.pts)+(r.pts===3?" 🔥":"")+x2):"se acabar assim: 0 😬";
    return el("span","chip "+cls+" pulse",txt);
  }
  if(m.status==="FINISHED"){
    const r=scoreOne(pal,m);
    const advB=advancerBonus(pal,m);                 // +1 "quem avança" (só mata-mata nos pênaltis)
    const advTag=advB?' <i class="fx-tag dbl">🛡️+1</i>':'';
    if(!r){
      if(advB) return el("span","chip pts-1","+1 🛡️ cravou quem passou");
      return el("span","chip pts-0","sem palpite — 0");
    }
    if(r.pts===3){ const c=el("span","chip pts-3"); c.innerHTML="+"+(eff(3)+advB)+" 🎯"+x2+advTag; maybeConfetti(m.id,c); return c; }
    if(r.pts===1){ const c=el("span","chip pts-1"); c.innerHTML="+"+(eff(1)+advB)+x2+advTag; maybePop1(m.id,c); return c; }
    if(advB) return el("span","chip pts-1","+1 🛡️ errou o placar, mas cravou quem passou");
    return el("span","chip pts-0","0 — doeu");
  }
  return el("span","");
}

const saveTimers={};
function schedulePalpiteSave(mid){
  clearTimeout(saveTimers[mid]);
  saveTimers[mid]=setTimeout(()=>savePalpite(mid),400);
}
function savePalpite(mid){
  const card=document.querySelector('.match[data-mid="'+mid+'"]');
  if(!card) return;
  const ih=card.querySelector('input[data-side="h"]'), ia=card.querySelector('input[data-side="a"]');
  if(!ih||!ia) return;
  const h=ih.value===""?null:parseInt(ih.value,10);
  const a=ia.value===""?null:parseInt(ia.value,10);
  // só grava par completo e válido
  if(h==null||a==null||isNaN(h)||isNaN(a)) return;
  if(h<0||h>20||a<0||a>20){ toast("placar entre 0 e 20, campeão","err"); return; }
  const payload={h,a,ts:Date.now()};
  const curAdv=(S.myPalpites[mid]||{}).adv; if(curAdv) payload.adv=curAdv; // não apaga "quem avança" já escolhido
  db.ref("palpites/"+S.uid+"/"+mid).set(payload)
    .then(()=>{
      delete _draft[mid];   // salvou o par completo → rascunho não é mais necessário
      const f=card.querySelector('[data-flash]');
      if(f){ f.textContent="cravado ✓"; f.classList.add("show"); setTimeout(()=>f.classList.remove("show"),1400); }
    })
    .catch(e=>{
      if((e.code||"").includes("PERMISSION")||/permission/i.test(e.message)){
        toast("⏱️ tarde demais, a bola já rolou","err");
      } else {
        toast("sem conexão — palpite NÃO salvo","err");
      }
    });
}

/* ════════ TELA PRINCIPAL: BOLÃO (apostas de todos) ════════ */
// estado da régua de dias: último dia centralizado + rolagem manual preservada entre re-renders ao vivo
let _railDay=null, _railScroll=0;
function renderTodos(root){
  root.innerHTML="";
  if(!Object.keys(S.matches).length){ root.appendChild(noMatches()); return; }
  const now=Date.now();
  // ⚡ jogos AO VIVO (ou já começados, aguardando feed) no topo, com aposta de todo mundo
  const liveMatches = matchList().filter(isLiveish);
  // COCKPIT AO VIVO: ticker de todos os jogos rolando (troca o foco) + UM board em foco
  const tk=liveTicker(); if(tk) root.appendChild(tk);
  if(liveMatches.length){
    if(!S.focusLive || !S.matches[S.focusLive] || !isLiveish(S.matches[S.focusLive])) S.focusLive=liveMatches[0].id;
    const fm=S.matches[S.focusLive]||liveMatches[0];
    const lh=el("div","section-head live-head"); lh.innerHTML='<span class="live-dot"></span> EM FOCO · '+esc(ptName(fm.home.name))+' × '+esc(ptName(fm.away.name));
    root.appendChild(lh);
    root.appendChild(liveBoard(fm));
  }
  // dias com jogos
  const dmap={}; matchList().forEach(m=>{ const k=dayKey(m.kickoffMs); (dmap[k]=dmap[k]||[]).push(m); });
  const ordered=Object.keys(dmap).sort((a,b)=>dmap[a][0].kickoffMs-dmap[b][0].kickoffMs);
  const todayKey=dayKey(now);
  // 1ª vez abre em HOJE; mas se o usuário escolher OUTRO dia (inclusive passado, pra ver
  // resultados), respeita a escolha — só reseta se o dia selecionado nem existe mais.
  const selValid = S.todosDay && ordered.includes(S.todosDay);
  if(!selValid){
    S.todosDay = dmap[todayKey] ? todayKey : (ordered.find(k=>dmap[k][0].kickoffMs>=startOfToday()) || ordered[ordered.length-1] || ordered[0]);
  }
  // régua "trilha": TODOS os dias numa tira rolável; HOJE abre centralizado, passado fica discreto
  const chips=el("div","day-chips");
  const indi=el("div","dc-indi"); chips.appendChild(indi);
  ordered.forEach(k=>{
    const ms=dmap[k][0].kickoffMs, d=new Date(ms);
    const isT = k===todayKey, isPast = k<todayKey;
    const wd = d.toLocaleDateString("pt-BR",{weekday:"short"}).replace(/\.$/,"").toUpperCase();
    const dn = d.getDate();
    const dayGames = dmap[k];
    const hasLive = dayGames.some(isLiveish);
    // só sinaliza jogo AO VIVO (info) — nada de "pendente" aqui: cravar é na aba Meus palpites
    const dot = hasLive ? '<span class="dc-live"></span>' : '';
    const b=el("button",(S.todosDay===k?"active ":"")+(isT?"today ":"")+(isPast?"past":""),
      '<span class="dc-tag">'+(isT?'HOJE':'')+'</span><span class="dc-wd">'+wd+'</span><span class="dc-dn">'+dn+'</span>'+dot);
    b.onclick=()=>{ S.todosDay=k; renderTodos(root); };
    chips.appendChild(b);
  });
  const chipsWrap=el("div","day-chips-wrap"); chipsWrap.appendChild(chips);
  // setas discretas pra alcançar datas fora da janela (some quando chega na ponta) — afordância clara
  const navL=el("button","day-nav l",'<i>‹</i>'); navL.setAttribute("aria-label","dias anteriores");
  const navR=el("button","day-nav r",'<i>›</i>'); navR.setAttribute("aria-label","próximos dias");
  chipsWrap.appendChild(navL); chipsWrap.appendChild(navR);
  root.appendChild(chipsWrap);
  // preserva a rolagem manual entre re-renders ao vivo; só recentraliza quando o dia muda.
  // posicionamento síncrono (offsets já válidos: chipsWrap está no DOM vivo) — sem depender de rAF.
  const sel=chips.querySelector("button.active");
  // opacidade por distância do centro do viewport: hoje/ontem/amanhã cheios, depois somem nas pontas
  const paintOp=()=>{
    const center=chips.scrollLeft+chips.clientWidth/2;
    const unit=(sel&&sel.offsetWidth)||56;
    chips.querySelectorAll("button").forEach(b=>{
      const c=b.offsetLeft+b.offsetWidth/2, d=Math.abs(c-center);
      let o=1-(d-unit*1.4)/(unit*3.4);
      o=Math.max(0.05,Math.min(1,o));
      if(b.classList.contains("active")) o=Math.max(o,.9);
      b.style.opacity=o.toFixed(3);
    });
  };
  const updArrows=()=>{ const max=chips.scrollWidth-chips.clientWidth-2;
    navL.hidden=chips.scrollLeft<=2; navR.hidden=chips.scrollLeft>=max; };
  navL.onclick=()=>chips.scrollBy({left:-Math.round(chips.clientWidth*.7),behavior:"smooth"});
  navR.onclick=()=>chips.scrollBy({left: Math.round(chips.clientWidth*.7),behavior:"smooth"});
  chips.addEventListener("scroll",()=>{ _railScroll=chips.scrollLeft; paintOp(); updArrows(); },{passive:true});
  if(sel){
    indi.style.width=Math.max(18,sel.offsetWidth-26)+"px";
    indi.style.transform="translateX("+(sel.offsetLeft+13)+"px)";
    if(_railDay==null){
      // 1ª vez: centraliza no HOJE, sem animação
      const target=Math.max(0,sel.offsetLeft-(chips.clientWidth/2)+(sel.offsetWidth/2));
      chips.scrollLeft=target; _railScroll=target;
    } else {
      chips.scrollLeft=_railScroll; // troca de dia NÃO mexe na tira — só o sublinhado anda
    }
    _railDay=S.todosDay;
    paintOp(); updArrows();
  }
  // não repete os jogos live (já mostrados no topo) se for o dia de hoje
  (dmap[S.todosDay]||[]).filter(m=>!liveMatches.includes(m)).forEach(m=>root.appendChild(todosCard(m)));
}

    const s=m.score||{};

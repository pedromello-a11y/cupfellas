  if(live) meta.appendChild(el("span",null,'<span class="live-dot"></span><span style="color:var(--gold);font-weight:800">AO VIVO</span>'));
  else if(fin) meta.appendChild(el("span",null,'ENCERRADO · '+timeLabel(m.kickoffMs)));
  else if(isTodayMs(m.kickoffMs)) meta.appendChild(expiraChip(m.kickoffMs));
  else meta.appendChild(el("span",null,timeLabel(m.kickoffMs)));
  bodyEl.appendChild(meta);

  // participantes
  const entries=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    entries.push({uid,name:p.name,slug:p.slug,pal:(S.palpites[uid]||{})[m.id]});
  }
  const palp=entries.filter(e=>isComplete(e.pal));
  const confirmedE=entries.filter(e=>isConfirmed(e.pal));
  // reveal antecipado SÓ quando TODO MUNDO CONFIRMOU (palpite trancado, sem volta) —
  // aí não há mais o que copiar nem como mudar
  const allIn = entries.length>0 && confirmedE.length===entries.length;

  if(before && allIn){
    meta.appendChild(el("span","reveal-badge",'🔓 geral confirmou — revelado'));
  }

  if(before && !allIn){
    // surdina: mostra só QUEM já CONFIRMOU (trancou), sem o placar
    const rev=el("div","tp-reveal");
    const avrow=el("div","tp-avrow");
    if(confirmedE.length){
      confirmedE.slice(0,8).forEach(e=>avrow.appendChild(faceAvatar(e.slug,e.name,"tp-face")));
      if(confirmedE.length>8) avrow.appendChild(el("span","tp-more","+"+(confirmedE.length-8)));
    }
    const info=el("div","tp-revinfo");
    const pct = entries.length ? Math.round(confirmedE.length/entries.length*100) : 0;
    info.innerHTML='<div class="tp-revn"><b>'+confirmedE.length+'</b><span>/'+entries.length+'</span></div>'
      +'<div class="tp-revl">'+(confirmedE.length?'já confirmaram 🔒':'ninguém confirmou ainda')+'</div>';
    const bar=el("div","tp-prog"); const fill=el("div"); fill.style.width=pct+"%"; bar.appendChild(fill);
    const right=el("div","tp-revright"); right.appendChild(info); right.appendChild(bar);
    if(confirmedE.length) rev.appendChild(avrow);
    rev.appendChild(right);
    bodyEl.appendChild(rev);
    bodyEl.appendChild(el("div","tp-lockhint","🔒 revela quando todos confirmarem (ou a bola rolar)"));
    card.appendChild(bodyEl);
    return card;
  }

  // ── REVELAÇÃO ──
  const homeCol=teamColor(m.home.name), awayCol=teamColor(m.away.name);
  // 1) barra "como o bolão apostou" — segmentos nas cores oficiais das seleções
  let H=0,D=0,A=0,somaGols=0,nGols=0;
  palp.forEach(e=>{ const r=e.pal.h>e.pal.a?"H":e.pal.h<e.pal.a?"A":"D"; if(r==="H")H++;else if(r==="A")A++;else D++; somaGols+=e.pal.h+e.pal.a; nGols++; });
  const tot=H+D+A||1;
  const pH=Math.round(H/tot*100), pA=Math.round(A/tot*100), pD=Math.max(0,100-pH-pA);
  const distPanel=el("div","dist-panel");
  const dhead=el("div","dist-head");
  dhead.appendChild(el("span","dist-title","COMO O BOLÃO APOSTOU"));
  dhead.appendChild(el("span","dist-stat",(nGols?('⚽ <b>'+(somaGols/nGols).toFixed(1)+'</b> méd · '):'')+'<b>'+palp.length+'</b>/'+entries.length+' palpitaram'));
  distPanel.appendChild(dhead);
  const dist=el("div","dist");
  const seg=(n,p,bg,ink)=>{ if(!n) return; const d=el("div"); d.style.flex=n; d.style.background=bg; d.style.color=ink; if(p>=16)d.textContent=p+"%"; dist.appendChild(d); };
  seg(H,pH,homeCol,inkOn(homeCol));
  seg(D,pD,"#9a927a","#15130c");
  seg(A,pA,awayCol,inkOn(awayCol));
  distPanel.appendChild(dist);
  bodyEl.appendChild(distPanel);

  // 2) palpites AGRUPADOS pela aposta (vitória casa / empate / vitória fora), cada grupo na cor da seleção.
  //    placares alinhados em coluna logo após o avatar; reações à direita.
  bodyEl.appendChild(el("div","pg-secttl","PALPITES"));
  const groups={h:[],d:[],a:[]}, noPal=[];
  entries.forEach(e=>{ if(isComplete(e.pal)){ const o=e.pal.h>e.pal.a?'h':e.pal.h<e.pal.a?'a':'d'; groups[o].push(e); } else noPal.push(e); });
  const sortG=arr=>arr.sort((a,b)=>{ const ra=scoreOne(a.pal,m),rb=scoreOne(b.pal,m); return (rb?rb.pts:-1)-(ra?ra.pts:-1) || a.name.localeCompare(b.name); });
  const groupDefs=[
    {k:'h', label:ptName(m.home.name), pct:pH, col:homeCol},
    {k:'d', label:'Empate',            pct:pD, col:'#9a927a'},
    {k:'a', label:ptName(m.away.name), pct:pA, col:awayCol},
  ];
  const ggrid=el("div","pg-groups");
  groupDefs.forEach(g=>{
    const arr=sortG(groups[g.k]);
    const box=el("div","pg-group"); box.style.setProperty("--gc",g.col);
    box.appendChild(el("div","pg-ghead",'<i class="pg-gdot"></i><span class="pg-gname">'+esc(g.label)+'</span><span class="pg-gpct">'+g.pct+'%</span><span class="pg-gn">'+arr.length+'</span>'));
    if(!arr.length){ box.appendChild(el("div","pg-gempty","ninguém 🦗")); }
    else arr.forEach(e=>{
      const row=el("div","pg-prow"+(e.uid===S.uid?" me":""));
      const av=avatar(e.slug,e.name,"pg-av"); av.style.cursor="pointer"; av.onclick=()=>openProfile(e.uid);
      row.appendChild(av);
      row.appendChild(el("span","pg-pscore",e.pal.h+"×"+e.pal.a));
      const nm=el("span","pg-pname",esc(e.name)); nm.style.cursor="pointer"; nm.onclick=()=>openProfile(e.uid);
      row.appendChild(nm);
      const r=scoreOne(e.pal,m);
      if(r){ const cls=r.pts===3?"pts-3":r.pts===1?"pts-1":"pts-0";
        row.appendChild(el("span","chip pg-chip "+cls,(r.pts>0?"+":"")+r.pts+(!fin?" prov":""))); }
      row.appendChild(reactionCell(m.id,e.uid));
      box.appendChild(row);
    });
    ggrid.appendChild(box);
  });
  bodyEl.appendChild(ggrid);
  if(noPal.length) bodyEl.appendChild(el("div","pg-vacrow","🦥 vacilaram: "+noPal.map(e=>esc(e.name)).join(", ")));
  bodyEl.appendChild(chatThread(m.id)); // resenha do jogo
  card.appendChild(bodyEl);
  return card;
}

/* ════════ REAÇÕES (dica 2) + TRASH-TALK (dica 3) ════════ */
const REACT_EMOJIS=["🔥","😂","🤡","🎯","💩","🧊"];
function reactionSummary(mid,targetUid){
  const r=((S.reactions||{})[mid]||{})[targetUid]||{};
  const counts={}; for(const from in r){ const e=r[from]; counts[e]=(counts[e]||0)+1; }
  return counts;
}
const myReaction=(mid,targetUid)=> (((S.reactions||{})[mid]||{})[targetUid]||{})[S.uid]||null;
function setReaction(mid,targetUid,emoji){
  const ref=db.ref("reactions/"+mid+"/"+targetUid+"/"+S.uid);
  (myReaction(mid,targetUid)===emoji ? ref.remove() : ref.set(emoji)).catch(()=>toast("não reagiu","err"));
}
function reactionCell(mid,targetUid){
  const wrap=el("span","react-cell");
  const counts=reactionSummary(mid,targetUid), mine=myReaction(mid,targetUid);
  Object.keys(counts).forEach(e=>{ const c=el("span","react-chip"+(mine===e?" mine":""),e+counts[e]);
    c.onclick=ev=>{ ev.stopPropagation(); setReaction(mid,targetUid,e); }; wrap.appendChild(c); });
  const add=el("button","react-add","＋"); add.title="reagir";
  add.onclick=ev=>{ ev.stopPropagation(); openReactPicker(mid,targetUid,add); };
  wrap.appendChild(add);
  return wrap;
}
function openReactPicker(mid,targetUid,anchor){
  document.querySelectorAll('.react-pop').forEach(p=>p.remove());
  const pop=el("div","react-pop");
  REACT_EMOJIS.forEach(e=>{ const b=el("button",null,e);
    b.onclick=ev=>{ ev.stopPropagation(); setReaction(mid,targetUid,e); pop.remove(); }; pop.appendChild(b); });
  document.body.appendChild(pop);
  const r=anchor.getBoundingClientRect();
  pop.style.left=Math.max(8,Math.min(r.left-60, window.innerWidth-190))+"px";
  pop.style.top=(r.bottom+6)+"px";
  setTimeout(()=>document.addEventListener("click",function h(){ pop.remove(); document.removeEventListener("click",h); }),0);
}
function chatThread(mid){
  const wrap=el("div","chat-thread");
  const msgs=Object.entries((S.chat||{})[mid]||{}).map(([id,m])=>Object.assign({id},m)).sort((a,b)=>a.ts-b.ts);
  wrap.appendChild(el("div","chat-head",'🗣️ RESENHA'+(msgs.length?' <span class="chat-count">'+msgs.length+'</span>':'')));
  const list=el("div","chat-list");
  if(!msgs.length) list.appendChild(el("div","chat-empty","sem resenha ainda — solta a primeira 👀"));
  msgs.forEach(m=>{
    const mine=m.uid===S.uid;
    const row=el("div","chat-msg"+(mine?" me":""));
    if(!mine){ const p=S.participants[m.uid]; row.appendChild(avatar(p?p.slug:null,m.name||"?","chat-av")); }
    const bub=el("div","chat-bub",(mine?'':'<span class="chat-who">'+esc(m.name||"?")+'</span>')+'<span class="chat-text">'+esc(m.text)+'</span>');
    row.appendChild(bub);
    list.appendChild(row);
  });
  wrap.appendChild(list);
  const form=el("div","chat-form");
  const inp=el("input"); inp.type="text"; inp.placeholder="manda a resenha…"; inp.maxLength=280;
  inp.dataset.chat=mid; // renderScreen preserva foco/texto deste input nos re-renders ao vivo
  const send=el("button","chat-send","enviar");
  const doSend=()=>{ const t=inp.value.trim(); if(!t) return;
    inp.value=""; // limpa otimista (evita re-render restaurar o texto já enviado)
    db.ref("chat/"+mid).push({uid:S.uid,name:S.me?S.me.name:"?",text:t.slice(0,280),ts:Date.now()})
      .catch(()=>{ inp.value=t; toast("não enviou — tenta de novo","err"); }); };
  send.onclick=doSend; inp.addEventListener("keydown",e=>{ if(e.key==="Enter")doSend(); });
  form.appendChild(inp); form.appendChild(send);
  wrap.appendChild(form);
  return wrap;
}

/* painel AO VIVO: placar grande + quem tá pontuando em tempo real */
function liveBoard(m){
  const s=m.score||{};
  const live=isLiveStatus(m);
  const awaiting=!live; // começou (kickoff passou) mas o feed ainda não confirmou IN_PLAY
  const paused = m.status==="PAUSED";
  const board=el("div","live-board"+(awaiting?" awaiting":"")); board.dataset.mid=m.id;
  const flag = src => src ? '<img src="'+esc(src)+'" class="lb-flag" onerror="this.style.visibility=\'hidden\'"/>' : '';
  const liveLabel = awaiting ? 'COMEÇOU' : (paused?'INTERVALO':'AO VIVO');
  const scoreHtml = (s.home==null?0:s.home)+'<i>×</i>'+(s.away==null?0:s.away);
  // topo: placar grande
  const top=el("div","lb-top");
  top.innerHTML =
    '<div class="lb-team">'+flag(m.home.crest)+'<span class="lb-nm">'+esc(ptName(m.home.name))+'</span></div>'+
    '<div class="lb-center"><div class="lb-live"><span class="live-dot"></span>'+liveLabel+'</div>'+
      '<div class="lb-score">'+scoreHtml+'</div></div>'+
    '<div class="lb-team r">'+flag(m.away.crest)+'<span class="lb-nm">'+esc(ptName(m.away.name))+'</span></div>';
  board.appendChild(top);
  if(awaiting) board.appendChild(el("div","lb-await","⏳ bola rolando — aguardando o placar ao vivo do provedor"));

  // monta lista de participantes com pontuação provisória deste jogo
  const entries=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const pal=(S.palpites[uid]||{})[m.id];
    const r=scoreOne(pal,m);
    entries.push({uid,name:p.name,slug:p.slug,pal,pts:r?r.pts:(isComplete(pal)?0:-1)});
  }
  entries.sort((a,b)=> b.pts-a.pts || a.name.localeCompare(b.name));
  const c3=entries.filter(e=>e.pts===3).length;
  const c1=entries.filter(e=>e.pts===1).length;
  const c0=entries.filter(e=>e.pts===0).length;
  const cNo=entries.filter(e=>e.pts===-1).length;

  // resumo (só faz sentido com placar; no estado "aguardando" não pontua ainda)
  if(!awaiting){
    const sum=el("div","lb-summary");
    if(c3) sum.appendChild(el("span","lb-sum s3","🎯 "+c3+" cravando o placar"));
    if(c1) sum.appendChild(el("span","lb-sum s1","✅ "+c1+" no resultado"));
    if(c0) sum.appendChild(el("span","lb-sum","😬 "+c0+" zerando"));
    if(cNo) sum.appendChild(el("span","lb-sum","🥬 "+cNo+" sem palpite"));
    if(sum.childNodes.length) board.appendChild(sum);
  }

  // lista (ordenada por pontos provisórios)
  const list=el("div","lb-list");
  entries.forEach((e,i)=>{
    const row=el("div","lb-row"+(e.uid===S.uid?" me":"")+(e.pts===3?" top3":""));
    row.style.cursor="pointer"; row.onclick=()=>openProfile(e.uid);
    row.appendChild(el("span","lb-rank",e.pts>=0?(i+1):"–"));
    row.appendChild(avatar(e.slug,e.name,"av"));
    row.appendChild(el("span","lb-who",esc(e.name)));
    if(isComplete(e.pal)) row.appendChild(el("span","lb-guess",e.pal.h+"×"+e.pal.a));
    else row.appendChild(el("span","lb-guess none","— vacilou"));
    // chip provisório (no estado "aguardando" não há placar, então não pontua ainda)
    let chip;
    if(awaiting) chip=el("span","chip prov-0 lb-chip",isComplete(e.pal)?"⏳":"—");
    else if(e.pts===3) chip=el("span","chip prov-3 lb-chip","+3 🔥");
    else if(e.pts===1) chip=el("span","chip prov-1 lb-chip","+1");
    else if(e.pts===0) chip=el("span","chip prov-0 lb-chip","0");
    else chip=el("span","chip prov-0 lb-chip","—");
    row.appendChild(chip);
    list.appendChild(row);
  });
  board.appendChild(list);
  return board;
}

/* EXPERIMENTO CazéTV — protótipo local. Acha o vídeo do JOGO CERTO por busca de título
   (function `caze.js` raspa /streams do canal e casa pelos nomes dos times). Cai pro
   stream principal do canal se não achar match confiável. Embed permitido
   (playableInEmbed=true) mas geo-restrito ao Brasil. Lazy-load ao clicar.
   A function roda no Netlify (localhost não serve functions) — por isso a URL absoluta. */
const CAZE_CHANNEL = "UCZiYbVptd3PVPf4f6eR6UaQ";
const CAZE_FN = "https://cupfellas-bolao.netlify.app/.netlify/functions/caze";
function cazeEmbed(m){
  const wrap=el("div","caze-wrap");
  const btn=el("button","caze-btn",'📺 Assistir ao vivo <span class="caze-tag">experimento · só BR</span>');
  const slot=el("div","caze-slot");
  const note=el("div","caze-note");
  let loaded=false;
  function mount(url, label){
    const ifr=document.createElement("iframe");
    ifr.src=url+(url.includes("?")?"&":"?")+"autoplay=1&mute=1";
    ifr.setAttribute("allow","autoplay; encrypted-media; picture-in-picture; fullscreen");
    ifr.setAttribute("allowfullscreen","");
    ifr.loading="lazy";
    slot.appendChild(ifr);
    note.textContent=label;
  }
  btn.onclick=async ()=>{
    if(loaded){ slot.classList.toggle("open"); note.classList.toggle("open"); btn.classList.toggle("on"); return; }
    loaded=true; btn.classList.add("on"); slot.classList.add("open"); note.classList.add("open");
    note.textContent="procurando a transmissão do jogo…";
    // busca por título (jogo certo); fallback = stream principal do canal
    try{
      const u=CAZE_FN+"?home="+encodeURIComponent(ptName(m.home.name))+"&away="+encodeURIComponent(ptName(m.away.name));
      const r=await fetch(u); const j=await r.json();
      if(j.embedUrl) mount(j.embedUrl, j.matched ? ("🎯 "+(j.title||"transmissão do jogo")) : "transmissão ao vivo (jogo não encontrado)");
      else throw new Error("sem embedUrl");
    }catch(e){
      mount("https://www.youtube.com/embed/live_stream?channel="+CAZE_CHANNEL, "transmissão ao vivo");
    }
  };
  wrap.appendChild(btn); wrap.appendChild(slot); wrap.appendChild(note);
  return wrap;
}

/* ════════ ALAVANCA DE AVISOS NO ZAP (/triggers) ════════
   Qualquer participante liga/desliga e ajusta. A config fica no Firebase /triggers;
   um robô (rats/worldfellas-triggers.js) lê e dispara as mensagens no grupo. */
const TRIG_OPTS = [
  {k:"onGoal",       label:"⚽ Gol",            desc:"avisa no grupo quando sai gol"},
  {k:"onMatchStart", label:"🟢 Início de jogo", desc:"avisa quando a bola rola"},
  {k:"lockReminder", label:"⏰ Cobrança 1h antes", desc:"chama no grupo quem ainda não cravou o palpite do próximo jogo"},
  {k:"dailyMorning", label:"☀️ Bom dia",        desc:"de manhã: ranking + jogos do dia"},
  {k:"weeklyWed",    label:"📊 Panorama (quarta)", desc:"resumão da classificação"},
];
const trigOn = k => { const v=(S.triggers||{})[k]; return v===undefined ? true : !!v; };
const masterOn = () => !!(S.triggers||{}).master;
function setTrigger(key, val){
  const upd={}; upd[key]=val; upd.lastBy=S.me?S.me.name:"?"; upd.lastAt=Date.now();
  db.ref("triggers").update(upd).catch(()=>toast("não deu pra salvar a alavanca","err"));
}
// a alavanca no header reflete o estado da chave-mestra
function updateCommsBtn(){
  const lv=$("#commsLever"); if(!lv) return;
  const on=masterOn();
  lv.classList.toggle("on",on);
  lv.setAttribute("aria-checked",on?"true":"false");
  lv.title = on ? "avisos no Zap LIGADOS — toque pra desligar" : "avisos no Zap desligados — toque pra ligar";
}
// toggle direto da chave-mestra (otimista; o listener confirma/reverte)
function toggleMaster(){
  const nv=!masterOn();
  S.triggers=Object.assign({},S.triggers||{},{master:nv});
  updateCommsBtn(); refreshOpenLever();
  setTrigger("master",nv);
}
function openCommsSettings(){
  const t=S.triggers||{};
  const bg=openModal('<h3>📣 Avisos no Zap</h3><p class="muted">A <b>chave geral</b> fica no topo (a alavanca do header). Aqui você escolhe <b>o que</b> o robô avisa quando ela está ligada — vale pra todos, em tempo real.</p>');
  const m=bg.querySelector(".modal");
  // opções (só valem com a chave-mestra ligada → box esmaece quando off)

    const row=el("div","trig-row");
    const info=el("div","trig-info"); info.innerHTML='<b>'+o.label+'</b><span>'+o.desc+'</span>';
    const sw=el("button","sw"+(trigOn(o.k)?" on":"")); sw.innerHTML='<span class="sw-knob"></span>';
    sw.onclick=()=>{ const nv=!trigOn(o.k); setTrigger(o.k,nv); sw.classList.toggle("on",nv); };
    row.appendChild(info); row.appendChild(sw);
    box.appendChild(row);
  });
  m.appendChild(box);
  // reflete a chave-mestra; chamado no abrir E quando alguém do grupo mexe (live)

}
// se outra pessoa do grupo mexer, o box de opções re-esmaece sozinho no modal aberto
function refreshOpenLever(){
  document.querySelectorAll("#modalRoot .modal-bg").forEach(bg=>{ if(bg._syncLever) bg._syncLever(); });
}

/* ════════ BADGES DA RODADA (dica 1) ════════
   Selos de zoeira da rodada mais recente que terminou. Tudo computado no cliente. */
function roundBadges(){
  const finished = matchList().filter(m=>m.status==="FINISHED" && m.matchday!=null);
  if(!finished.length) return null;
  const md = Math.max(...finished.map(m=>m.matchday));
  const games = finished.filter(m=>m.matchday===md);
  const rows=[];
  for(const uid in S.participants){
    const p=S.participants[uid]; if(!p) continue;
    const pal=S.palpites[uid]||{};
    let pts=0, exatos=0, zeros=0, jogou=0;
    games.forEach(m=>{ const r=scoreOne(pal[m.id],m); if(r){ jogou++; pts+=r.pts; if(r.exact)exatos++; if(r.pts===0)zeros++; } });
    rows.push({uid,name:p.name,slug:p.slug,pts,exatos,zeros,jogou});
  }
  const played=rows.filter(r=>r.jogou>0);
  if(played.length<2) return null;
  const badges=[];
  const maxPts=Math.max(...played.map(r=>r.pts));
  const minPts=Math.min(...played.map(r=>r.pts));
  const maxEx =Math.max(...played.map(r=>r.exatos));
  const maxZ  =Math.max(...played.map(r=>r.zeros));
  if(maxPts>0) badges.push({emoji:"👑",title:"Rei da Rodada",who:played.filter(r=>r.pts===maxPts),detail:maxPts+" pts"});
  if(maxEx>0)  badges.push({emoji:"🔮",title:"Mãe Diná",who:played.filter(r=>r.exatos===maxEx),detail:maxEx+" cravado"+(maxEx>1?"s":"")});
  if(minPts<maxPts) badges.push({emoji:"🥬",title:"Mão de Alface",who:played.filter(r=>r.pts===minPts),detail:minPts+" pts"});
  if(maxZ>=2 && maxZ>maxEx) badges.push({emoji:"🤡",title:"Palhaço da Rodada",who:played.filter(r=>r.zeros===maxZ),detail:maxZ+" no zero"});
  return {matchday:md, badges};
}

  const p=el("div","panel badges-panel");

// mini-sparkline: pontos ACUMULADOS por dia (dias com jogo encerrado). null se <2 dias.
function rankSparkline(uid){
  const pal=S.palpites[uid]||{};
  const byDay={};
  for(const mid in S.matches){
    const m=S.matches[mid];
    if(m.status!=="FINISHED") continue;
    const rr=scoreOne(pal[mid],m); if(!rr) continue;
    const k=dayKey(m.kickoffMs); byDay[k]=(byDay[k]||0)+rr.pts;
  }
  const parse=k=>{ const p=k.split("/"); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); };
  const days=Object.keys(byDay).sort((a,b)=>parse(a)-parse(b));
  if(days.length<2) return null;
  let acc=0; const pts=days.map(k=>(acc+=byDay[k]));
  const w=52,h=18,max=Math.max(...pts,1),step=w/(pts.length-1);
  const xy=v=>v, path=pts.map((v,idx)=>{ const x=idx*step, y=h-2-(v/max)*(h-4); return (idx?"L":"M")+x.toFixed(1)+" "+y.toFixed(1); }).join(" ");
  const lx=(pts.length-1)*step, ly=h-2-(pts[pts.length-1]/max)*(h-4);
  return '<svg class="rank-spark" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" aria-hidden="true">'
    +'<path d="'+path+'" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2" fill="currentColor"/></svg>';
}
function rankRow(r,i,total,compact){
  const pos=i+1;
  const isLast = pos===total && total>1;
  let cls="rank-row";
  if(pos===1)cls+=" top1"; else if(pos===2)cls+=" top2"; else if(pos===3)cls+=" top3";
  if(isLast)cls+=" last";
  if(r.uid===S.uid)cls+=" me";
  const row=el("div",cls);
  const pe=el("div","rank-pos",String(pos)+"º");
  row.appendChild(pe);
  const av=faceAvatar(r.slug,r.name,"rank-av");
  av.onclick=()=>openProfile(r.uid);
  row.appendChild(av);
  const nameWrap=el("div","rank-name");
  nameWrap.appendChild(document.createTextNode(r.name));
  if(!compact && pos===1) nameWrap.insertAdjacentHTML("beforeend",' <span class="rank-tag lead">LÍDER</span>');
  if(!compact && isLast) nameWrap.insertAdjacentHTML("beforeend",' <span class="rank-tag lant">LANTERNA</span>');
  nameWrap.style.cursor="pointer"; nameWrap.onclick=()=>openProfile(r.uid);
  row.appendChild(nameWrap);
  // mini-sparkline de pontos por dia (só tela cheia, quando há histórico)
  if(!compact){
    const sp=rankSparkline(r.uid);
    if(sp){ const se=el("div","rank-spark-wrap",sp); row.appendChild(se); }
  }
  // mostra "exatos" só na tela cheia e quando houver (some o "0 exatos")
  const exTxt = (!compact && r.exatos>0) ? '<small>'+r.exatos+' exatos</small>' : '';
  const pts=el("div","rank-pts"); pts.innerHTML=r.pts+exTxt;
  row.appendChild(pts);
  return row;
}

function adminCall(action,extra){
  const pin=sessionStorage.getItem("wf_pin");
  return fetch("/.netlify/functions/admin",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({pin,action},extra))
  }).then(async res=>{
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      if(res.status===401){ sessionStorage.removeItem("wf_pin"); toast(data.error||"PIN errado","err"); renderScreen(); }
      else toast(data.error||"erro no admin","err");
      return null;
    }
    return data;
  }).catch(()=>{ toast("sem conexão com a function","err"); return null; });
}

/* ════════ TICKER "expira em" — atualiza os contadores dos cards sem re-render ════════ */
function fmtExpira(ms){
  if(ms<=0) return null;
  const h=Math.floor(ms/36e5), m=Math.floor(ms%36e5/6e4), s=Math.floor(ms%6e4/1e3);
  const d=Math.floor(h/24);
  if(d>=1) return d+"d "+(h%24)+"h";
  if(h>=1) return h+"h "+pad(m)+"m";
  return pad(m)+"m "+pad(s)+"s";
}
setInterval(()=>{
  document.querySelectorAll("[data-expire]").forEach(elx=>{
    const ko=Number(elx.dataset.expire); const diff=ko-Date.now();
    const txt=fmtExpira(diff);
    if(txt===null){ elx.innerHTML='<span class="live-dot"></span>trancou'; elx.classList.remove("urgent"); }
    else { elx.innerHTML='🔒 tranca em <b>'+txt+'</b>'; if(diff<36e5) elx.classList.add("urgent"); }
  });
},1000);
function expiraChip(kickoffMs){
  const chip=el("span","expira"); chip.dataset.expire=kickoffMs;
  const diff=kickoffMs-Date.now(); const txt=fmtExpira(diff);
  if(txt===null) chip.innerHTML='<span class="live-dot"></span>trancou';
  else { chip.innerHTML='🔒 tranca em <b>'+txt+'</b>'; if(diff<36e5) chip.classList.add("urgent"); }
  return chip;
}

// PWA: registra o service worker mínimo (necessário pro Chrome/Android oferecer "instalar")
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
